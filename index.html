<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ICO Chasing Portal · V23</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:wght@300;400;600&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<style>
/* ═══════════════════ VARIABLES ═══════════════════ */
:root {
  --bg:#05040a;--surface:#0c0b14;--card:#12101c;--card2:#1a1727;
  --border:#2a2540;--gold:#c9952a;--gold2:#e8b84b;--gold3:#f5d078;
  --text:#f0ead8;--muted:#7a7090;--faint:#32293d;
  --red:#e03a3a;--green:#34c57a;--yellow:#f0b429;--cyan:#00e0ff;
  --ease:cubic-bezier(.4,0,.2,1);--radius:14px;
  --header-h:70px;
}
body.light {
  --bg:#f0eee8;--surface:#faf9f6;--card:#ffffff;--card2:#f5f3ef;
  --border:#d8d2c8;--text:#1a1510;--muted:#7a7060;--faint:#c8c0b0;
  --gold:#a8750a;--gold2:#c9952a;--gold3:#b08020;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Raleway',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .4s,color .4s}

/* ═══════════════════ SCREENS ═══════════════════ */
.screen{display:none;min-height:100vh}
.screen.active{display:block}
#loginScreen.active{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;overflow:hidden}

/* ═══════════════════ THREE.JS CANVAS ═══════════════════ */
#threeCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}
#loginScreen #threeCanvas{pointer-events:auto;display:block}

/* ═══════════════════ LOGIN ═══════════════════ */
.login-wrap{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;width:100%;max-width:460px}

/* EYE OF HORUS — Exact hieroglyph style */
.horus-eye-wrap{margin-bottom:28px;display:flex;justify-content:center}
.horus-eye-svg{width:120px;height:80px;filter:drop-shadow(0 0 30px rgba(0,224,255,.5)) drop-shadow(0 0 60px rgba(201,149,42,.3));animation:eyeGlow 3s ease-in-out infinite}
@keyframes eyeGlow{0%,100%{filter:drop-shadow(0 0 20px rgba(0,224,255,.4)) drop-shadow(0 0 40px rgba(201,149,42,.2))}50%{filter:drop-shadow(0 0 40px rgba(0,224,255,.8)) drop-shadow(0 0 80px rgba(201,149,42,.5))}}
.pupil-breath{animation:pupilB 3s ease-in-out infinite}
@keyframes pupilB{0%,100%{r:6}50%{r:8.5}}

/* LOGIN FORM — UIverse KhelVers style adapted */
#loginContainer{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;width:100%;position:relative}
#loginRays{z-index:2;position:relative;bottom:-1.5em;animation:raysAnim 2s ease-in-out infinite}
@keyframes raysAnim{0%,100%{opacity:.5}50%{opacity:1}}
#loginEmiter{position:relative;z-index:3;width:280px}

.login-form{
  position:relative;top:3em;padding:36px 32px 40px;z-index:3;
  display:flex;flex-direction:column;
  border-radius:.75rem;border:2px solid rgba(0,224,255,.5);
  background:rgba(5,20,35,.85);
  box-shadow:0 0 64px 0 rgba(0,200,255,.15) inset,0 0 32px rgba(0,180,255,.2),0 30px 80px rgba(0,0,0,.6);
  backdrop-filter:blur(20px);gap:16px;
  animation:floatForm 3s ease-in-out infinite;width:340px
}
@keyframes floatForm{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

.login-brand-row{text-align:center;margin-bottom:8px}
.login-logo-text{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:900;letter-spacing:.2em;background:linear-gradient(135deg,var(--cyan),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub-text{font-size:.6rem;letter-spacing:.4em;color:rgba(0,224,255,.6);text-transform:uppercase;font-family:'Cinzel',serif;margin-top:4px}
.login-hiero{font-size:1rem;color:rgba(0,224,255,.3);letter-spacing:6px;margin-top:6px}

#loginLabel{text-align:center;color:rgba(255,255,255,.9);font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;letter-spacing:.3em;text-shadow:0 0 16px rgba(0,224,255,.8)}

.login-input{
  height:3em;padding:0 16px;color:#fff;letter-spacing:.05em;
  border-radius:8px;border:1.5px solid rgba(0,224,255,.4);
  background:rgba(0,200,240,.15);
  box-shadow:0 0 0 2px rgba(0,200,255,.08) inset;
  font-family:'Raleway',sans-serif;font-size:.9rem;outline:none;
  transition:border-color .2s,box-shadow .2s
}
.login-input:focus{border-color:rgba(0,224,255,.8);box-shadow:0 0 0 3px rgba(0,224,255,.15) inset,0 0 20px rgba(0,224,255,.2)}
.login-input::placeholder{color:rgba(255,255,255,.4);font-weight:300;letter-spacing:.1rem}

.login-btn{
  cursor:pointer;height:3.2rem;padding:0;color:#fff;
  font-family:'Cinzel',serif;font-size:1rem;font-weight:700;letter-spacing:.3em;
  border:1.5px solid rgba(255,255,255,.5);border-radius:8px;
  background:linear-gradient(144deg,rgba(156,17,255,.8),rgba(32,0,238,.75) 50%,rgba(0,224,255,.85));
  transition:all .25s;margin-top:6px
}
.login-btn:hover{transform:translateY(-3px);box-shadow:0 0 3px 2px rgba(0,224,255,.6);background:linear-gradient(144deg,#9c11ff,#2000ee 50%,#00e0ff)}
.login-error{color:#ff6b6b;font-size:.78rem;text-align:center;min-height:18px;font-family:'Cinzel',serif;letter-spacing:.05em}

/* ═══════════════════ HEADER ═══════════════════ */
.portal-header{
  position:sticky;top:0;z-index:50;
  background:rgba(5,4,10,.92);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  height:var(--header-h);display:flex;align-items:center;
  justify-content:space-between;padding:0 36px;
  transition:background .4s
}
body.light .portal-header{background:rgba(250,249,246,.92)}
.header-brand{display:flex;align-items:center;gap:12px}
.header-eye-mini{width:34px;height:34px}
.header-title{font-family:'Cinzel',serif;font-weight:900;font-size:.95rem;letter-spacing:.15em;background:linear-gradient(135deg,var(--gold),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{font-size:.55rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;font-family:'Cinzel',serif}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.header-user{font-family:'Cinzel',serif;font-size:.78rem;color:var(--gold2);letter-spacing:.08em;font-weight:700}
.header-badge{font-family:'Cinzel',serif;font-size:.6rem;font-weight:700;letter-spacing:.1em;padding:4px 12px;border-radius:99px}
.badge-admin{background:rgba(201,149,42,.15);border:1px solid rgba(201,149,42,.4);color:var(--gold)}
.badge-agent{background:rgba(52,197,122,.12);border:1px solid rgba(52,197,122,.35);color:var(--green)}
.hdr-btn{font-family:'Cinzel',serif;font-size:.65rem;font-weight:700;letter-spacing:.06em;padding:7px 14px;border-radius:8px;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:transparent;color:var(--muted)}
.hdr-btn:hover{border-color:var(--gold);color:var(--gold)}
.hdr-btn.logout:hover{border-color:var(--red);color:var(--red)}
.theme-btn{font-size:1rem;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.spinning{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══════════════════ PORTAL BODY ═══════════════════ */
#portalScreen.active{display:block}
.portal-body{max-width:1480px;margin:0 auto;padding:36px 36px 80px}
@media(max-width:768px){.portal-body{padding:20px 14px 60px}}

/* ═══════════════════ LOADING (Hamster) ═══════════════════ */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 40px;gap:24px}
.loading-text{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.35em;color:var(--muted);text-transform:uppercase;margin-top:12px}
/* Hamster wheel */
.wheel-and-hamster{--dur:1s;position:relative;width:10em;height:10em;font-size:14px}
.wheel,.hamster,.hamster div,.spoke{position:absolute}
.wheel,.spoke{border-radius:50%;top:0;left:0;width:100%;height:100%}
.wheel{background:radial-gradient(100% 100% at center,hsla(0,0%,60%,0) 47.8%,hsl(0,0%,60%) 48%);z-index:2}
.hamster{animation:hamster var(--dur) ease-in-out infinite;top:50%;left:calc(50% - 3.5em);width:7em;height:3.75em;transform:rotate(4deg) translate(-.8em,1.85em);transform-origin:50% 0;z-index:1}
.hamster__head{animation:hamsterHead var(--dur) ease-in-out infinite;background:hsl(30,90%,55%);border-radius:70% 30% 0 100%/40% 25% 25% 60%;box-shadow:0 -.25em 0 hsl(30,90%,80%) inset,.75em -1.55em 0 hsl(30,90%,90%) inset;top:0;left:-2em;width:2.75em;height:2.5em;transform-origin:100% 50%}
.hamster__ear{animation:hamsterEar var(--dur) ease-in-out infinite;background:hsl(0,90%,85%);border-radius:50%;box-shadow:-.25em 0 hsl(30,90%,55%) inset;top:-.25em;right:-.25em;width:.75em;height:.75em;transform-origin:50% 75%}
.hamster__eye{animation:hamsterEye var(--dur) linear infinite;background:#000;border-radius:50%;top:.375em;left:1.25em;width:.5em;height:.5em}
.hamster__nose{background:hsl(0,90%,75%);border-radius:35% 65% 85% 15%/70% 50% 50% 30%;top:.75em;left:0;width:.2em;height:.25em}
.hamster__body{animation:hamsterBody var(--dur) ease-in-out infinite;background:hsl(30,90%,90%);border-radius:50% 30% 50% 30%/15% 60% 40% 40%;box-shadow:.1em .75em 0 hsl(30,90%,55%) inset,.15em -.5em 0 hsl(30,90%,80%) inset;top:.25em;left:2em;width:4.5em;height:3em;transform-origin:17% 50%;transform-style:preserve-3d}
.hamster__limb--fr,.hamster__limb--fl{clip-path:polygon(0 0,100% 0,70% 80%,60% 100%,0% 100%,40% 80%);top:2em;left:.5em;width:1em;height:1.5em;transform-origin:50% 0}
.hamster__limb--fr{animation:hamsterFRLimb var(--dur) linear infinite;background:linear-gradient(hsl(30,90%,80%) 80%,hsl(0,90%,75%) 80%);transform:rotate(15deg) translateZ(-1px)}
.hamster__limb--fl{animation:hamsterFLLimb var(--dur) linear infinite;background:linear-gradient(hsl(30,90%,90%) 80%,hsl(0,90%,85%) 80%);transform:rotate(15deg)}
.hamster__limb--br,.hamster__limb--bl{border-radius:.75em .75em 0 0;clip-path:polygon(0 0,100% 0,100% 30%,70% 90%,70% 100%,30% 100%,40% 90%,0% 30%);top:1em;left:2.8em;width:1.5em;height:2.5em;transform-origin:50% 30%}
.hamster__limb--br{animation:hamsterBRLimb var(--dur) linear infinite;background:linear-gradient(hsl(30,90%,80%) 90%,hsl(0,90%,75%) 90%);transform:rotate(-25deg) translateZ(-1px)}
.hamster__limb--bl{animation:hamsterBLLimb var(--dur) linear infinite;background:linear-gradient(hsl(30,90%,90%) 90%,hsl(0,90%,85%) 90%);transform:rotate(-25deg)}
.hamster__tail{animation:hamsterTail var(--dur) linear infinite;background:hsl(0,90%,85%);border-radius:.25em 50% 50% .25em;box-shadow:0 -.2em 0 hsl(0,90%,75%) inset;top:1.5em;right:-.5em;width:1em;height:.5em;transform:rotate(30deg) translateZ(-1px);transform-origin:.25em .25em}
.spoke{animation:spoke var(--dur) linear infinite;background:radial-gradient(100% 100% at center,hsl(0,0%,60%) 4.8%,hsla(0,0%,60%,0) 5%),linear-gradient(hsla(0,0%,55%,0) 46.9%,hsl(0,0%,65%) 47% 52.9%,hsla(0,0%,65%,0) 53%) 50% 50%/99% 99% no-repeat}
@keyframes hamster{from,to{transform:rotate(4deg) translate(-.8em,1.85em)}50%{transform:rotate(0) translate(-.8em,1.85em)}}
@keyframes hamsterHead{from,25%,50%,75%,to{transform:rotate(0)}12.5%,37.5%,62.5%,87.5%{transform:rotate(8deg)}}
@keyframes hamsterEye{from,90%,to{transform:scaleY(1)}95%{transform:scaleY(0)}}
@keyframes hamsterEar{from,25%,50%,75%,to{transform:rotate(0)}12.5%,37.5%,62.5%,87.5%{transform:rotate(12deg)}}
@keyframes hamsterBody{from,25%,50%,75%,to{transform:rotate(0)}12.5%,37.5%,62.5%,87.5%{transform:rotate(-2deg)}}
@keyframes hamsterFRLimb{from,25%,50%,75%,to{transform:rotate(50deg) translateZ(-1px)}12.5%,37.5%,62.5%,87.5%{transform:rotate(-30deg) translateZ(-1px)}}
@keyframes hamsterFLLimb{from,25%,50%,75%,to{transform:rotate(-30deg)}12.5%,37.5%,62.5%,87.5%{transform:rotate(50deg)}}
@keyframes hamsterBRLimb{from,25%,50%,75%,to{transform:rotate(-60deg) translateZ(-1px)}12.5%,37.5%,62.5%,87.5%{transform:rotate(20deg) translateZ(-1px)}}
@keyframes hamsterBLLimb{from,25%,50%,75%,to{transform:rotate(20deg)}12.5%,37.5%,62.5%,87.5%{transform:rotate(-60deg)}}
@keyframes hamsterTail{from,25%,50%,75%,to{transform:rotate(30deg) translateZ(-1px)}12.5%,37.5%,62.5%,87.5%{transform:rotate(10deg) translateZ(-1px)}}
@keyframes spoke{from{transform:rotate(0)}to{transform:rotate(-1turn)}}

/* ═══════════════════ CYCLE BANNER ═══════════════════ */
.cycle-banner{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 28px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;animation:fadeUp .5s var(--ease)}
.cycle-day-txt{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.cycle-progress-text{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:700;color:var(--text)}
.cycle-bar-wrap{flex:1;min-width:180px;max-width:380px}
.cycle-bar{background:var(--card2);border-radius:99px;height:7px;overflow:hidden}
.cycle-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gold3));transition:width .8s var(--ease)}
.cycle-pct{font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;color:var(--gold);margin-top:5px}
.cycle-badge{font-family:'Cinzel',serif;font-size:.65rem;font-weight:700;letter-spacing:.12em;padding:6px 16px;border-radius:99px;background:rgba(201,149,42,.1);border:1px solid rgba(201,149,42,.3);color:var(--gold)}

/* ═══════════════════ KPI ═══════════════════ */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:28px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 20px 16px;position:relative;overflow:hidden;transition:border-color .3s,transform .3s;animation:fadeUp .5s var(--ease) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.kpi-card:hover{border-color:rgba(201,149,42,.35);transform:translateY(-3px)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold3));opacity:0;transition:opacity .3s}
.kpi-card:hover::before{opacity:1}
.kpi-label{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.kpi-value{font-family:'Cinzel',serif;font-size:1.9rem;font-weight:900;line-height:1;margin-bottom:5px}
.kpi-meta{font-size:.72rem;color:var(--muted)}
.kpi-glyph{position:absolute;bottom:10px;right:14px;font-size:1.3rem;opacity:.1}
.c-gold{background:linear-gradient(135deg,var(--gold),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.c-green{color:var(--green)}
.c-red{color:var(--red)}
.c-yellow{color:var(--yellow)}
.c-cyan{color:var(--cyan)}
.c-purple{color:#c084fc}

/* ═══════════════════ TABS ═══════════════════ */
.tab-bar{display:flex;gap:4px;background:var(--card);border-radius:12px;padding:5px;margin-bottom:28px;border:1px solid var(--border);flex-wrap:wrap}
.tab-btn{flex:none;padding:9px 18px;border-radius:8px;cursor:pointer;font-family:'Cinzel',serif;font-size:.7rem;font-weight:700;letter-spacing:.08em;color:var(--muted);transition:all .25s;border:none;background:none;white-space:nowrap}
.tab-btn.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0800}

/* ═══════════════════ TABLES ═══════════════════ */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:28px}
.table-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.table-title{font-family:'Cinzel',serif;font-size:.82rem;font-weight:700;color:var(--text);letter-spacing:.06em}
.table-tag{font-family:'Cinzel',serif;font-size:.58rem;font-weight:700;letter-spacing:.12em;padding:3px 10px;border-radius:99px;background:rgba(201,149,42,.1);border:1px solid rgba(201,149,42,.28);color:var(--gold)}
.tbl{width:100%;border-collapse:collapse;font-size:.8rem}
.tbl th{background:rgba(0,0,0,.15);color:var(--muted);font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;padding:11px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;font-weight:700}
body.light .tbl th{background:rgba(0,0,0,.04)}
.tbl td{padding:11px 14px;border-bottom:1px solid rgba(42,37,64,.4);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:background .18s}
.tbl tbody tr:hover{background:rgba(201,149,42,.04)}
.tbl tbody tr:nth-child(even){background:rgba(26,23,39,.4)}
body.light .tbl tbody tr:nth-child(even){background:rgba(0,0,0,.02)}
.agent-name{font-weight:700;color:var(--text);font-family:'Cinzel',serif;font-size:.76rem}
.tl-name{color:var(--muted);font-size:.72rem}
.cat-badge{display:inline-block;font-family:'Cinzel',serif;font-size:.58rem;font-weight:700;letter-spacing:.08em;padding:3px 9px;border-radius:5px;text-transform:uppercase}
.cat-SR{background:#4a148c;color:#fff}
.cat-OG{background:#1565c0;color:#fff}
.cat-JR{background:#2e7d32;color:#fff}

/* STATUS PILLS */
.pill{display:inline-flex;align-items:center;gap:4px;font-family:'Cinzel',serif;font-size:.6rem;font-weight:700;letter-spacing:.08em;padding:3px 10px;border-radius:99px;white-space:nowrap}
.pill-green{background:rgba(52,197,122,.15);border:1px solid rgba(52,197,122,.4);color:var(--green)}
.pill-yellow{background:rgba(240,180,41,.15);border:1px solid rgba(240,180,41,.4);color:var(--yellow)}
.pill-red{background:rgba(224,58,58,.15);border:1px solid rgba(224,58,58,.4);color:var(--red)}
.pill-gray{background:rgba(122,112,144,.1);border:1px solid rgba(122,112,144,.25);color:var(--muted)}
.pill::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.pill-green::before{background:var(--green);box-shadow:0 0 5px var(--green)}
.pill-yellow::before{background:var(--yellow)}
.pill-red::before{background:var(--red)}
.pill-gray::before{background:var(--muted)}

/* CONV VALUES */
.conv-val{font-family:'Cinzel',serif;font-weight:700;font-size:.82rem}
.conv-gold{background:linear-gradient(135deg,var(--gold),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.conv-purple{color:#c084fc}
.conv-cyan{color:var(--cyan)}
.conv-muted{color:var(--muted)}

/* PROGRESS BAR */
.prog-bar{background:var(--card2);border-radius:99px;height:5px;overflow:hidden;width:100%;min-width:70px}
.prog-fill{height:100%;border-radius:99px;transition:width .4s var(--ease)}
.prog-green{background:linear-gradient(90deg,#34c57a,#6bdfaa)}
.prog-yellow{background:linear-gradient(90deg,#f0b429,#f5d078)}
.prog-red{background:linear-gradient(90deg,#e03a3a,#f87171)}

/* ═══════════════════ FILTER BAR ═══════════════════ */
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.search-input{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:8px 14px;color:var(--text);font-family:'Raleway',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s;min-width:200px}
.search-input:focus{border-color:var(--gold)}
.search-input::placeholder{color:var(--faint)}
.filter-btn{font-family:'Cinzel',serif;font-size:.65rem;font-weight:700;letter-spacing:.06em;padding:8px 14px;border-radius:9px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .2s}
.filter-btn.active{background:rgba(201,149,42,.1);border-color:rgba(201,149,42,.4);color:var(--gold)}

/* ═══════════════════ AGENT HERO ═══════════════════ */
.agent-hero{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:30px 34px;margin-bottom:28px;position:relative;overflow:hidden;animation:fadeUp .5s var(--ease)}
.agent-hero::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold3),var(--gold),transparent)}
.agent-welcome{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.agent-name-big{font-family:'Cinzel',serif;font-size:1.9rem;font-weight:900;background:linear-gradient(135deg,var(--text),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;margin-bottom:8px}
.agent-meta-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.agent-meta-item{font-size:.76rem;color:var(--muted);display:flex;align-items:center;gap:5px}
.agent-meta-item strong{color:var(--text);font-weight:600}

/* DUAL CONV PANELS */
.conv-panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:28px}
@media(max-width:700px){.conv-panel-grid{grid-template-columns:1fr}}
.conv-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:26px;position:relative;overflow:hidden;animation:fadeUp .5s var(--ease) both}
.conv-panel.dos-panel{border-color:rgba(201,149,42,.25)}
.conv-panel.dos-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold3))}
.conv-panel.cycle-panel{border-color:rgba(192,132,252,.2)}
.conv-panel.cycle-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#a855f7,#c084fc)}
.conv-panel-label{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.32em;text-transform:uppercase;margin-bottom:14px}
.dos-panel .conv-panel-label{color:var(--gold)}
.cycle-panel .conv-panel-label{color:#c084fc}
.conv-panel-value{font-family:'Cinzel',serif;font-size:2.6rem;font-weight:900;line-height:1;margin-bottom:8px}
.dos-panel .conv-panel-value{background:linear-gradient(135deg,var(--gold),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cycle-panel .conv-panel-value{color:#c084fc}
.conv-panel-desc{font-size:.76rem;color:var(--muted);line-height:1.6;margin-bottom:14px}
.conv-panel-status{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--border)}
.conv-panel-glyph{position:absolute;bottom:12px;right:16px;font-size:1.6rem;opacity:.07}

/* WEEK GRID */
.week-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:28px}
.week-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;animation:fadeUp .5s var(--ease) both;transition:border-color .3s}

.week-dates{font-size:.65rem;color:var(--faint);margin-bottom:10px}

.week-dos.good{color:var(--green)}.week-dos.warn{color:var(--yellow)}.week-dos.bad{color:var(--red)}.week-dos.pending{color:var(--muted)}

══════════════════════════════════════ -->
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const canvas = document.getElementById('threeCanvas');
const scene = new THREE.Scene();
// ─── REMOVE BLACK BACKGROUND – set a deep cosmic blue that matches the cyan/gold theme ───
scene.background = new THREE.Color(0x0a1220);   // replaces default black (#000000) with a rich dark blue

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);

// Lights
const hemi = new THREE.HemisphereLight(0x002244,0x000000,1.2); scene.add(hemi);
const dir = new THREE.DirectionalLight(0x00e0ff,1.5); dir.position.set(10,20,10); scene.add(dir);
const dir2 = new THREE.DirectionalLight(0xc9952a,.8); dir2.position.set(-10,10,-5); scene.add(dir2);

// Floating bars (metrics visualization)
const bars=[]; const barGroup=new THREE.Group();
for(let i=0;i<14;i++){
  const geo=new THREE.BoxGeometry(.5,1,.5);
  const mat=new THREE.MeshPhysicalMaterial({color:0x003355,metalness:.2,roughness:.05,transmission:.85,thickness:1.2,ior:1.5});
  const bar=new THREE.Mesh(geo,mat);
  bar.position.x=(i-7)*1.4;
  bar.scale.y=.01;
  barGroup.add(bar);
  bars.push({mesh:bar,targetH:Math.random()*5+1,offset:i});
}
scene.add(barGroup);
barGroup.position.y=-2;

// Floating particles
const ptGeo=new THREE.BufferGeometry();
const ptCount=80;
const pos=new Float32Array(ptCount*3);
for(let i=0;i<ptCount*3;i++) pos[i]=(Math.random()-.5)*40;
ptGeo.setAttribute('position',new THREE.BufferAttribute(pos,3));
const ptMat=new THREE.PointsMaterial({color:0x00e0ff,size:.08,transparent:true,opacity:.5});
const points=new THREE.Points(ptGeo,ptMat);
scene.add(points);

// Grid
const grid=new THREE.GridHelper(60,60,0x001a2e,0x000d1a);
grid.position.y=-5; scene.add(grid);

camera.position.set(14,8,18);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.autoRotate=true; controls.autoRotateSpeed=.25;
controls.enableZoom=false; controls.enablePan=false;
controls.minPolarAngle=Math.PI*.2; controls.maxPolarAngle=Math.PI*.55;

function animate(){
  requestAnimationFrame(animate);
  const t=Date.now()*.001;
  bars.forEach(b=>{
    b.mesh.scale.y=THREE.MathUtils.lerp(b.mesh.scale.y,b.targetH+Math.sin(t+b.offset)*.25,.04);
    b.mesh.position.y=b.mesh.scale.y/2-.5;
  });
  points.rotation.y=t*.02; points.rotation.x=t*.01;
  controls.update();
  renderer.render(scene,camera);
}
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
animate();

// When portal is open, make canvas non-interactive
window.disableThreeInteraction=()=>{ controls.enabled=false; canvas.style.pointerEvents='none'; };
window.enableThreeInteraction=()=>{ controls.enabled=true; canvas.style.pointerEvents='auto'; };
</script>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzmAQgjj6qxPELs9BP0mzFRG_ogjRnMaKgi49haPOYb92iV2iAYIvqBLPUKQh7ePBqSkg/exec';

let currentRole = 'admin';
let currentUser = '';
let apiData = null;
let agentFilterCat = 'ALL';
let agentSearch = '';
let isDark = true;

// ═══ THEME ═══
function toggleTheme(){
  isDark=!isDark;
  document.body.classList.toggle('light',!isDark);
  document.querySelector('.theme-btn').textContent=isDark?'☀️':'🌙';
}

// ═══ LOGIN ═══
async function doLogin(){
  const user=document.getElementById('loginUser').value.trim();
  const pass=document.getElementById('loginPass').value.trim();
  const err=document.getElementById('loginError');
  err.textContent='';
  if(!user||!pass){err.textContent='𓂀 All fields required';return;}

  err.textContent='Verifying credentials…';

  try{
    const res=await fetch(API_URL+'?action=auth&_='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();

    // Auth against E_Ps sheet data returned by API
    // Expecting data.users = [{username,password,role}] OR data.auth from sheet
    // Try to match from users list if available
    let matched=null;
    let role='agent';

    if(data.auth){
      // API returns auth object: {admins:[{u,p}], agents:[{u,p}]}
      const admins=data.auth.admins||[];
      const agents=data.auth.agents||[];
      const adm=admins.find(a=>a.u===user&&a.p===pass);
      if(adm){matched=true;role='admin';}
      else{
        const ag=agents.find(a=>a.u===user&&a.p===pass);
        if(ag){matched=true;role='agent';}
      }
    } else {
      // Fallback: try matching from agents array by name (no real auth sheet exposed)
      // Accept any user/pass for demo if API doesn't return auth
      matched=true;
      role='admin';
      // Check if name matches an agent
      const agents=data.agents||[];
      const isAgent=agents.some(a=>a.name.toLowerCase()===user.toLowerCase());
      if(isAgent) role='agent';
      // Check simple admin flag
      if(data.adminUsers&&data.adminUsers.length){
        const isAdmin=data.adminUsers.some(a=>a.toLowerCase()===user.toLowerCase());
        role=isAdmin?'admin':'agent';
      }
    }

    if(!matched){err.textContent='𓂀 Invalid credentials';return;}

    currentUser=user;
    currentRole=role;
    apiData=data;

    document.getElementById('loginScreen').classList.remove('active');
    document.getElementById('portalScreen').classList.add('active');
    document.getElementById('headerUserName').textContent=user;
    const badge=document.getElementById('headerRoleBadge');

// ═══ DATA ═══
async function loadPortal(){
  document.getElementById('loadingState').style.display='flex';
  document.getElementById('portalContent').style.display='none';
  try{
    const res=await fetch(API_URL+'?_='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    apiData=await res.json();
    renderPortal();
  }catch(e){
    document.getElementById('loadingState').innerHTML=`<div class="empty-state"><div class="empty-glyph">𓂀</div><div class="empty-text">Connection failed — ${e.message}</div></div>`;
  }
}

async function refreshData(){
  const btn=document.getElementById('refreshBtn');
  btn.disabled=true;btn.innerHTML='<span class="spinning">↻</span> Refreshing…';
  await loadPortal();
  btn.disabled=false;btn.textContent='↻ Refresh';
  showToast('𓂀 Data refreshed','success');
}

function renderPortal(){

// ═══ HELPERS ═══
function pct(v){
  if(v===null||v===undefined||v===''||v==='—') return '—';
  const n=parseFloat(v);
  if(isNaN(n)) return '—';
  return (n*100).toFixed(1)+'%';
}

function statusPill(s){
  const u=String(s||'').toUpperCase();
  if(u==='ON TRACK') return`<span class="pill pill-green">ON TRACK</span>`;
  if(u==='WATCH') return`<span class="pill pill-yellow">WATCH</span>`;
  if(u==='OFF TRACK') return`<span class="pill pill-red">OFF TRACK</span>`;
  if(u==='IN PROGRESS') return`<span class="pill pill-yellow">IN PROGRESS</span>`;
  return`<span class="pill pill-gray">${s||'NO DATA'}</span>`;
}

function progBar(v,t){
  if(!v||!t||t<=0) return '';
  const p=Math.min(100,Math.round(v/t*100));
  const cls=p>=100?'prog-green':p>=75?'prog-yellow':'prog-red';
  return`<div class="prog-bar"><div class="prog-fill ${cls}" style="width:${p}%"></div></div>`;
}

function kpiCard(label,value,colorClass,glyph,meta,delay=0){
  return`<div class="kpi-card" style="animation-delay:${delay}s">
    <div class="kpi-label">${label}</div>
    <div class="kpi-value ${colorClass}">${value}</div>
    ${meta?`<div class="kpi-meta">${meta}</div>`:''}
    <div class="kpi-glyph">${glyph}</div>
  </div>`;
}

function computeTotals(agents){
  const t={agents:agents.length,leads:0,dosConv:0,dosPure:0,dosPartial:0,dosRechase:0,dosExternal:0,onTrack:0,watch:0,offTrack:0};
  agents.forEach(a=>{
    t.leads+=(a.leads||0);
    t.dosConv+=(a.dosConv||0);
    t.dosPure+=(a.dosPure||0);
    t.dosPartial+=(a.dosPartial||0);
    t.dosRechase+=(a.dosRechase||0);
    t.dosExternal+=(a.dosExternal||0);
    const s=String(a.curWeekStatus||'').toUpperCase();
    if(s==='ON TRACK') t.onTrack++;
    else if(s==='WATCH') t.watch++;
    else if(s==='OFF TRACK') t.offTrack++;
  });
  return t;
}

function renderSources(agents){

  const sources=Object.keys(srcTotals).sort((a,b)=>srcTotals[b]-srcTotals[a]);

      <div class="conv-panel cycle-panel">
        <div class="conv-panel-label" style="color:#c084fc">Cycle Conv% <span style="font-size:.55rem;color:var(--muted)">(pureConv field)</span></div>
        <div class="conv-panel-value">${pct(cycleConv)}</div>
        <div class="conv-panel-desc">
          Pure DOs returned within the <strong style="color:var(--text)">Conv% date window</strong> 
          and assigned within the <strong style="color:var(--text)">cycle date range</strong>.<br>
          <span style="color:var(--red);font-size:.7rem">If showing 0 or — check that pureConv field is correctly populated in doGet().</span>
        </div>
        <div class="conv-panel-status">
          ${statusPill(cycleConv!==null&&target>0?(cycleConv>=target?'ON TRACK':cycleConv>=target*.8?'WATCH':'OFF TRACK'):'NO DATA')}
          <div style="font-size:.7rem;color:#c084fc">Excl. External · Partial ★ · Rechase ★</div>
        </div>
        <div class="conv-panel-glyph">𓇋</div>
      </div>
    </div>

    <div class="kpi-grid" style="margin-bottom:28px">
      ${kpiCard('DOs This Cycle',me.dosConv||0,'c-green','𓏏','Pure: '+(me.dosPure||0))}
      ${kpiCard('External DOs',me.dosExternal||0,'c-cyan','𓃭','Excl. from Conv%')}
      ${kpiCard('Partial ★',me.dosPartial||0,'c-yellow','𓅓','Bonus Only')}
      ${kpiCard('Rechase ★',me.dosRechase||0,'c-purple','𓄿','Bonus Only')}
      ${kpiCard('This Week',me.curWeekDos!==undefined?me.curWeekDos:'—',me.curWeekStatus==='ON TRACK'?'c-green':me.curWeekStatus==='OFF TRACK'?'c-red':'c-yellow','𓆙',me.curWeekStatus||'—')}
      ${kpiCard('Missing DOs',missing>0?missing:'✅ MET',missing>0?'c-red':'c-green','𓀀',missing>0?'To reach cycle target':'Cycle target achieved')}
    </div>

    <div class="sec-eyebrow">This Cycle</div>
    <div class="sec-title" style="margin-bottom:20px">Weekly Progress</div>
    <div class="week-grid">
      ${weeks.map((w,i)=>{
        const isActive=w.weekStarted&&!w.weekEnded;
        const dosColor=w.status==='ON TRACK'?'good':w.status==='OFF TRACK'?'bad':w.status==='WATCH'?'warn':'pending';
        return`<div class="week-card ${isActive?'active-week':''} ${!w.weekStarted?'not-yet':''}" style="animation-delay:${i*.05}s">
          <div class="week-label">${w.label}${isActive?' ← NOW':''}</div>
          <div class="week-dates">${w.start} → ${w.end}</div>
          <div class="week-dos ${dosColor}">${w.weekStarted?w.dos:'—'}</div>
          <div class="week-target-txt">Target: ${typeof w.weeklyDOTarget==='number'?w.weeklyDOTarget.toFixed(1):'—'} DOs</div>
          ${w.cumulativeGap!==null&&w.cumulativeGap!==undefined&&w.weekStarted?`<div class="${w.cumulativeGap>=0?'gap-positive':'gap-negative'}">Cumul Gap: ${w.cumulativeGap>=0?'+':''}${typeof w.cumulativeGap==='number'?w.cumulativeGap.toFixed(1):w.cumulativeGap}</div>`:''}
          ${statusPill(w.status)}
        </div>`;
      }).join('')}
    </div>

    ${renderAgentSources(me)}
  `;
}

function renderAgentSources(me){
  const srcs=me.sources||{};
  const keys=Object.keys(srcs).sort((a,b)=>srcs[b]-srcs[a]);
  if(!keys.length) return '';
  const total=Object.values(srcs).reduce((s,v)=>s+v,0);
  return`<div class="table-wrap">
    <div class="table-header">
      <div class="table-title">𓆣 Your DO Sources</div>
      <span class="table-tag">Total: ${total} DOs</span>
    </div>
    <table class="tbl">
      <thead><tr><th>Source</th><th>DOs</th><th>Share</th><th>Note</th></tr></thead>
      <tbody>
        ${keys.map(src=>{
          const v=srcs[src];
          const isBonus=src.includes('Partial')||src.includes('Rechase')||src.includes('★');
          const isExt=src==='External';
          return`<tr>
            <td style="font-family:'Cinzel',serif;font-weight:700;color:${isBonus?'var(--yellow)':isExt?'var(--cyan)':'var(--text)'}">${src}</td>
            <td style="font-weight:700">${v}</td>
            <td>${total>0?(v/total*100).toFixed(1)+'%':'—'}</td>
            <td style="font-size:.7rem;color:var(--muted)">${isBonus?'★ Bonus — not in target':isExt?'Excluded from Conv%':''}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

// ═══ CYCLE CONV HELPER ═══
function getCycleConv(a){
  if(a.pureConv!==null&&a.pureConv!==undefined&&a.pureConv!==''&&a.pureConv!=='—'&&parseFloat(a.pureConv)>0){
    return a.pureConv;
  }
  if(a.cycleConv!==null&&a.cycleConv!==undefined&&a.cycleConv!==''&&a.cycleConv!=='—'&&parseFloat(a.cycleConv)>0){
    return a.cycleConv;
  }
  if(a.dosPure&&a.leads&&a.leads>0){
    return a.dosPure/a.leads;
  }
  return null;
}

function getCycleConvNum(a){
  const v=getCycleConv(a);
  if(v===null) return 0;
  return parseFloat(v)||0;
}

// ═══ TOAST ═══
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),4000);
}

// ═══ BOOT ═══
document.getElementById('loginUser').addEventListener('keydown',e=>{if(e.key==='Enter') doLogin();});
</script>
</body>
</html>
