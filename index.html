<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ICO Chasing · Cinematic Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ----- THEME (light/dark) ----- */
    :root {
      --bg-base: #08090f;
      --card-bg: rgba(18, 20, 28, 0.6);
      --card-border: rgba(255, 255, 255, 0.06);
      --text-main: #ffffff;
      --text-muted: #8f94a8;
      --accent-1: #00f2fe;
      --accent-2: #4facfe;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --purple: #a855f7;
      --gold: #fbbf24;
      --surface: rgba(12, 14, 20, 0.7);
      --shadow: 0 30px 50px -20px rgba(0,0,0,0.9);
    }

    body.light {
      --bg-base: #f0f4fa;
      --card-bg: rgba(255, 255, 255, 0.6);
      --card-border: rgba(0, 0, 0, 0.06);
      --text-main: #111827;
      --text-muted: #4b5563;
      --surface: rgba(255, 255, 255, 0.7);
      --shadow: 0 20px 40px -12px rgba(0,0,0,0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      min-height: 100vh;
      transition: background 0.3s, color 0.2s;
      overflow-x: hidden;
    }

    /* animated blobs */
    .ambient-bg {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; overflow: hidden;
    }
    .blob {
      position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.35;
      animation: float 20s infinite alternate cubic-bezier(0.4,0,0.2,1);
    }
    .blob-1 { top: -15%; left: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, var(--accent-1), transparent 70%); }
    .blob-2 { bottom: -20%; right: -5%; width: 70vw; height: 70vw; background: radial-gradient(circle, var(--purple), transparent 70%); animation-delay: -7s; }
    .blob-3 { top: 40%; left: 50%; width: 50vw; height: 50vw; background: radial-gradient(circle, var(--accent-2), transparent 70%); animation-delay: -12s; }
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(8vw, 8vh) scale(1.15); }
    }

    /* screens */
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; align-items: center; justify-content: center; }

    /* ----- LOGIN (separate page) ----- */
    #loginScreen {
      backdrop-filter: blur(20px);
      padding: 1.5rem;
    }
    .login-card {
      background: var(--card-bg); backdrop-filter: blur(24px);
      border: 1px solid var(--card-border); border-radius: 36px;
      padding: 3rem 2.8rem; max-width: 480px; width: 100%;
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.08);
      transform-style: preserve-3d;
    }
    .login-header { text-align: center; margin-bottom: 2.5rem; }
    .login-header svg { width: 70px; height: 70px; filter: drop-shadow(0 8px 20px rgba(0,242,254,0.3)); }
    .login-title {
      font-size: 2rem; font-weight: 700; letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text-main), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin: 1rem 0 0.3rem;
    }
    .input-group { margin-bottom: 1.5rem; }
    .input-group label { display: block; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; color: var(--text-muted); }
    .input-group input {
      width: 100%; background: rgba(0,0,0,0.2); border: 1.5px solid var(--card-border); border-radius: 18px;
      padding: 14px 18px; color: var(--text-main); font-size: 1rem; outline: none; transition: border 0.2s;
    }
    .input-group input:focus { border-color: var(--accent-1); }
    .login-btn {
      width: 100%; padding: 16px; border-radius: 40px; border: none; background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      font-weight: 700; font-size: 1rem; color: #0a0a0f; cursor: pointer; transition: all 0.2s; box-shadow: 0 10px 20px -5px rgba(0,242,254,0.3);
      margin-top: 10px;
    }
    .login-btn:hover { transform: scale(1.02); }
    .login-error { color: var(--danger); font-size: 0.85rem; margin-top: 12px; min-height: 20px; }

    /* ----- MAIN APP HEADER ----- */
    .app-header {
      position: sticky; top: 0; z-index: 40; padding: 1rem 2.5rem;
      background: var(--surface); backdrop-filter: blur(20px); border-bottom: 1px solid var(--card-border);
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .brand svg { width: 36px; height: 36px; }
    .brand-text { font-weight: 700; font-size: 1.2rem; letter-spacing: -0.01em; }
    .badge-role {
      padding: 4px 14px; border-radius: 40px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      background: rgba(0,242,254,0.1); border: 1px solid rgba(0,242,254,0.2); color: var(--accent-1);
    }
    .header-actions { display: flex; align-items: center; gap: 12px; }
    .theme-toggle {
      background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); border-radius: 40px;
      padding: 8px 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; color: var(--text-main);
    }
    .btn-icon {
      background: transparent; border: 1px solid var(--card-border); border-radius: 30px; padding: 8px 16px;
      color: var(--text-main); font-weight: 500; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.05); border-color: var(--accent-1); }

    /* ----- PORTAL BODY ----- */
    .portal-body { max-width: 1440px; margin: 0 auto; padding: 2rem 2.5rem 4rem; }

    /* cards, kpi */
    .cycle-banner {
      background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid var(--card-border);
      border-radius: 28px; padding: 1.8rem 2.2rem; margin-bottom: 2.5rem; display: flex; align-items: center; justify-content: space-between;
      box-shadow: var(--shadow); transform-style: preserve-3d;
    }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.2rem; margin-bottom: 2.5rem; }
    .kpi-card {
      background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid var(--card-border);
      border-radius: 24px; padding: 1.5rem 1.2rem; transition: all 0.2s; box-shadow: var(--shadow);
      transform-style: preserve-3d;
    }
    .kpi-card:hover { transform: translateY(-4px); border-color: rgba(0,242,254,0.3); }
    .kpi-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 0.6rem; }
    .kpi-value { font-size: 2.2rem; font-weight: 800; line-height: 1.2; }
    .kpi-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem; }
    .gold { color: var(--gold); } .green { color: var(--success); } .red { color: var(--danger); } .yellow { color: var(--warning); } .purple { color: #c084fc; }

    .tab-bar { display: flex; gap: 6px; background: rgba(0,0,0,0.15); border-radius: 60px; padding: 6px; margin-bottom: 2rem; border: 1px solid var(--card-border); width: fit-content; }
    .tab-btn { padding: 10px 24px; border-radius: 40px; border: none; background: transparent; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
    .tab-btn.active { background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); color: #0a0a0f; box-shadow: 0 6px 12px rgba(0,242,254,0.2); }

    .table-wrap {
      background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid var(--card-border);
      border-radius: 24px; overflow-x: auto; padding: 0.5rem; margin-bottom: 2rem; box-shadow: var(--shadow);
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; padding: 1rem 1rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--card-border); }
    td { padding: 0.9rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.03); }
    tr:last-child td { border-bottom: none; }

    .cat-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-weight: 700; font-size: 0.7rem; }
    .cat-SR { background: #7c3aed; color: white; } .cat-OG { background: #2563eb; } .cat-JR { background: #16a34a; }

    .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: 600; background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); }
    .pill-green { color: var(--success); border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.05); }
    .pill-yellow { color: var(--warning); border-color: rgba(245,158,11,0.3); }
    .pill-red { color: var(--danger); border-color: rgba(239,68,68,0.3); }

    .prog-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; width: 100%; min-width: 70px; }
    .prog-fill { height: 100%; border-radius: 10px; }
    .prog-green { background: linear-gradient(90deg, #10b981, #34d399); }
    .prog-yellow { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .prog-red { background: linear-gradient(90deg, #ef4444, #f87171); }

    .agent-hero { background: var(--card-bg); border-radius: 28px; padding: 2rem; margin-bottom: 2rem; border: 1px solid var(--card-border); }
    .dual-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }

    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--card-border);
      border-radius: 40px; padding: 12px 28px; z-index: 999; transition: transform 0.3s; font-weight: 500;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .loading-state { display: flex; flex-direction: column; align-items: center; padding: 4rem; gap: 1rem; }

    /* 3D tilt */
    .tilt-card { transition: transform 0.1s ease-out; }

    @media (max-width: 700px) {
      .app-header { padding: 1rem; }
      .portal-body { padding: 1.5rem 1rem; }
      .dual-panel { grid-template-columns: 1fr; }
    }

    /* spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 1.5s linear infinite; }
  </style>
</head>
<body>
  <div class="ambient-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="screen active">
    <div class="login-card tilt-card">
      <div class="login-header">
        <svg viewBox="0 0 60 60" fill="none">
          <circle cx="30" cy="30" r="28" stroke="url(#gradLogin)" stroke-width="2"/>
          <circle cx="30" cy="30" r="12" fill="url(#gradLogin)"/>
          <circle cx="26" cy="26" r="3" fill="white" opacity="0.8"/>
          <defs><linearGradient id="gradLogin" x1="0" y1="0" x2="60" y2="60"><stop stop-color="#00f2fe"/><stop offset="1" stop-color="#4facfe"/></linearGradient></defs>
        </svg>
        <div class="login-title">ICO CHASING</div>
        <div style="color: var(--text-muted); letter-spacing: 4px; font-size: 0.7rem;">LIBERTY MEDICAL</div>
      </div>
      <div class="input-group">
        <label>Name / Email</label>
        <input type="text" id="loginUser" placeholder="Enter your name" autocomplete="username">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="login-btn" onclick="doLogin()">Enter the Portal →</button>
      <div class="login-error" id="loginError"></div>
      <div style="margin-top: 1.5rem; text-align: center;">
        <button class="theme-toggle" onclick="toggleTheme()" style="margin:0 auto;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <span>Light/Dark</span>
        </button>
      </div>
    </div>
  </div>

  <!-- MAIN PORTAL SCREEN -->
  <div id="portalScreen" class="screen">
    <div style="display: flex; flex-direction: column; width: 100%;">
      <header class="app-header">
        <div class="header-left">
          <div class="brand">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
              <circle cx="18" cy="18" r="16" stroke="var(--accent-1)" stroke-width="1.5"/>
              <circle cx="18" cy="18" r="7" fill="url(#headGrad)"/>
              <circle cx="15" cy="15" r="2" fill="white" opacity="0.8"/>
              <defs><linearGradient id="headGrad"><stop stop-color="#00f2fe"/><stop offset="1" stop-color="#4facfe"/></linearGradient></defs>
            </svg>
          </div>
          <span class="brand-text">ICO CHASING PORTAL</span>
          <span class="badge-role" id="headerRoleBadge">—</span>
        </div>
        <div class="header-actions">
          <span style="color: var(--text-muted);" id="headerUserName">—</span>
          <button class="theme-toggle" onclick="toggleTheme()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <span>Light</span>
          </button>
          <button class="btn-icon" onclick="refreshData()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> Refresh
          </button>
          <button class="btn-icon" onclick="doLogout()">Sign Out</button>
        </div>
      </header>

      <div class="portal-body" id="portalBody">
        <div class="loading-state" id="loadingState">
          <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="var(--accent-1)" class="spinner"><circle cx="12" cy="12" r="10" stroke-width="2" stroke-dasharray="30 60"/></svg>
          <div>Awakening the Vault…</div>
        </div>
        <div id="portalContent" style="display: none;"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (function(){
      const API_URL = "https://script.google.com/macros/s/AKfycbwq420JmAjvFm6GsBpoqfpT4xcYR5v5vOrhuMmH_J-ia-YQpupbAxBgqUVf0gRIKH7deg/exec";
      
      let currentUser = '';
      let apiData = null;
      let activeTab = 'overview';
      let agentFilterCat = 'ALL', agentSearch = '';

      // ---------- exposed ----------
      window.toggleTheme = () => {
        document.body.classList.toggle('light');
        const btn = document.querySelector('.theme-toggle span');
        if(btn) btn.textContent = document.body.classList.contains('light') ? 'Dark' : 'Light';
      };

      window.doLogin = async () => {
        const user = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        const err = document.getElementById('loginError');
        err.textContent = '';
        if(!user || !pass) { err.textContent = 'All fields required'; return; }
        currentUser = user;
        document.getElementById('loginScreen').classList.remove('active');
        document.getElementById('portalScreen').classList.add('active');
        document.getElementById('headerUserName').textContent = user;
        await loadPortal();
      };

      window.doLogout = () => {
        apiData = null;
        document.getElementById('portalScreen').classList.remove('active');
        document.getElementById('loginScreen').classList.add('active');
        document.getElementById('portalContent').style.display = 'none';
        document.getElementById('loadingState').style.display = 'flex';
      };

      async function loadPortal() {
        document.getElementById('loadingState').style.display = 'flex';
        document.getElementById('portalContent').style.display = 'none';
        try {
          const res = await fetch(API_URL + '?_=' + Date.now());
          if(!res.ok) throw new Error('HTTP '+res.status);
          apiData = await res.json();
          renderPortal();
        } catch(e) {
          document.getElementById('loadingState').innerHTML = `<div style="color:var(--danger)">Connection failed</div>`;
        }
      }

      window.refreshData = async () => { await loadPortal(); showToast('Data refreshed', 'success'); };

      function showToast(msg, type='success') {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = `toast ${type} show`;
        setTimeout(()=>t.classList.remove('show'), 3500);
      }

      // helpers
      function pct(v) { if(v===null||v===undefined||isNaN(parseFloat(v))) return '—'; return (parseFloat(v)*100).toFixed(1)+'%'; }
      function statusPill(s) {
        const st = String(s||'').toUpperCase();
        if(st.includes('ON TRACK')) return '<span class="pill pill-green">ON TRACK</span>';
        if(st.includes('WATCH')) return '<span class="pill pill-yellow">WATCH</span>';
        if(st.includes('OFF TRACK')) return '<span class="pill pill-red">OFF TRACK</span>';
        return '<span class="pill">'+ (s||'—') +'</span>';
      }

      function computeTotals(agents) {
        const t = { agents: agents.length, leads:0, dosConv:0, dosPure:0, dosPartial:0, dosRechase:0 };
        agents.forEach(a=>{ t.leads+=a.leads||0; t.dosConv+=a.dosConv||0; t.dosPure+=a.dosPure||0; t.dosPartial+=a.dosPartial||0; t.dosRechase+=a.dosRechase||0; });
        return t;
      }

      // determine role: if user matches an agent name -> agent view, else admin
      function getUserRole() {
        const agents = apiData?.agents || [];
        const match = agents.find(a => a.name.toLowerCase() === currentUser.toLowerCase()) || agents.find(a => a.name.toLowerCase().includes(currentUser.toLowerCase()));
        return match ? 'agent' : 'admin';
      }

      function renderPortal() {
        document.getElementById('loadingState').style.display = 'none';
        const content = document.getElementById('portalContent');
        content.style.display = 'block';
        const role = getUserRole();
        const badge = document.getElementById('headerRoleBadge');
        badge.textContent = role === 'admin' ? 'ADMIN' : 'AGENT';
        
        if(role === 'admin') renderAdmin(content);
        else renderAgent(content);
        applyTilt();
      }

      function applyTilt() {
        document.querySelectorAll('.tilt-card, .kpi-card, .cycle-banner, .table-wrap, .agent-hero').forEach(card => {
          card.addEventListener('mousemove', e => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left, y = e.clientY - rect.top;
            const cx = rect.width/2, cy = rect.height/2;
            const rotX = ((y-cy)/cy)*-4;
            const rotY = ((x-cx)/cx)*4;
            card.style.transform = `perspective(800px) rotateX(${rotX}deg) rotateY(${rotY}deg) translateZ(5px)`;
          });
          card.addEventListener('mouseleave', () => card.style.transform = '');
        });
      }

      // ---------- ADMIN ----------
      function renderAdmin(container) {
        const data = apiData || {};
        const agents = data.agents || [];
        const cycleDay = data.cycleDay || '—';
        const cycleDayTotal = data.cycleDayTotal || '—';
        const totals = computeTotals(agents);
        const cyclePct = cycleDayTotal>0 ? Math.round((cycleDay/cycleDayTotal)*100) : 0;

        container.innerHTML = `
          <div class="cycle-banner tilt-card">
            <div><div style="font-size:0.75rem; color:var(--text-muted);">Cycle Progress</div>
            <div style="font-size:1.4rem; font-weight:700;">Day ${cycleDay} / ${cycleDayTotal}</div></div>
            <div style="flex:1; margin:0 30px;"><div class="prog-bar" style="height:10px;"><div class="prog-fill prog-green" style="width:${cyclePct}%"></div></div></div>
            <div class="pill" style="background:rgba(0,242,254,0.1);">${cyclePct}%</div>
          </div>
          <div class="kpi-grid">
            ${kpiCard('Agents', totals.agents, 'gold')} ${kpiCard('Leads', totals.leads, 'gold')} ${kpiCard('DOs Conv', totals.dosConv, 'green')}
            ${kpiCard('Pure DOs', totals.dosPure, 'green')} ${kpiCard('Partial★', totals.dosPartial, 'yellow')} ${kpiCard('Rechase★', totals.dosRechase, 'yellow')}
          </div>
          <div class="tab-bar">
            <button class="tab-btn active" onclick="switchAdminTab('overview')">Overview</button>
            <button class="tab-btn" onclick="switchAdminTab('agents')">All Agents</button>
            <button class="tab-btn" onclick="switchAdminTab('weekly')">Weekly</button>
            <button class="tab-btn" onclick="switchAdminTab('sources')">Sources</button>
          </div>
          <div id="adminTabContent"></div>
        `;
        renderAdminTab('overview');
      }

      function kpiCard(l,v,c){ return `<div class="kpi-card tilt-card"><div class="kpi-label">${l}</div><div class="kpi-value ${c}">${v}</div></div>`; }

      window.switchAdminTab = (tab) => { activeTab = tab; document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); event.target.classList.add('active'); renderAdminTab(tab); };

      function renderAdminTab(tab) {
        const cont = document.getElementById('adminTabContent');
        const agents = apiData.agents || [];
        if(tab==='overview') cont.innerHTML = renderOverview(agents);
        else if(tab==='agents') cont.innerHTML = renderAllAgents(agents);
        else if(tab==='weekly') cont.innerHTML = renderWeekly(agents);
        else if(tab==='sources') cont.innerHTML = renderSources(agents);
        applyTilt();
      }

      function renderOverview(agents) {
        const byCat = {SR:[], OG:[], JR:[]}; agents.forEach(a=>{ if(byCat[a.category]) byCat[a.category].push(a); });
        let html = '';
        ['SR','OG','JR'].forEach(cat=>{
          const list = byCat[cat]; if(!list.length) return;
          html += `<div class="table-wrap"><div style="padding:1rem;font-weight:700;">${cat} TIER · ${list.length} agents</div>
            <table><thead><tr><th>Agent</th><th>Leads</th><th>DOs</th><th>Conv%</th><th>Cycle Conv%</th><th>Pure</th><th>Status</th></tr></thead><tbody>`;
          list.forEach(a=>{
            const cycle = a.pureConv!==undefined ? a.pureConv : null;
            html += `<tr><td>${a.name}</td><td>${a.leads||0}</td><td>${a.dosConv||0}</td><td>${pct(a.overallConv)}</td>
              <td><span style="color:#c084fc;">${pct(cycle)}</span></td><td>${a.dosPure||0}</td><td>${statusPill(a.curWeekStatus)}</td></tr>`;
          });
          html += `</tbody></table></div>`;
        });
        return html;
      }

      function renderAllAgents(agents) {
        const sorted = [...agents].sort((a,b)=>(b.overallConv||0)-(a.overallConv||0));
        let html = `<div style="margin-bottom:1rem; display:flex; gap:10px;"><input type="text" placeholder="Search agent/TL" oninput="filterAgentTable(this.value)" style="background:var(--card-bg); border:1px solid var(--card-border); border-radius:30px; padding:10px 18px; color:var(--text-main); width:220px;"> 
          ${['ALL','SR','OG','JR'].map(c=>`<button class="btn-icon" onclick="filterAgentCat('${c}')">${c}</button>`).join('')}</div>
          <div class="table-wrap"><table><thead><tr><th>#</th><th>Agent</th><th>TL</th><th>Cat</th><th>Leads</th><th>DOs</th><th>Conv%</th><th>Cycle Conv%</th><th>Status</th></tr></thead><tbody id="allAgentsTbody">`;
        sorted.forEach((a,i)=>{
          const cycle = a.pureConv!==undefined ? a.pureConv : null;
          html += `<tr data-name="${a.name.toLowerCase()}" data-tl="${(a.tl||'').toLowerCase()}" data-cat="${a.category}">
            <td>#${i+1}</td><td>${a.name}</td><td>${a.tl||'—'}</td><td><span class="cat-badge cat-${a.category}">${a.category}</span></td>
            <td>${a.leads||0}</td><td>${a.dosConv||0}</td><td>${pct(a.overallConv)}</td><td><span style="color:#c084fc;">${pct(cycle)}</span></td><td>${statusPill(a.curWeekStatus)}</td></tr>`;
        });
        html += `</tbody></table></div>`;
        return html;
      }

      window.filterAgentTable = (q) => { agentSearch = q.toLowerCase(); applyAgentFilter(); };
      window.filterAgentCat = (cat) => { agentFilterCat = cat; applyAgentFilter(); };
      function applyAgentFilter() {
        document.querySelectorAll('#allAgentsTbody tr').forEach(r=>{
          const name = r.dataset.name, tl = r.dataset.tl, cat = r.dataset.cat;
          const match = (!agentSearch || name.includes(agentSearch)||tl.includes(agentSearch)) && (agentFilterCat==='ALL'||cat===agentFilterCat);
          r.style.display = match ? '' : 'none';
        });
      }

      function renderWeekly(agents) {
        const sample = agents.find(a=>a.weeks); if(!sample) return '<div>No weekly data</div>';
        const weeks = sample.weeks;
        let html = `<div class="table-wrap"><table><thead><tr><th>Agent</th>${weeks.map(w=>`<th>${w.label}</th>`).join('')}</tr></thead><tbody>`;
        agents.forEach(a=>{
          const wks = a.weeks||[];
          html += `<tr><td>${a.name}</td>${wks.map(w=>`<td>${w.dos} / ${w.weeklyDOTarget?.toFixed(1)||'—'}<br>${statusPill(w.status)}</td>`).join('')}</tr>`;
        });
        html += `</tbody></table></div>`; return html;
      }

      function renderSources(agents) {
        const srcTotals = {}; agents.forEach(a=>{ const s = a.sources||{}; Object.keys(s).forEach(k=>srcTotals[k]=(srcTotals[k]||0)+s[k]); });
        const keys = Object.keys(srcTotals).sort((a,b)=>srcTotals[b]-srcTotals[a]);
        let html = `<div class="table-wrap"><table><tr><th>Source</th><th>DOs</th></tr>`;
        keys.forEach(k=> html+=`<tr><td>${k}</td><td>${srcTotals[k]}</td></tr>`);
        return html+'</table></div>';
      }

      // ---------- AGENT VIEW ----------
      function renderAgent(container) {
        const agents = apiData.agents || [];
        const me = agents.find(a => a.name.toLowerCase() === currentUser.toLowerCase()) || agents.find(a => a.name.toLowerCase().includes(currentUser.toLowerCase()));
        if(!me) { container.innerHTML = `<div class="agent-hero"><h2>Agent not found</h2></div>`; return; }
        const conv = me.overallConv, cycleConv = me.pureConv, missing = me.missingQuota||0;
        const cycleDay = apiData.cycleDay, cycleDayTotal = apiData.cycleDayTotal;
        container.innerHTML = `
          <div class="cycle-banner"><div>Day ${cycleDay}/${cycleDayTotal}</div><div class="prog-bar" style="flex:1; margin:0 20px;"><div class="prog-fill prog-green" style="width:${(cycleDay/cycleDayTotal)*100}%"></div></div></div>
          <div class="agent-hero tilt-card">
            <div style="font-size:2rem; font-weight:800;">${me.name}</div>
            <div style="display:flex; gap:20px; margin:15px 0;"> <span>${me.category}</span> <span>TL: ${me.tl||'—'}</span> <span>Leads: ${me.leads||0}</span> </div>
            <div>Missing: ${missing>0?missing+' DOs':'✅ Target Met'}</div>
          </div>
          <div class="dual-panel">
            <div class="kpi-card"><div class="kpi-label">DOs Conv%</div><div class="kpi-value gold">${pct(conv)}</div></div>
            <div class="kpi-card"><div class="kpi-label">Cycle Conv%</div><div class="kpi-value purple">${pct(cycleConv)}</div></div>
          </div>
          <div class="kpi-grid">
            ${kpiCard('DOs', me.dosConv, 'green')} ${kpiCard('Pure', me.dosPure, 'green')} ${kpiCard('Partial★', me.dosPartial, 'yellow')} ${kpiCard('Rechase★', me.dosRechase, 'yellow')}
          </div>
          <div class="table-wrap"><div style="padding:1rem;">Weekly Progress</div><table>${(me.weeks||[]).map(w=>`<tr><td>${w.label}</td><td>${w.dos}</td><td>${w.weeklyDOTarget?.toFixed(1)}</td><td>${statusPill(w.status)}</td></tr>`).join('')}</table></div>
          <div class="table-wrap"><div>Sources</div><table>${Object.entries(me.sources||{}).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}</table></div>
        `;
        applyTilt();
      }

      // init
      document.addEventListener('keydown', e=>{ if(e.key==='Enter' && document.getElementById('loginScreen').classList.contains('active')) doLogin(); });
      window.onload = ()=> { document.body.classList.remove('light'); };
    })();
  </script>
</body>
</html>
