<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chasing Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230a0a0f'/><polyline points='4,22 10,14 16,17 22,8 28,10' fill='none' stroke='%236d28d9' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/><circle cx='22' cy='8' r='2.5' fill='%236d28d9'/></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;
  --bg2:#0d0d1a;
  --surface:#11111f;
  --surface2:#171726;
  --surface3:#1f1f33;
  --surface4:#27273d;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.12);
  --text:#f0f0f8;
  --muted:#9898b8;
  --dim:#5a5a7a;
  --accent:#7c3aed;
  --accent2:#a855f7;
  --accent-glow:rgba(124,58,237,0.2);
  --accent-subtle:rgba(124,58,237,0.08);
  --green:#10b981;
  --green-bg:rgba(16,185,129,0.08);
  --green-border:rgba(16,185,129,0.18);
  --red:#f43f5e;
  --red-bg:rgba(244,63,94,0.08);
  --red-border:rgba(244,63,94,0.18);
  --yellow:#f59e0b;
  --yellow-bg:rgba(245,158,11,0.08);
  --yellow-border:rgba(245,158,11,0.18);
  --blue:#3b82f6;
  --blue-bg:rgba(59,130,246,0.08);
  --r:14px;--r-sm:8px;--r-lg:20px;--r-xl:28px;
  --sans:'DM Sans',sans-serif;
  --display:'Syne',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
  font-size:14px;
  line-height:1.6;
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(124,58,237,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(168,85,247,0.08) 0%, transparent 50%);
  pointer-events:none;
  z-index:0;
}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;flex-direction:column;position:relative;z-index:1}
.screen.show{display:flex}

/* ══════════════════════════ LOADING ══════════════════════════ */
#s-loading{
  align-items:center;justify-content:center;gap:24px;
  background:var(--bg);
}
.loading-brand{
  display:flex;align-items:center;gap:12px;
  animation:fadein .6s ease both;
}
.loading-icon{
  width:52px;height:52px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 40px var(--accent-glow);
  animation:pulse-glow 2s ease-in-out infinite;
}
@keyframes pulse-glow{
  0%,100%{box-shadow:0 0 30px var(--accent-glow);}
  50%{box-shadow:0 0 60px rgba(124,58,237,0.35);}
}
.loading-wordmark{font-family:var(--display);font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.loading-wordmark em{font-style:normal;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.loading-bar-wrap{
  width:240px;height:3px;
  background:var(--surface3);border-radius:3px;overflow:hidden;
  animation:fadein .6s .2s ease both;
}
.loading-bar-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:3px;
  transition:width .4s ease;
  animation:load-progress 2.5s ease-in-out forwards;
}
@keyframes load-progress{0%{width:0%}60%{width:75%}100%{width:100%}}
#loading-msg{
  color:var(--muted);font-size:12px;
  font-family:var(--mono);letter-spacing:0.5px;
  animation:fadein .6s .3s ease both;
}
.loading-dots::after{
  content:'...';animation:dots 1.5s steps(4,end) infinite;
}
@keyframes dots{0%,100%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

/* ══════════════════════════ LOGIN ══════════════════════════ */
#s-login{align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.login-outer{
  width:100%;max-width:400px;
  animation:slideup .5s cubic-bezier(.4,0,.2,1) both;
}
@keyframes slideup{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.login-brand{
  display:flex;align-items:center;gap:10px;
  justify-content:center;margin-bottom:36px;
}
.logo-mark{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 24px var(--accent-glow);
  flex-shrink:0;
}
.logo-wordmark{font-family:var(--display);font-size:17px;font-weight:800;letter-spacing:-0.3px;}
.logo-wordmark em{
  font-style:normal;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.login-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  padding:32px;
  position:relative;
  overflow:hidden;
}
.login-card::before{
  content:'';position:absolute;
  top:-1px;left:50%;transform:translateX(-50%);
  width:60%;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent2),transparent);
}
.login-title{
  font-family:var(--display);font-size:24px;font-weight:800;
  letter-spacing:-0.5px;margin-bottom:4px;
  background:linear-gradient(135deg,#fff 60%,var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:28px;}
.field{margin-bottom:16px}
.field label{
  display:block;font-size:11px;font-weight:600;
  color:var(--muted);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:8px;
}
.field-inner{position:relative;display:flex;align-items:center;}
.field-inner svg{position:absolute;left:14px;color:var(--dim);pointer-events:none;flex-shrink:0;}
.field input{
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  padding:12px 14px 12px 42px;
  color:var(--text);
  font-family:var(--sans);font-size:14px;
  outline:none;
  transition:all .2s;
}
.field input:focus{
  border-color:var(--accent);
  background:var(--accent-subtle);
  box-shadow:0 0 0 3px rgba(124,58,237,0.12);
}
.field input::placeholder{color:var(--dim)}
.btn-login{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:var(--r-sm);
  color:#fff;font-family:var(--display);
  font-size:15px;font-weight:700;
  cursor:pointer;
  transition:all .2s;
  margin-top:6px;letter-spacing:-0.1px;
  position:relative;overflow:hidden;
  box-shadow:0 4px 24px rgba(124,58,237,0.35);
}
.btn-login::before{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,0);
  transition:background .15s;
}
.btn-login:hover::before{background:rgba(255,255,255,0.08)}
.btn-login:active{transform:scale(0.99);box-shadow:0 2px 12px rgba(124,58,237,0.25)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}
.login-err{
  background:var(--red-bg);
  border:1px solid var(--red-border);
  border-radius:var(--r-sm);
  padding:10px 14px;color:var(--red);
  font-size:12px;margin-top:12px;
  display:none;
  animation:shake .3s ease;
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* ══════════════════════════ APP BAR ══════════════════════════ */
.app-bar{
  height:56px;
  background:rgba(7,7,15,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 16px;gap:10px;
  flex-shrink:0;
  position:sticky;top:0;z-index:50;
}
.badge{
  font-size:10px;font-weight:700;
  padding:3px 8px;border-radius:20px;
  text-transform:uppercase;letter-spacing:0.8px;
  background:var(--accent-subtle);
  color:var(--accent2);
  border:1px solid rgba(124,58,237,0.2);
  font-family:var(--mono);
}
.badge.admin{
  background:rgba(245,158,11,0.1);
  color:var(--yellow);
  border-color:rgba(245,158,11,0.2);
}
.ml-auto{margin-left:auto}
.icon-btn{
  background:none;
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  padding:7px;cursor:pointer;
  color:var(--muted);
  display:flex;align-items:center;
  transition:all .15s;
}
.icon-btn:hover{border-color:var(--border2);color:var(--text);background:var(--surface2)}
.user-chip{
  font-size:12px;color:var(--muted);
  max-width:140px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
  font-family:var(--mono);
}

/* ══════════════════════════ AGENT SCREEN ══════════════════════════ */
#s-agent{background:var(--bg)}
.agent-body{
  flex:1;padding:16px;
  max-width:620px;margin:0 auto;width:100%;
}

/* HERO CARD */
.hero{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  padding:22px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
}
.hero-top{
  display:flex;align-items:center;
  gap:14px;margin-bottom:18px;
}
.avatar{
  width:48px;height:48px;border-radius:13px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-weight:700;
  font-size:16px;color:#fff;flex-shrink:0;
  box-shadow:0 4px 20px rgba(124,58,237,0.3);
}
.hero-name{
  font-family:var(--display);font-size:20px;
  font-weight:800;letter-spacing:-0.4px;
}
.hero-meta{font-size:12px;color:var(--muted);margin-top:2px}
.hero-status{margin-left:auto}

/* STATUS PILLS */
.pill{
  display:inline-flex;align-items:center;
  gap:6px;padding:4px 10px;
  border-radius:20px;font-size:11px;
  font-weight:600;letter-spacing:0.3px;
  white-space:nowrap;font-family:var(--mono);
}
.pill.green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.pill.red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.pill.yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border)}
.pill.gray{background:rgba(90,90,122,0.1);color:var(--dim);border:1px solid var(--border)}
.pill-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

/* PROGRESS BARS */
.prog-row{margin-bottom:12px}
.prog-label{
  display:flex;justify-content:space-between;
  font-size:11px;color:var(--muted);margin-bottom:6px;
}
.prog-val{font-weight:700;color:var(--text);font-family:var(--mono)}
.prog-track{
  height:6px;background:var(--surface3);
  border-radius:3px;overflow:hidden;
}
.prog-fill{
  height:100%;border-radius:3px;
  transition:width 1.2s cubic-bezier(.4,0,.2,1);
}
.prog-fill.green{background:linear-gradient(90deg,var(--green),#34d399)}
.prog-fill.yellow{background:linear-gradient(90deg,var(--yellow),#fbbf24)}
.prog-fill.red{background:linear-gradient(90deg,var(--red),#fb7185)}
.prog-fill.accent{background:linear-gradient(90deg,var(--accent),var(--accent2))}

/* STAT GRID */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:14px;
  transition:border-color .15s,transform .1s;
}
.stat:hover{border-color:var(--border2);transform:translateY(-1px)}
.stat-label{
  font-size:10px;font-weight:600;color:var(--dim);
  text-transform:uppercase;letter-spacing:1px;
  margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.stat-val{
  font-family:var(--display);font-size:26px;
  font-weight:800;letter-spacing:-0.8px;line-height:1;
}
.stat-sub{font-size:11px;color:var(--dim);margin-top:5px;font-family:var(--mono)}

/* SECTIONS */
.section{margin-bottom:14px}
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.section-head h3{
  font-family:var(--display);font-size:13px;
  font-weight:700;letter-spacing:0.2px;
  color:var(--muted);text-transform:uppercase;
  white-space:nowrap;
}
.section-line{flex:1;height:1px;background:var(--border)}

/* WEEK ITEMS */
.week-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:12px 14px;
  display:flex;align-items:center;gap:10px;
  margin-bottom:8px;transition:all .15s;
  cursor:default;
}
.week-item:hover{border-color:var(--border2);background:var(--surface2)}
.week-num-badge{
  font-size:10px;font-weight:700;color:var(--dim);
  background:var(--surface3);border-radius:6px;
  padding:3px 8px;flex-shrink:0;
  font-family:var(--mono);
}
.week-dates{font-size:11px;color:var(--dim);margin-top:1px;font-family:var(--mono)}
.week-right{margin-left:auto;text-align:right}
.week-dos{
  font-family:var(--display);font-size:20px;
  font-weight:800;line-height:1;
}
.week-dos-label{
  font-size:10px;color:var(--dim);
  text-transform:uppercase;letter-spacing:0.7px;
  font-family:var(--mono);
}

/* RANK CARD */
.rank-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-xl);overflow:hidden;
  margin-bottom:14px;
}
.rank-card-head{
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface2);
}
.rank-card-head h3{
  font-family:var(--display);font-size:14px;font-weight:700;
}
.rank-my-pos{
  font-family:var(--mono);font-size:12px;
  font-weight:700;color:var(--accent2);
}
.rank-list{padding:4px 0}
.rank-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 18px;transition:background .1s;
}
.rank-row:hover{background:rgba(255,255,255,0.02)}
.rank-row.me{background:var(--accent-subtle);border-left:2px solid var(--accent)}
.rank-pos-num{
  font-family:var(--display);font-size:12px;
  font-weight:800;color:var(--dim);min-width:22px;
}
.rank-pos-num.gold{color:#f59e0b}
.rank-pos-num.silver{color:#94a3b8}
.rank-pos-num.bronze{color:#b45309}
.rank-av-sm{
  width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-weight:700;
  font-size:10px;flex-shrink:0;
}
.rank-name-sm{
  font-size:13px;font-weight:500;
  flex:1;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
}
.rank-val{
  font-family:var(--mono);font-size:13px;
  font-weight:600;min-width:44px;text-align:right;
}
.rank-me-chip{
  font-size:9px;font-weight:700;
  padding:2px 6px;border-radius:4px;
  background:var(--accent-subtle);
  color:var(--accent2);margin-left:4px;flex-shrink:0;
  font-family:var(--mono);
}

/* ══════════════════════════ ADMIN SCREEN ══════════════════════════ */
#s-admin{background:var(--bg)}
.admin-body{
  flex:1;padding:16px;
  max-width:760px;margin:0 auto;width:100%;
}

/* TABS */
.tabs{
  display:flex;gap:2px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:3px;margin-bottom:16px;
  overflow-x:auto;flex-shrink:0;
}
.tab{
  flex:1;min-width:fit-content;
  padding:8px 14px;border:none;
  border-radius:var(--r-sm);
  background:none;color:var(--muted);
  font-family:var(--sans);font-size:12px;
  font-weight:500;cursor:pointer;
  transition:all .15s;white-space:nowrap;
  display:flex;align-items:center;gap:6px;
  justify-content:center;
}
.tab.active{
  background:var(--surface3);
  color:var(--text);
  box-shadow:0 1px 4px rgba(0,0,0,0.3);
}
.tab-panel{display:none}
.tab-panel.show{display:block;animation:fadeup .25s ease}
@keyframes fadeup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* KPIs */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(min-width:480px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;text-align:center;
  transition:all .15s;
}
.kpi:hover{border-color:var(--border2);transform:translateY(-2px)}
.kpi-val{
  font-family:var(--display);font-size:24px;
  font-weight:800;letter-spacing:-0.6px;
  margin-bottom:4px;
}
.kpi-label{
  font-size:10px;font-weight:600;color:var(--dim);
  text-transform:uppercase;letter-spacing:0.8px;
  font-family:var(--mono);
}

/* CHART CARDS */
.chart-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-xl);padding:18px;margin-bottom:12px;
}
.chart-card h4{
  font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:1px;
  margin-bottom:16px;display:flex;align-items:center;gap:8px;
  font-family:var(--mono);
}
.chart-card canvas{max-height:200px}
.two-charts{
  display:grid;grid-template-columns:1fr;
  gap:12px;margin-bottom:12px;
}
@media(min-width:520px){.two-charts{grid-template-columns:1fr 1fr}}

/* AGENTS TABLE */
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap svg{
  position:absolute;left:12px;top:50%;
  transform:translateY(-50%);
  color:var(--dim);pointer-events:none;
}
.search-box{
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  padding:10px 12px 10px 38px;
  color:var(--text);font-size:13px;
  font-family:var(--sans);outline:none;
  transition:all .15s;
}
.search-box:focus{border-color:var(--accent);background:var(--accent-subtle)}
.search-box::placeholder{color:var(--dim)}
.table-wrap{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-xl);overflow:hidden;
}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:var(--surface2)}
th{
  padding:10px 13px;text-align:left;
  font-size:10px;font-weight:700;
  color:var(--dim);text-transform:uppercase;
  letter-spacing:0.8px;
  border-bottom:1px solid var(--border);
  white-space:nowrap;cursor:pointer;
  user-select:none;font-family:var(--mono);
}
th:hover{color:var(--muted)}
th.sorted{color:var(--accent2)}
td{
  padding:10px 13px;
  border-bottom:1px solid var(--border);
  white-space:nowrap;transition:background .1s;
}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
tr{cursor:pointer}
.cat-chip{
  font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:5px;
  text-transform:uppercase;letter-spacing:0.5px;
  font-family:var(--mono);
}
.cat-chip.SR{background:rgba(124,58,237,0.15);color:#a78bfa}

/* TEAM CARDS */
.team-card{

/* WEEKLY TAB */

/* CYCLE BAR */

/* MODAL */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(8px);
  z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .25s;
}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{
  background:var(--surface);
  border-radius:24px 24px 0 0;
  border-top:1px solid var(--border);
  padding:20px 18px 40px;
  width:100%;max-width:540px;
  max-height:80vh;overflow-y:auto;
  transform:translateY(40px);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.modal::before{
  content:'';position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  width:40%;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent2),transparent);
}
.modal-bg.open .modal{transform:none}
.modal-handle{
  width:36px;height:4px;

}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}

/* TOAST */

  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--surface3);border:1px solid var(--border2);
  border-radius:var(--r);padding:10px 18px;

  z-index:200;white-space:nowrap;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ANIMATIONS */
@keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.anim{animation:fadein .35s ease both}
.anim-d1{animation-delay:.06s}
.anim-d2{animation-delay:.12s}
.anim-d3{animation-delay:.18s}
.anim-d4{animation-delay:.24s}

/* SCROLLBAR */

/* SHIMMER (loading skeleton) */

<script>
/* ═══════════════════════════════════════════════════════════
   CONFIG — Replace this URL with your deployed GAS URL
   ═══════════════════════════════════════════════════════════ */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwP-q3oD0QcsdYuKV2xFMFaB--JeWRr43DJm6ZKvMaZR--7EW4kHKQnxxZs1ihy9WcQFg/exec';

/* ═══ STATE ═══ */
let DATA = null;
let SORTED_KEY = 'conv';
let SORTED_DIR = -1;
let ALL_AGENTS_FILTERED = [];
let CHARTS = {};
let currentTab = 0;
let retryCount = 0;

/* ═══ HELPERS ═══ */
const show = id => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('show'));
  document.getElementById(id).classList.add('show');
};
const initials = n => (n||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?';
const AV_BG = ['#7c3aed','#10b981','#f59e0b','#3b82f6','#ec4899','#14b8a6','#ef4444','#8b5cf6'];
const avBg = n => AV_BG[(n||'').charCodeAt(0) % AV_BG.length];
const pct = (v, d=1) => v != null ? (v*100).toFixed(d)+'%' : '—';
const statusClass = s => s==='ON TRACK'?'green':s==='WATCH'?'yellow':s==='OFF TRACK'?'red':'gray';
const fmt = n => n != null ? n : '—';
const sleep = ms => new Promise(r => setTimeout(r, ms));
const destroyChart = k => { if(CHARTS[k]){ CHARTS[k].destroy(); delete CHARTS[k]; } };

function showToast(msg, duration=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

/* ═════════════════════════════════════
   GAS FETCH — Handles CORS via no-cors
   redirect follow pattern
   ═════════════════════════════════════ */
async function gasFetch(params = {}) {
  const url = new URL(GAS_URL);
  url.searchParams.set('t', Date.now());
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  
  const r = await fetch(url.toString(), {
    method: 'GET',
    redirect: 'follow',
    cache: 'no-store',
  });
  const text = await r.text();
  // GAS sometimes wraps in callback — strip if needed
  const clean = text.trim().replace(/^[^{[]*/, '').replace(/[^}\]]*$/, '');
  return JSON.parse(clean || text);
}

/* ═══════════════ INIT ═══════════════ */
async function init() {
  const msg = document.getElementById('loading-msg');
  
  // Attempt to load data
  const attempt = async () => {
    try {
      msg.innerHTML = '<span class="loading-dots">Loading system data</span>';
      const data = await gasFetch();
      if (data.error) throw new Error(data.error);
      DATA = data;
      msg.innerHTML = '✓ Ready';
      await sleep(400);
      show('s-login');
    } catch(e) {
      retryCount++;
      if (retryCount <= 3) {
        msg.innerHTML = `<span class="loading-dots">Retrying (${retryCount}/3)</span>`;
        await sleep(2500);
        return attempt();
      } else {
        // Show error on login screen itself
        show('s-login');
        // Inject error notice above login card
        const outer = document.querySelector('.login-outer');
        const errDiv = document.createElement('div');
        errDiv.className = 'error-card anim';
        errDiv.innerHTML = `
          <h3>⚠ Could not load system data</h3>
          <p>The Google Apps Script may be unreachable or not deployed correctly.<br>
          Check that the deployment is set to <strong>"Anyone"</strong> access,<br>
          then try again.</p>
          <button class="btn-retry" onclick="location.reload()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Retry
          </button>`;
        outer.prepend(errDiv);
      }
    }
  };
  
  await attempt();
}

/* ═══════════════ LOGIN ═══════════════ */
async function doLogin() {
  const email = document.getElementById('inp-email').value.trim();
  const pass  = document.getElementById('inp-pass').value.trim();
  const btn   = document.getElementById('btn-login');
  const err   = document.getElementById('login-err');
  err.style.display = 'none';
  
  if (!email || !pass) {
    err.textContent = 'Please enter email and password.';
    err.style.display = 'block';
    return;
  }
  
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  
  try {
    const j = await gasFetch({ action:'login', email, pass });
    btn.disabled = false;
    btn.textContent = 'Sign in';
    
    if (j.valid) {
      if (j.type === 'admin') {
        show('s-admin');
        renderAdmin();
      } else {
        const name = j.name || email;
        document.getElementById('agent-email-chip').textContent = email;
        show('s-agent');
        renderAgent(name, email);
      }
    } else {
      err.textContent = 'Invalid email or password.';
      err.style.display = 'block';
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Sign in';
    err.textContent = 'Connection error. Try again.';
    err.style.display = 'block';
  }
}

document.getElementById('inp-email').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('inp-pass').focus(); });
document.getElementById('inp-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
function logout() { show('s-login'); showToast('Signed out'); }

/* ══════════════════════════════════════
   AGENT VIEW
   ══════════════════════════════════════ */
function renderAgent(name, email) {
  const agents = DATA.agents || [];
  let ag = agents.find(a => a.name.toLowerCase() === name.toLowerCase());
  if (!ag) {
    const local = email.split('@')[0].toLowerCase().replace(/[._\-]/g,' ');
    ag = agents.find(a => {
      const n = a.name.toLowerCase();
      return n.includes(local.split(' ')[0]) || local.includes(n.split(' ')[0]);
    });
  }
  
  const body = document.getElementById('agent-body');
  
  if (!ag) {
    body.innerHTML = `<div class="empty anim">
      <svg class="empty-icon" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p style="font-size:13px;margin-bottom:4px">Agent not found</p>
      <p style="font-size:11px;color:var(--dim)">No data for <strong style="color:var(--muted)">${email}</strong></p>
    </div>`;
    return;
  }
  
  document.getElementById('agent-cat-badge').textContent = ag.category;
  document.getElementById('agent-email-chip').textContent = email;

  const conv    = ag.overallConv;
  const tgt     = ag.target;
  const gap     = conv != null ? (conv - tgt) : null;
  const gapStr  = gap != null ? (gap >= 0 ? '+' : '') + pct(gap) : '—';
  const gapClr  = gap == null ? 'var(--dim)' : gap >= 0 ? 'var(--green)' : 'var(--red)';
  const convW   = conv != null ? Math.min(100, (conv/tgt)*100) : 0;
  const stCls   = statusClass(ag.curWeekStatus);
  const cycleDay   = DATA.cycleDay || 1;
  const cycleTotal = DATA.cycleDayTotal || 22;
  const cyclePct   = Math.round((cycleDay/cycleTotal)*100);

  // Rank
  const ranked = [...agents].filter(a => a.overallConv != null)
    .sort((a,b) => b.overallConv - a.overallConv);
  const myRank = ranked.findIndex(a => a.name === ag.name) + 1;

  // Weeks
  const weeksHTML = (ag.weeks || []).map((wk, i) => {
    const sc = statusClass(wk.status);
    return `<div class="week-item anim" style="animation-delay:${.08+i*.05}s">
      <div class="week-num-badge">${wk.label}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:600">${wk.label}</div>
        <div class="week-dates">${wk.start} → ${wk.end}</div>
      </div>
      <div class="week-right">
        <div class="week-dos" style="color:${wk.weekStarted&&wk.dos>0?'var(--green)':'var(--muted)'}">${wk.weekStarted ? wk.dos : '—'}</div>
        <div class="week-dos-label">DOs</div>
      </div>
      <div style="margin-left:8px"><span class="pill ${sc}"><span class="pill-dot"></span>${wk.status}</span></div>

  }).join('');

  // Leaderboard top 10
  const top10 = ranked.slice(0, 10);
  const rankHTML = top10.map((a, i) => {
    const isMe = a.name === ag.name;
    const pos  = i + 1;
    const posCls = pos===1?'gold':pos===2?'silver':pos===3?'bronze':'';
    return `<div class="rank-row${isMe?' me':''}">
      <div class="rank-pos-num ${posCls}">${pos}</div>
      <div class="rank-av-sm" style="background:${avBg(a.name)}">${initials(a.name)}</div>

  const convFillCls = convW >= 100 ? 'green' : convW >= 80 ? 'yellow' : 'red';

  body.innerHTML = `
  <!-- HERO -->
  <div class="hero anim">
    <div class="hero-top">
      <div class="avatar" style="background:${avBg(ag.name)}">${initials(ag.name)}</div>
      <div style="min-width:0">

    </div>
    <div class="prog-row" style="margin-bottom:0">
      <div class="prog-label"><span>Conv% vs target</span><span class="prog-val">${pct(conv)} / ${pct(tgt)}</span></div>
      <div class="prog-track"><div class="prog-fill ${convFillCls}" style="width:${convW}%"></div></div>
    </div>
  </div>

  <!-- STATS GRID -->
  <div class="stats-grid">
    <div class="stat anim anim-d1">
      <div class="stat-label">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Active Leads
      </div>
      <div class="stat-val">${ag.leads}</div>
      <div class="stat-sub">In system</div>
    </div>
    <div class="stat anim anim-d2">
      <div class="stat-label">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        DOs Converted
      </div>
      <div class="stat-val" style="color:var(--green)">${ag.dosConv}</div>
      <div class="stat-sub">Cycle total</div>
    </div>
    <div class="stat anim anim-d3">
      <div class="stat-label">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Conv%

      <div class="stat-val" style="color:${conv!=null&&conv>=tgt?'var(--green)':'var(--red)'}">${pct(conv)}</div>

    <div class="stat anim anim-d4">
      <div class="stat-label">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
        Gap
      </div>
      <div class="stat-val" style="color:${gapClr}">${gapStr}</div>
      <div class="stat-sub">${gap==null?'No data':gap>=0?'Above target':'Below target'}</div>
    </div>
  </div>

  <!-- DO BREAKDOWN -->
  <div class="stat anim anim-d5" style="display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-radius:var(--r);margin-bottom:14px;padding:0;overflow:hidden">

      <div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;font-family:var(--mono)">Pure DOs</div>
      <div style="font-family:var(--display);font-size:20px;font-weight:800;color:var(--accent2)">${ag.dosPure||0}</div>
    </div>
    <div style="padding:14px;text-align:center;border-right:1px solid var(--border)">

function renderAdmin() {

}

function renderOverview() {
  const agents    = DATA.agents || [];
  // DOs from agents array (tracked agents)
  const totalDOs  = agents.reduce((s,a) => s + a.dosConv, 0);
  // Grand total DOs from E_Ps sheet (h2 column) — passed from GAS as DATA.totalDOsSheet
  const grandDOs  = DATA.totalDOsSheet != null ? DATA.totalDOsSheet : totalDOs;
  const withConv  = agents.filter(a => a.overallConv != null);
  const avgConv   = withConv.length ? withConv.reduce((s,a) => s + a.overallConv, 0) / withConv.length : null;
  const onTrack   = agents.filter(a => a.curWeekStatus === 'ON TRACK').length;

  document.getElementById('tab-0').innerHTML = `
  <div class="kpi-grid">
    <div class="kpi anim">
      <div class="kpi-val" style="color:var(--blue)">${agents.length}</div>
      <div class="kpi-label">Agents</div>
    </div>
    <div class="kpi anim anim-d1">
      <div class="kpi-val" style="color:var(--green)">${grandDOs}</div>
      <div class="kpi-label">Total DOs</div>
      ${grandDOs !== totalDOs ? `<div style="font-size:10px;color:var(--dim);margin-top:3px;font-family:var(--mono)">${totalDOs} tracked</div>` : ''}
    </div>
    <div class="kpi anim anim-d2">
      <div class="kpi-val" style="color:var(--accent2)">${avgConv!=null?pct(avgConv):'—'}</div>
      <div class="kpi-label">Avg Conv%</div>
    </div>
    <div class="kpi anim anim-d3">
      <div class="kpi-val" style="color:var(--yellow)">${onTrack}</div>
      <div class="kpi-label">On Track</div>
    </div>
  </div>
  <div class="two-charts">
    <div class="chart-card anim"><h4>Status Distribution</h4><canvas id="c-status"></canvas></div>
    <div class="chart-card anim anim-d1"><h4>By Category</h4><canvas id="c-cat"></canvas></div>
  </div>
  <div class="chart-card anim"><h4>Top 10 — Conv%</h4><canvas id="c-top" style="max-height:280px"></canvas></div>
  <div class="chart-card anim"><h4>DO Sources</h4><canvas id="c-src"></canvas></div>`;

  // Shared datalabels plugin (inline, no CDN needed)
  const dataLabelPlugin = {
    id: 'customLabels',
    afterDatasetsDraw(chart) {
      const ctx = chart.ctx;
      chart.data.datasets.forEach((dataset, i) => {
        const meta = chart.getDatasetMeta(i);
        if (meta.hidden) return;
        meta.data.forEach((bar, idx) => {
          const val = dataset.data[idx];
          if (!val && val !== 0) return;
          const {x, y} = bar.tooltipPosition();
          ctx.save();
          ctx.font = `600 11px "JetBrains Mono", monospace`;
          ctx.fillStyle = 'rgba(255,255,255,0.85)';
          ctx.textAlign = 'center';
          ctx.textBaseline = chart.options.indexAxis === 'y' ? 'middle' : 'bottom';
          const label = dataset.label === 'Conv%' ? val + '%' : val;
          if (chart.options.indexAxis === 'y') {
            ctx.textAlign = 'left';
            ctx.fillText(label, x + 6, y);
          } else {
            ctx.fillText(label, x, y - 5);
          }
          ctx.restore();
        });
      });
    }
  };

  setTimeout(() => {
    const onT  = agents.filter(a => a.curWeekStatus === 'ON TRACK').length;
    const wtch = agents.filter(a => a.curWeekStatus === 'WATCH').length;
    const offT = agents.filter(a => a.curWeekStatus === 'OFF TRACK').length;
    const noD  = agents.filter(a => !['ON TRACK','WATCH','OFF TRACK'].includes(a.curWeekStatus)).length;

    // ── Status doughnut — with center total label ──
    destroyChart('status');
    const statusCanvas = document.getElementById('c-status');
    const centerPlugin = {
      id: 'centerText',
      beforeDraw(chart) {
        const {ctx, chartArea:{width,height,left,top}} = chart;
        ctx.save();
        const cx = left + width/2, cy = top + height/2;
        ctx.font = `800 28px "Syne", sans-serif`;
        ctx.fillStyle = '#f0f0f8';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(onT+wtch+offT+noD, cx, cy - 8);
        ctx.font = `500 11px "DM Sans", sans-serif`;
        ctx.fillStyle = 'rgba(152,152,184,0.8)';
        ctx.fillText('agents', cx, cy + 14);
        ctx.restore();
      }
    };
    CHARTS.status = new Chart(statusCanvas, {
      type: 'doughnut',
      plugins: [centerPlugin],
      data: {
        labels: ['On Track','Watch','Off Track','No Data'],
        datasets: [{ data: [onT,wtch,offT,noD], backgroundColor: ['rgba(16,185,129,.85)','rgba(245,158,11,.85)','rgba(244,63,94,.85)','rgba(90,90,122,.4)'], borderWidth:0, hoverOffset:5 }]
      },
      options: {
        responsive:true, cutout:'62%',
        plugins:{
          legend:{ position:'bottom', labels:{ color:'rgba(255,255,255,.55)', boxWidth:8, font:{size:10}, padding:12,
            generateLabels: chart => chart.data.labels.map((l,i) => ({
              text: `${l}  ${chart.data.datasets[0].data[i]}`,
              fillStyle: chart.data.datasets[0].backgroundColor[i],
              hidden: false, index: i
            }))
          }}
        }
      }
    });

    // ── By Category bar with data labels ──
    const cats = ['SR','OG','JR'];
    const catDOs   = cats.map(c => agents.filter(a=>a.category===c).reduce((s,a)=>s+a.dosConv,0));
    const catAgCnt = cats.map(c => agents.filter(a=>a.category===c).length);
    destroyChart('cat');
    CHARTS.cat = new Chart(document.getElementById('c-cat'), {
      type: 'bar',
      plugins: [dataLabelPlugin],
      data: {
        labels: cats.map((c,i) => `${c} (${catAgCnt[i]})`),
        datasets: [
          { label:'DOs', data: catDOs, backgroundColor: ['rgba(124,58,237,.8)','rgba(16,185,129,.8)','rgba(245,158,11,.8)'], borderRadius:7, borderSkipped:false }
        ]
      },
      options: {
        responsive:true,
        plugins:{ legend:{display:false} },
        scales:{
          x:{ grid:{display:false}, ticks:{color:'rgba(255,255,255,.55)', font:{size:12, weight:'600'}} },
          y:{ grid:{color:'rgba(255,255,255,.05)'}, ticks:{color:'rgba(255,255,255,.4)'}, beginAtZero:true }
        }
      }
    });

    // ── Top 10 Conv% horizontal bar with data labels ──
    const top10 = [...agents].filter(a => a.overallConv != null).sort((a,b) => b.overallConv - a.overallConv).slice(0,10);
    destroyChart('top');
    CHARTS.top = new Chart(document.getElementById('c-top'), {
      type: 'bar',
      plugins: [dataLabelPlugin],
      data: {
        labels: top10.map(a => a.name.split(' ')[0]),
        datasets: [{
          label: 'Conv%',
          data: top10.map(a => +(a.overallConv*100).toFixed(1)),
          backgroundColor: top10.map(a => a.overallConv>=a.target?'rgba(16,185,129,.8)':'rgba(244,63,94,.7)'),
          borderRadius:5, borderSkipped:false
        }]
      },
      options: {
        indexAxis:'y', responsive:true,
        plugins:{ legend:{display:false} },
        layout:{ padding:{ right: 50 } },
        scales:{
          x:{ grid:{color:'rgba(255,255,255,.05)'}, ticks:{color:'rgba(255,255,255,.4)', callback:v=>v+'%'}, max: Math.max(...top10.map(a=>+(a.overallConv*100).toFixed(1)))*1.25 },
          y:{ grid:{display:false}, ticks:{color:'rgba(255,255,255,.7)', font:{size:12}} }
        }
      }
    });

    // ── Sources bar with data labels ──
    const srcMap = {};
    agents.forEach(a => Object.entries(a.sources||{}).forEach(([k,v]) => { srcMap[k]=(srcMap[k]||0)+v; }));
    const srcKeys = Object.keys(srcMap).sort((a,b) => srcMap[b]-srcMap[a]).slice(0,8);
    destroyChart('src');
    CHARTS.src = new Chart(document.getElementById('c-src'), {
      type: 'bar',
      plugins: [dataLabelPlugin],
      data: {
        labels: srcKeys,
        datasets: [{ label:'DOs', data: srcKeys.map(k=>srcMap[k]), backgroundColor: srcKeys.map((_,i)=>`hsla(${260+i*22},65%,60%,.75)`), borderRadius:5, borderSkipped:false }]
      },
      options: {
        responsive:true,
        plugins:{ legend:{display:false} },
        scales:{
          x:{ grid:{display:false}, ticks:{color:'rgba(255,255,255,.45)', font:{size:10}} },
          y:{ grid:{color:'rgba(255,255,255,.05)'}, ticks:{color:'rgba(255,255,255,.4)'}, beginAtZero:true }
        }
      }
    });
  }, 80);
}

function renderAgentsTab() {
  ALL_AGENTS_FILTERED = [...(DATA.agents||[])];
  const ranked = [...(DATA.agents||[])].filter(a => a.overallConv != null).sort((a,b) => b.overallConv - a.overallConv);
  const rankMap = {}; ranked.forEach((a,i) => rankMap[a.name] = i+1);

  document.getElementById('tab-1').innerHTML = `
  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-box" id="agent-search" placeholder="Search name, team, category…" oninput="filterTable()">
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th onclick="sortTable('rank')" id="th-rank">#</th>
        <th onclick="sortTable('name')" id="th-name">Agent</th>
        <th onclick="sortTable('cat')" id="th-cat">Cat</th>
        <th onclick="sortTable('tl')" id="th-tl">Team</th>
        <th onclick="sortTable('leads')" id="th-leads">Leads</th>
        <th onclick="sortTable('dosConv')" id="th-dosConv">DOs</th>
        <th onclick="sortTable('conv')" id="th-conv" class="sorted">Conv%</th>
        <th>Status</th>
      </tr></thead>
      <tbody id="agents-tbody"></tbody>
    </table>
  </div>`;
  buildTableRows(rankMap);
}

function buildTableRows(rankMap) {
  if (!rankMap) {
    const ranked = [...(DATA.agents||[])].filter(a=>a.overallConv!=null).sort((a,b)=>b.overallConv-a.overallConv);
    rankMap = {}; ranked.forEach((a,i) => rankMap[a.name] = i+1);
  }
  const sorted = [...ALL_AGENTS_FILTERED].sort((a,b) => {
    let va = a[SORTED_KEY], vb = b[SORTED_KEY];
    if (SORTED_KEY==='rank') { va=rankMap[a.name]||999; vb=rankMap[b.name]||999; }
    if (SORTED_KEY==='conv') { va=a.overallConv??-1; vb=b.overallConv??-1; }
    if (va==null) return 1; if (vb==null) return -1;
    return SORTED_DIR * (va > vb ? 1 : -1);
  });
  const tbody = document.getElementById('agents-tbody');
  if (!tbody) return;
  tbody.innerHTML = sorted.map(a => {
    const sc   = statusClass(a.curWeekStatus);
    const rank = rankMap[a.name] || '—';
    return `<tr onclick="openModal('${a.name.replace(/'/g,"\\'")}')" style="animation:fadein .2s ease both">
      <td style="font-family:var(--mono);font-weight:700;color:var(--dim)">${rank}</td>
      <td style="font-weight:600">${a.name}</td>
      <td><span class="cat-chip ${a.category}">${a.category}</span></td>
      <td style="color:var(--muted)">${a.tl||'—'}</td>
      <td style="font-family:var(--mono);font-weight:600">${a.leads}</td>
      <td style="font-family:var(--mono);font-weight:700;color:var(--green)">${a.dosConv}</td>
      <td style="font-family:var(--mono);font-weight:700;color:${a.overallConv!=null&&a.overallConv>=a.target?'var(--green)':'var(--red)'}">${pct(a.overallConv)}</td>
      <td><span class="pill ${sc}" style="font-size:10px"><span class="pill-dot"></span>${a.curWeekStatus||'—'}</span></td>
    </tr>`;
  }).join('');
}

function sortTable(key) {
  if (SORTED_KEY === key) SORTED_DIR *= -1; else { SORTED_KEY = key; SORTED_DIR = -1; }
  document.querySelectorAll('th[id^="th-"]').forEach(t => t.classList.remove('sorted'));
  const th = document.getElementById('th-'+key); if(th) th.classList.add('sorted');
  buildTableRows();
}
function filterTable() {
  const q = (document.getElementById('agent-search').value||'').toLowerCase();
  ALL_AGENTS_FILTERED = q ? (DATA.agents||[]).filter(a => a.name.toLowerCase().includes(q) || (a.tl||'').toLowerCase().includes(q) || a.category.toLowerCase().includes(q)) : [...(DATA.agents||[])];
  buildTableRows();
}

function renderTeamsTab() {
  const agents = DATA.agents || [];
  const tls    = DATA.tlNames || [];
  const colors = ['#7c3aed','#10b981','#f59e0b','#3b82f6','#ec4899','#14b8a6'];
  document.getElementById('tab-2').innerHTML = tls.length ? `<div>${tls.map((tl,i) => {
    const myAg = agents.filter(a => a.tl===tl);
    const leads = myAg.reduce((s,a)=>s+a.leads,0);
    const dos   = myAg.reduce((s,a)=>s+a.dosConv,0);
    const conv  = leads>0 ? dos/leads : null;
    const onT   = myAg.filter(a=>a.curWeekStatus==='ON TRACK').length;
    const wtch  = myAg.filter(a=>a.curWeekStatus==='WATCH').length;
    const offT  = myAg.filter(a=>a.curWeekStatus==='OFF TRACK').length;
    const clr   = colors[i%colors.length];
    return `<div class="team-card anim" style="animation-delay:${i*.08}s">
      <div class="team-header">

      </div>
      <div class="team-kpis">

        <div class="tk"><div class="tk-val" style="color:var(--green)">${dos}</div><div class="tk-label">DOs</div></div>
        <div class="tk"><div class="tk-val" style="color:${conv!=null&&conv>=.2?'var(--green)':'var(--red)'}">${pct(conv)}</div><div class="tk-label">Conv%</div></div>
      </div>
      <div class="team-pills">
        <span class="pill green"><span class="pill-dot"></span>${onT} On Track</span>
        <span class="pill yellow"><span class="pill-dot"></span>${wtch} Watch</span>
        <span class="pill red"><span class="pill-dot"></span>${offT} Off Track</span>
      </div>
    </div>`;
  }).join('')}</div>` : '<div class="empty"><p>No teams configured</p></div>';
}

function renderWeeklyTab() {
  const agents  = DATA.agents || [];
  const weekMap = {};
  agents.forEach(a => (a.weeks||[]).forEach(wk => {
    if (!weekMap[wk.label]) weekMap[wk.label] = {label:wk.label,start:wk.start,end:wk.end,total:0,agents:[]};
    weekMap[wk.label].total += wk.dos;
    if (wk.dos > 0) weekMap[wk.label].agents.push({name:a.name,dos:wk.dos,cat:a.category});
  }));
  const weeks = Object.values(weekMap);
  if (!weeks.length) { document.getElementById('tab-3').innerHTML='<div class="empty"><p>No weekly data</p></div>'; return; }
  weeks.forEach(w => w.agents.sort((a,b) => b.dos - a.dos));

  document.getElementById('tab-3').innerHTML = `
  <div class="chart-card anim"><h4>DOs per Week</h4><canvas id="c-weekly"></canvas></div>
  ${weeks.map((wk,i) => `
  <div class="wk-row anim" style="animation-delay:${i*.07}s">
    <div class="wk-row-head">
      <div><div class="wk-row-title">${wk.label}</div><div class="wk-row-date">${wk.start} → ${wk.end}</div></div>
      <div class="wk-row-dos">${wk.total} DOs</div>
    </div>
    <div class="wk-agents">${wk.agents.slice(0,8).map(a => `
      <div class="wk-agent-chip">
        <span class="wk-agent-name">${a.name.split(' ')[0]}</span>
        <span class="wk-agent-dos">${a.dos}</span>
      </div>`).join('')}${wk.agents.length>8?`<div class="wk-agent-chip"><span class="wk-agent-name">+${wk.agents.length-8} more</span></div>`:''}</div>
  </div>`).join('')}`;

  setTimeout(() => {
    new Chart(document.getElementById('c-weekly'), {
      type: 'bar',
      data: { labels: weeks.map(w=>w.label), datasets: [{ label:'DOs', data: weeks.map(w=>w.total), backgroundColor: weeks.map((_,i)=>`hsla(${260+i*28},65%,65%,.75)`), borderRadius:7, borderSkipped:false }] },
      options: { responsive:true, plugins:{legend:{display:false}}, scales:{ x:{grid:{display:false},ticks:{color:'rgba(255,255,255,.4)'}}, y:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'rgba(255,255,255,.4)'}} } }
    });
  }, 80);
}

function switchTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.tab-panel').forEach((p,i) => p.classList.toggle('show', i===idx));
}

async function refreshAdmin() {
  const icon = document.getElementById('refresh-icon');
  icon.style.animation = 'spin .7s linear infinite';
  try {
    const d = await gasFetch();
    if (!d.error) { DATA = d; renderAdmin(); showToast('Data refreshed ✓'); }
  } catch(e) { showToast('Refresh failed'); }
  icon.style.animation = '';
}

/* ═══ MODAL ═══ */
function openModal(name) {
  const ag = (DATA.agents||[]).find(a => a.name === name);
  if (!ag) return;
  const ranked = [...(DATA.agents||[])].filter(a=>a.overallConv!=null).sort((a,b)=>b.overallConv-a.overallConv);
  const rank   = ranked.findIndex(a => a.name===name) + 1;
  const stCls  = statusClass(ag.curWeekStatus);
  const srcRows = Object.entries(ag.sources||{}).map(([k,v]) => `
    <div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:12px">
      <span style="color:var(--muted)">${k}</span>
      <span style="font-family:var(--mono);font-weight:700;color:var(--text)">${v}</span>
    </div>`).join('');
  document.getElementById('modal-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:22px">
      <div class="avatar" style="background:${avBg(ag.name)};width:52px;height:52px;border-radius:15px;font-size:18px">${initials(ag.name)}</div>
      <div>
        <div style="font-family:var(--display);font-size:18px;font-weight:800;letter-spacing:-.4px">${ag.name}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--mono)">${ag.category}${ag.tl?' · '+ag.tl:''} · Rank #${rank}</div>
      </div>
      <div style="margin-left:auto"><span class="pill ${stCls}"><span class="pill-dot"></span>${ag.curWeekStatus||'No data'}</span></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px">
      <div class="stat"><div class="stat-label">Leads</div><div class="stat-val">${ag.leads}</div></div>
      <div class="stat"><div class="stat-label">DOs</div><div class="stat-val" style="color:var(--green)">${ag.dosConv}</div></div>
      <div class="stat"><div class="stat-label">Conv%</div><div class="stat-val" style="color:${ag.overallConv!=null&&ag.overallConv>=ag.target?'var(--green)':'var(--red)'}">${pct(ag.overallConv)}</div></div>
      <div class="stat"><div class="stat-label">Target</div><div class="stat-val" style="color:var(--accent2)">${pct(ag.target)}</div></div>
    </div>
    ${srcRows ? `<div style="margin-top:4px"><div style="font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;font-family:var(--mono)">Sources</div>${srcRows}</div>` : ''}`;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModalBg(e) { if(e.target===document.getElementById('modal-bg')) document.getElementById('modal-bg').classList.remove('open'); }

/* ═══ CHART DEFAULTS ═══ */
Chart.defaults.color = 'rgba(255,255,255,.45)';
Chart.defaults.borderColor = 'rgba(255,255,255,.06)';
Chart.defaults.font.family = 'DM Sans';

/* ═══ SPIN KEYFRAME ═══ */
const styleEl = document.createElement('style');
styleEl.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
document.head.appendChild(styleEl);

/* ═══ START ═══ */
init();
</script>
</body>
</html>
