<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chasing Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a227;--gold2:#e8c547;--gold3:#f5d76e;--gold-lo:rgba(201,162,39,0.12);--gold-bd:rgba(201,162,39,0.3);
  --ink:#0a0a0f;--ink2:#0f0f1a;--ink3:#141422;
  --card:rgba(255,255,255,0.038);--card2:rgba(255,255,255,0.065);--card3:rgba(255,255,255,0.1);
  --border:rgba(201,162,39,0.12);--border2:rgba(201,162,39,0.22);--border3:rgba(201,162,39,0.38);
  --text:#f0e8d0;--text2:#c8b89a;--muted:#7a6a50;--dim:#3d3520;
  --emerald:#00d4a0;--emerald-lo:rgba(0,212,160,0.1);--emerald-bd:rgba(0,212,160,0.28);
  --crimson:#e8335a;--crimson-lo:rgba(232,51,90,0.1);--crimson-bd:rgba(232,51,90,0.28);
  --lapis:#3d7eff;--lapis-lo:rgba(61,126,255,0.1);--lapis-bd:rgba(61,126,255,0.28);
  --amber:#f5a623;--amber-lo:rgba(245,166,35,0.1);--amber-bd:rgba(245,166,35,0.28);
  --r:8px;--r-sm:5px;--r-lg:14px;--r-xl:20px;
  --mono:'JetBrains Mono',monospace;--serif:'Cinzel',serif;--sans:'Outfit',system-ui,sans-serif;
}
[data-theme=light]{
  --ink:#f5f0e8;--ink2:#ece5d5;--ink3:#e2d9c5;
  --card:rgba(0,0,0,0.03);--card2:rgba(0,0,0,0.055);--card3:rgba(0,0,0,0.08);
  --border:rgba(150,100,0,0.12);--border2:rgba(150,100,0,0.22);--border3:rgba(150,100,0,0.38);
  --text:#1a1208;--text2:#3a2c10;--muted:#6a5520;--dim:#c0a870;
  --gold:#9b7420;--gold2:#b8921a;--gold3:#d4a830;--gold-lo:rgba(155,116,32,0.1);--gold-bd:rgba(155,116,32,0.28);
  --emerald:#00916e;--emerald-lo:rgba(0,145,110,0.1);--emerald-bd:rgba(0,145,110,0.28);
  --crimson:#c0203e;--crimson-lo:rgba(192,32,62,0.1);--crimson-bd:rgba(192,32,62,0.28);
}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{background:var(--ink);color:var(--text);font-family:var(--sans);min-height:100vh;font-size:14px;line-height:1.55;overflow-x:hidden;transition:background .4s,color .4s}
input,button,select{font-family:var(--sans);font-size:14px}
button{cursor:pointer}

body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:repeating-linear-gradient(90deg,rgba(201,162,39,0.025) 0,rgba(201,162,39,0.025) 1px,transparent 1px,transparent 60px),repeating-linear-gradient(0deg,rgba(201,162,39,0.025) 0,rgba(201,162,39,0.025) 1px,transparent 1px,transparent 60px);background-size:60px 60px}

.horus-bg{position:fixed;bottom:30px;right:30px;width:110px;height:110px;opacity:.04;pointer-events:none;z-index:0;transition:opacity .5s}

.scr{display:none;min-height:100vh;flex-direction:column;position:relative;z-index:1}
.scr.on{display:flex}

/* LOADING */
#sl{align-items:center;justify-content:center;gap:28px;background:var(--ink)}
.ld-center{display:flex;flex-direction:column;align-items:center;gap:20px}
.ld-eye{width:90px;height:90px;animation:eyeFloat 3s ease-in-out infinite}
@keyframes eyeFloat{0%,100%{transform:translateY(0);filter:drop-shadow(0 0 12px rgba(201,162,39,0.5))}50%{transform:translateY(-6px);filter:drop-shadow(0 0 28px rgba(201,162,39,0.9))}}
.ld-title{font-family:var(--serif);font-size:30px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--gold);text-shadow:0 0 40px rgba(201,162,39,0.5);animation:titlePulse 2s ease-in-out infinite}
@keyframes titlePulse{0%,100%{text-shadow:0 0 20px rgba(201,162,39,0.4)}50%{text-shadow:0 0 50px rgba(201,162,39,0.8)}}
.ld-subtitle{font-size:10px;letter-spacing:6px;text-transform:uppercase;color:var(--muted);font-family:var(--mono)}
.ld-bar{width:280px;height:2px;background:var(--dim);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold3));animation:ldFill 3s cubic-bezier(.4,0,.2,1) forwards;border-radius:2px;position:relative}
.ld-fill::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.6),transparent);animation:shimmer 1.5s infinite}
@keyframes ldFill{0%{width:0}60%{width:68%}85%{width:87%}100%{width:100%}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.ld-msg{font-size:10px;color:var(--muted);font-family:var(--mono);letter-spacing:2px;text-transform:uppercase}

/* TOPBAR */
.topbar{height:58px;background:rgba(10,10,15,0.92);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:80;backdrop-filter:blur(20px)}
[data-theme=light] .topbar{background:rgba(245,240,232,0.92)}
.tb-logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.tb-eye{width:36px;height:24px;flex-shrink:0}
.tb-name{font-family:var(--serif);font-size:15px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);text-shadow:0 0 16px rgba(201,162,39,0.3)}
.tb-gap{flex:1}
.tb-tag{font-size:9px;font-weight:600;padding:3px 9px;border-radius:20px;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase}
.tag-agent{background:var(--gold-lo);color:var(--gold);border:1px solid var(--gold-bd)}
.tag-admin{background:var(--lapis-lo);color:var(--lapis);border:1px solid var(--lapis-bd)}
.icon-btn{background:none;border:1px solid var(--border);border-radius:var(--r-sm);padding:7px;color:var(--muted);display:flex;align-items:center;transition:all .15s}
.icon-btn:hover{border-color:var(--gold-bd);color:var(--gold);background:var(--gold-lo)}
.live-pill{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:600;font-family:var(--mono);color:var(--emerald);background:var(--emerald-lo);border:1px solid var(--emerald-bd);border-radius:20px;padding:3px 10px;letter-spacing:1px}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--emerald);animation:ldot 1.8s ease-in-out infinite}
@keyframes ldot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
.theme-btn{width:46px;height:26px;border:1px solid var(--border2);border-radius:20px;background:var(--card2);position:relative;transition:all .2s;flex-shrink:0}
.theme-knob{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));position:absolute;top:3px;left:4px;transition:transform .25s cubic-bezier(.4,0,.2,1);font-size:9px;display:flex;align-items:center;justify-content:center}
[data-theme=light] .theme-knob{transform:translateX(20px)}
.chip-user{font-size:10px;color:var(--muted);font-family:var(--mono);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ts-chip{font-size:9px;font-family:var(--mono);color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:5px}
.ts-dot{width:4px;height:4px;border-radius:50%;background:var(--emerald);animation:ldot 2s ease-in-out infinite}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--emerald);flex-shrink:0;position:relative}
.pdot::after{content:'';position:absolute;inset:-3px;border-radius:50%;background:var(--emerald);opacity:.2;animation:pring 2.5s ease-in-out infinite}
@keyframes pring{0%{transform:scale(1);opacity:.25}100%{transform:scale(2.8);opacity:0}}
.pdot.busy{background:var(--amber);animation:pblink 1s linear infinite}
@keyframes pblink{0%,100%{opacity:1}50%{opacity:.3}}

/* LOGIN */
#slog{align-items:center;justify-content:center;padding:24px;background:var(--ink)}
.log-wrap{width:100%;max-width:400px}
.log-brand{display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:40px;animation:fadeDown .7s ease both}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:none}}
.log-eye{width:72px;height:48px;filter:drop-shadow(0 0 20px rgba(201,162,39,0.6))}
.log-title{font-family:var(--serif);font-size:26px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--gold);text-align:center;animation:titlePulse 3s ease-in-out infinite}
.log-divider{width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:2px 0}
.log-card{background:var(--card);border:1px solid var(--border2);border-radius:var(--r-xl);padding:34px 32px;position:relative;overflow:hidden;animation:fadeUp .8s ease both .2s;opacity:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.log-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold3),var(--gold),transparent)}
.log-h{font-family:var(--serif);font-size:18px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--gold2);margin-bottom:4px;text-align:center}
.log-sub{color:var(--muted);font-size:11px;margin-bottom:26px;text-align:center;letter-spacing:1.5px;text-transform:uppercase;font-family:var(--mono)}
.fld{margin-bottom:14px}
.fld-lbl{display:block;font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:7px;font-family:var(--mono)}
.fld-wrap{position:relative;display:flex;align-items:center}
.fld-wrap svg{position:absolute;left:12px;color:var(--muted);pointer-events:none;flex-shrink:0}
.fld-wrap input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:12px 12px 12px 38px;color:var(--text);outline:none;transition:all .2s;font-family:var(--sans)}
.fld-wrap input:focus{border-color:var(--gold);background:var(--gold-lo);box-shadow:0 0 0 3px rgba(201,162,39,0.1)}
.fld-wrap input::placeholder{color:var(--dim)}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:var(--r);color:#0a0a0f;font-size:12px;font-weight:700;letter-spacing:4px;text-transform:uppercase;font-family:var(--serif);margin-top:10px;transition:all .2s;box-shadow:0 4px 24px rgba(201,162,39,0.3);position:relative;overflow:hidden}
.btn-login::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);transition:left .5s}
.btn-login:hover::before{left:100%}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,162,39,0.55)}
.btn-login:active{transform:scale(0.99)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}
.log-err{background:var(--crimson-lo);border:1px solid var(--crimson-bd);border-radius:var(--r);padding:10px 14px;color:var(--crimson);font-size:12px;margin-top:12px;display:none;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

.body-wrap{flex:1;padding:18px 16px;max-width:700px;margin:0 auto;width:100%}
.body-wrap-wide{flex:1;padding:18px 16px;max-width:960px;margin:0 auto;width:100%}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card-gold-top::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent)}

/* HERO CARD */
.hero-card{background:var(--card);border:1px solid var(--border2);border-radius:var(--r-xl);padding:24px;margin-bottom:14px;position:relative;overflow:hidden;animation:revealCard .5s ease both}
@keyframes revealCard{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.hero-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold3),var(--gold),transparent)}
.hero-card::after{content:'';position:absolute;top:0;right:0;width:180px;height:180px;background:radial-gradient(circle at 100% 0,rgba(201,162,39,0.08),transparent 60%);pointer-events:none}
.avatar{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:16px;font-weight:700;color:var(--ink);flex-shrink:0;position:relative}
.avatar::after{content:'';position:absolute;inset:-2px;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--gold3));z-index:-1}
.hero-name{font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:1px;line-height:1.15;color:var(--gold)}
.hero-meta{font-size:10px;color:var(--muted);margin-top:3px;font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase}

/* PILL */
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:9px;font-weight:600;font-family:var(--mono);letter-spacing:1px;white-space:nowrap;text-transform:uppercase}
.pill-dot{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0}
.pill.green{background:var(--emerald-lo);color:var(--emerald);border:1px solid var(--emerald-bd)}
.pill.red{background:var(--crimson-lo);color:var(--crimson);border:1px solid var(--crimson-bd)}
.pill.yellow{background:var(--amber-lo);color:var(--amber);border:1px solid var(--amber-bd)}
.pill.gray{background:var(--card2);color:var(--muted);border:1px solid var(--border)}
.pill.gold{background:var(--gold-lo);color:var(--gold);border:1px solid var(--gold-bd)}

/* PROGRESS */
.prog-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:8px;align-items:center}
.prog-val{font-weight:600;color:var(--text);font-family:var(--mono)}
.prog-track{height:6px;background:var(--dim);border-radius:4px;overflow:hidden;position:relative}
.prog-fill{height:100%;border-radius:4px;transition:width 1.4s cubic-bezier(.4,0,.2,1);position:relative}
.prog-fill::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);animation:shimmer 2.5s infinite}
.prog-fill.green{background:linear-gradient(90deg,var(--emerald),#4de8c0)}
.prog-fill.yellow{background:linear-gradient(90deg,var(--amber),#f5d076)}
.prog-fill.red{background:linear-gradient(90deg,var(--crimson),#f56080)}
.prog-fill.gold{background:linear-gradient(90deg,var(--gold),var(--gold3))}

/* STATS */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sg4{grid-template-columns:repeat(4,1fr)}
@media(max-width:480px){.sg4{grid-template-columns:1fr 1fr}}
.st{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;transition:all .2s;position:relative;overflow:hidden}
.st::before{content:'';position:absolute;top:0;left:0;width:2px;height:0;background:linear-gradient(180deg,var(--gold),transparent);transition:height .4s ease}
.st:hover{border-color:var(--gold-bd);transform:translateY(-2px)}
.st:hover::before{height:100%}
.st-lbl{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;font-family:var(--mono)}
.st-val{font-size:28px;font-weight:700;letter-spacing:-0.5px;line-height:1;font-family:var(--serif)}
.st-sub{font-size:10px;color:var(--muted);margin-top:4px;font-family:var(--mono)}

/* SECTION HEAD */
.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.sec-head h3{font-size:9px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:2.5px;white-space:nowrap;font-family:var(--serif)}
.sec-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}

/* WEEK ROW */
.wk-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px;display:flex;align-items:center;gap:10px;margin-bottom:8px;transition:all .2s;position:relative;overflow:hidden}
.wk-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:linear-gradient(90deg,var(--gold-lo),transparent);transition:width .3s}
.wk-item:hover{border-color:var(--gold-bd);transform:translateX(4px)}
.wk-item:hover::before{width:100%}
.wk-badge{font-size:8px;font-weight:700;color:var(--muted);background:var(--card2);border-radius:4px;padding:3px 7px;flex-shrink:0;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;border:1px solid var(--border)}
.wk-label{font-size:12px;font-weight:500}
.wk-dates{font-size:9px;color:var(--muted);font-family:var(--mono);margin-top:1px;letter-spacing:.5px}
.wk-dos{font-size:22px;font-weight:700;line-height:1;text-align:right;font-family:var(--serif)}
.wk-dos-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono)}
.wk-gap-chip{font-size:9px;font-weight:600;font-family:var(--mono);padding:3px 8px;border-radius:5px;white-space:nowrap}
.wk-gap-chip.pos{background:var(--emerald-lo);color:var(--emerald)}
.wk-gap-chip.neg{background:var(--crimson-lo);color:var(--crimson)}

/* RANK */
.rank-card{background:var(--card);border:1px solid var(--border2);border-radius:var(--r-xl);overflow:hidden;margin-bottom:14px}
.rank-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--card2);position:relative}
.rank-head::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent)}
.rank-head h3{font-family:var(--serif);font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
.rank-my{font-size:10px;font-weight:700;color:var(--gold2);font-family:var(--mono);letter-spacing:1px}
.rank-row{display:flex;align-items:center;gap:10px;padding:10px 20px;transition:background .12s}
.rank-row:hover{background:var(--card2)}
.rank-row.me{background:var(--gold-lo);border-left:2px solid var(--gold)}
.rank-n{font-size:11px;font-weight:700;color:var(--dim);min-width:22px;font-family:var(--serif)}
.rank-n.g{color:#ffd700}.rank-n.s{color:#c0c0c0}.rank-n.b{color:#cd7f32}
.rank-av{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--ink);flex-shrink:0;font-family:var(--serif)}
.rank-name{font-size:12px;font-weight:400;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-val{font-size:12px;font-weight:700;font-family:var(--mono);min-width:46px;text-align:right}
.me-chip{font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px;background:var(--gold-lo);color:var(--gold);margin-left:5px;font-family:var(--mono)}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:3px;margin-bottom:16px;overflow-x:auto}
.tab{flex:1;min-width:fit-content;padding:9px 14px;border:1px solid transparent;border-radius:var(--r-sm);background:none;color:var(--muted);font-size:11px;font-weight:500;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px;justify-content:center;font-family:var(--sans)}
.tab.on{background:var(--card);color:var(--gold);border-color:var(--gold-bd);font-weight:600}
.tab:hover:not(.on){color:var(--text2);border-color:var(--border)}
.tab-panel{display:none}
.tab-panel.on{display:block;animation:panelIn .28s ease}
@keyframes panelIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:480px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 16px;text-align:center;transition:all .22s;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent);opacity:.5}
.kpi:hover{border-color:var(--gold-bd);transform:translateY(-3px)}
.kpi-val{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:5px;transition:transform .25s;font-family:var(--serif)}
.kpi:hover .kpi-val{transform:scale(1.05)}
.kpi-lbl{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--mono)}
.kpi.today-glow{border-color:var(--gold-bd);animation:kpiGlow 3s ease-in-out infinite}
@keyframes kpiGlow{0%,100%{box-shadow:0 0 0 rgba(201,162,39,0)}50%{box-shadow:0 0 24px rgba(201,162,39,0.18)}}
.kpi.today-glow .kpi-val{color:var(--gold)}

/* CHARTS */
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;margin-bottom:12px;overflow:hidden;position:relative}
.chart-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent)}
.chart-card h4{font-size:9px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;font-family:var(--serif)}
.two-charts{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:12px}
@media(min-width:520px){.two-charts{grid-template-columns:1fr 1fr}}

/* TABLE */
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.search-box{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px 10px 38px;color:var(--text);outline:none;transition:all .2s;font-family:var(--sans)}
.search-box:focus{border-color:var(--gold);background:var(--gold-lo);box-shadow:0 0 0 3px rgba(201,162,39,0.1)}
.search-box::placeholder{color:var(--muted)}
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:var(--card2)}
th{padding:10px 12px;text-align:left;font-size:8px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;font-family:var(--mono);transition:color .15s}
th:hover{color:var(--gold)}
th.sorted{color:var(--gold)}
td{padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gold-lo)}
tr{transition:all .12s;cursor:pointer}
.cat-badge{font-size:8px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:1px;font-family:var(--mono)}
.cat-badge.SR{background:rgba(201,162,39,0.15);color:var(--gold2)}
.cat-badge.OG{background:var(--emerald-lo);color:var(--emerald)}
.cat-badge.JR{background:var(--lapis-lo);color:var(--lapis)}

/* TEAM CARDS */
.team-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden;margin-bottom:12px;transition:all .22s;position:relative}
.team-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent)}
.team-card:hover{border-color:var(--gold-bd);transform:translateY(-2px)}
.team-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--card2)}
.team-av{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:16px;font-weight:700;color:var(--ink);flex-shrink:0}
.team-info h3{font-size:14px;font-weight:600;letter-spacing:.5px;font-family:var(--serif)}
.team-info p{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px;letter-spacing:.5px}
.team-kpis{display:grid;grid-template-columns:repeat(3,1fr);padding:14px 20px;gap:6px;border-bottom:1px solid var(--border)}
.tk{text-align:center}
.tk-val{font-size:22px;font-weight:700;line-height:1;font-family:var(--serif)}
.tk-lbl{font-size:8px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px;font-family:var(--mono)}
.team-pills{display:flex;gap:6px;padding:12px 20px;flex-wrap:wrap}
.agent-row{display:flex;align-items:center;gap:8px;padding:10px 20px;border-top:1px solid var(--border);transition:background .12s}
.agent-row:hover{background:var(--gold-lo)}
.agent-row-name{font-size:12px;font-weight:400;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.agent-row-dos{font-size:12px;font-weight:700;font-family:var(--mono);color:var(--emerald)}

/* WEEKLY */
.wk-week{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:10px;transition:all .2s;position:relative;overflow:hidden}
.wk-week::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:linear-gradient(90deg,var(--gold-lo),transparent);transition:width .3s;border-right:2px solid var(--gold);opacity:0}
.wk-week:hover{border-color:var(--gold-bd)}
.wk-week:hover::before{width:100%;opacity:1}
.wk-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.wk-title{font-size:13px;font-weight:600;letter-spacing:.5px;font-family:var(--serif)}
.wk-date{font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:.5px}
.wk-total{font-size:24px;font-weight:700;color:var(--emerald);font-family:var(--serif)}
.wk-agents{display:flex;flex-wrap:wrap;gap:6px}
.ag-chip{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;display:flex;align-items:center;gap:5px;transition:all .15s}
.ag-chip:hover{border-color:var(--gold-bd);background:var(--gold-lo)}
.ag-chip-name{color:var(--muted)}
.ag-chip-dos{font-family:var(--mono);font-weight:700;color:var(--emerald);font-size:11px}

/* CYCLE BANNER */
.cycle-banner{background:var(--card);border:1px solid var(--border2);border-radius:var(--r-lg);padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;gap:16px;overflow:hidden;position:relative}
.cycle-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.cycle-progress-bg{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,rgba(201,162,39,0.1),rgba(201,162,39,0.04));transition:width 1.2s ease}
.cycle-info{position:relative;z-index:1;flex:1}
.cycle-label{font-size:9px;font-weight:600;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:2px}
.cycle-val{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-top:3px;font-family:var(--serif);color:var(--gold)}
.cycle-pct{font-size:14px;font-weight:700;color:var(--gold3);font-family:var(--mono);position:relative;z-index:1}

/* MISS */
.miss-banner{background:var(--crimson-lo);border:1px solid var(--crimson-bd);border-radius:var(--r);padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;animation:blinkBorder 2.5s ease-in-out infinite}
@keyframes blinkBorder{0%,100%{border-color:var(--crimson-bd)}50%{border-color:var(--crimson)}}
.miss-text{font-size:12px;color:var(--crimson);font-weight:500}
.miss-count{font-size:20px;font-weight:700;color:var(--crimson);font-family:var(--serif);margin-left:auto}
.miss-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px}
.miss-row:last-child{border-bottom:none}
.miss-row-name{color:var(--text2);flex:1}
.miss-row-val.good{color:var(--emerald);font-weight:700;font-family:var(--mono)}
.miss-row-val.bad{color:var(--crimson);font-weight:700;font-family:var(--mono)}

/* SOURCE ROW */
.src-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.src-row:last-child{border-bottom:none}
.src-name{color:var(--text2)}
.src-val{font-weight:700;font-family:var(--mono);min-width:34px;text-align:right;color:var(--gold2)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(12px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-bg.on{opacity:1;pointer-events:all}
.modal{background:var(--ink2);border:1px solid var(--border2);border-radius:24px 24px 0 0;padding:20px 20px 48px;width:100%;max-width:580px;max-height:82vh;overflow-y:auto;transform:translateY(50px);transition:transform .38s cubic-bezier(.4,0,.2,1);position:relative}
.modal::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.modal-bg.on .modal{transform:none}
.modal-handle{width:36px;height:3px;background:var(--dim);border-radius:2px;margin:0 auto 20px}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink2);border:1px solid var(--border2);border-radius:var(--r);padding:11px 20px;font-size:13px;font-weight:500;z-index:200;white-space:nowrap;transition:transform .35s cubic-bezier(.4,0,.2,1);pointer-events:none}
.toast::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.toast.on{transform:translateX(-50%) translateY(0)}

.empty{text-align:center;padding:52px 20px;color:var(--muted);font-family:var(--serif);letter-spacing:1px}
.ts-bar{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase}
.ts-bar::before,.ts-bar::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border))}

@keyframes appear{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.a{animation:appear .4s ease both}
.a1{animation-delay:.07s}.a2{animation-delay:.13s}.a3{animation-delay:.19s}.a4{animation-delay:.25s}.a5{animation-delay:.31s}.a6{animation-delay:.37s}
</style>
</head>

const GAS='https://script.google.com/macros/s/AKfycbw1RPy-WYGGXX0hoR2Kad1j-RgxrdpdU_Y2L0jJvCy2OFVwVbDCUAyW8ZHcAq7Fk5WgJQ/exec';

const $=id=>document.getElementById(id);
const scr=id=>{document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));$(id).classList.add('on');};
const pct=(v,d=1)=>v!=null?(v*100).toFixed(d)+'%':'—';
const stCls=s=>s==='ON TRACK'?'green':s==='WATCH'?'yellow':s==='OFF TRACK'?'red':'gray';
const ini=n=>(n||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?';
const AVS=['#c9a227','#00d4a0','#3d7eff','#e8335a','#f5a623','#a855f7','#06b6d4','#f97316'];

function fmtTime(d){if(!d)return'—';const h=d.getHours().toString().padStart(2,'0'),m=d.getMinutes().toString().padStart(2,'0'),s=d.getSeconds().toString().padStart(2,'0');return h+':'+m+':'+s;}

function logout(){stopSync();VIEW=null;scr('slog');showToast('Signed out');}

async function gasFetch(p={}){
  const u=new URL(GAS);u.searchParams.set('t',Date.now());
  Object.entries(p).forEach(([k,v])=>u.searchParams.set(k,v));
  const r=await fetch(u.toString(),{method:'GET',redirect:'follow',cache:'no-store'});
  const txt=await r.text();
  const cl=txt.trim().replace(/^[^{[]*/,'').replace(/[^}\]]*$/,'');
  return JSON.parse(cl||txt);
}
async function syncData(){
  if(syncing)return;setSyncing(true);
  try{
    const d=await gasFetch();
    if(!d.error){const changed=JSON.stringify(d)!==JSON.stringify(DATA);DATA=d;lastSyncTime=new Date();if(changed){if(VIEW==='admin')patchAdmin();else if(VIEW&&VIEW.type==='agent')renderAgent(VIEW.name,VIEW.email,true);}}
  }catch(e){}
  setSyncing(false);
}
const startSync=()=>{stopSync();syncTmr=setInterval(syncData,SYNC_MS);}
const stopSync=()=>{if(syncTmr){clearInterval(syncTmr);syncTmr=null;}}
function patchAdmin(){if(curTab===0)renderOverview();else if(curTab===4)renderMissingTab();}

async function init(){
  const msg=$('ld-msg');
  const go=async()=>{
    try{msg.textContent='LOADING DATA';const d=await gasFetch();if(d.error)throw new Error(d.error);DATA=d;lastSyncTime=new Date();msg.textContent='READY';await sleep(400);scr('slog');}
    catch(e){msg.textContent='RETRYING...';await sleep(2400);return go();}
  };
  await go();
}

async function doLogin(){
  const em=$('ie').value.trim(),ps=$('ip').value.trim();
  const btn=$('btn-l'),err=$('log-err');
  err.style.display='none';
  if(!em||!ps){err.textContent='Enter email and password.';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='Authenticating…';
  try{
    const j=await gasFetch({action:'login',email:em,pass:ps});
    btn.disabled=false;btn.textContent='Enter the Portal';
    if(j.valid){
      if(j.type==='admin'){VIEW='admin';scr('sad');renderAdmin();startSync();}
      else{const nm=j.name||em;$('ag-chip').textContent=em;VIEW={type:'agent',name:nm,email:em};scr('sag');renderAgent(nm,em);startSync();}
    }else{err.textContent='Invalid email or password.';err.style.display='block';}
  }catch(e){btn.disabled=false;btn.textContent='Enter the Portal';err.textContent='Connection error. Try again.';err.style.display='block';}
}
$('ie').addEventListener('keydown',e=>{if(e.key==='Enter')$('ip').focus();});
$('ip').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function buildRows(rm){
  if(!rm){const r=[...(DATA.agents||[])].filter(a=>a.overallConv!=null).sort((a,b)=>b.overallConv-a.overallConv);rm={};r.forEach((a,i)=>rm[a.name]=i+1);}
  const sorted=[...filteredAgents].sort((a,b)=>{let va=a[SORT_KEY],vb=b[SORT_KEY];if(SORT_KEY==='rank'){va=rm[a.name]||999;vb=rm[b.name]||999;}if(SORT_KEY==='overallConv'){va=a.overallConv??-1;vb=b.overallConv??-1;}if(va==null)return 1;if(vb==null)return -1;return SORT_DIR*(va>vb?1:-1);});
  const tb=$('ag-tbody');if(!tb)return;
  tb.innerHTML=sorted.map(a=>{const sc=stCls(a.curWeekStatus);const rk=rm[a.name]||'—';const miss=a.missingQuota||0;return`<tr onclick="openMod('${a.name.replace(/'/g,"\\'")}')"><td style="font-family:var(--mono);font-weight:700;color:var(--muted)">${rk}</td><td style="font-weight:600">${a.name}</td><td><span class="cat-badge ${a.category}">${a.category}</span></td><td style="color:var(--muted)">${a.tl||'—'}</td><td style="font-family:var(--mono);font-weight:600">${a.leads}</td><td style="font-family:var(--mono);font-weight:700;color:var(--emerald)">${a.dosConv}</td><td style="font-family:var(--mono);font-weight:700;color:${a.overallConv!=null&&a.overallConv>=a.target?'var(--emerald)':'var(--crimson)'}">${pct(a.overallConv)}</td><td style="font-family:var(--mono);font-weight:700;color:${miss>0?'var(--crimson)':'var(--emerald)'}">${miss>0?'-'+miss:'✓'}</td><td><span class="pill ${sc}"><span class="pill-dot"></span>${a.curWeekStatus||'—'}</span></td></tr>`;}).join('');
}
function sortTbl(k){if(SORT_KEY===k)SORT_DIR*=-1;else{SORT_KEY=k;SORT_DIR=-1;}document.querySelectorAll('th[id^="th-"]').forEach(t=>t.classList.remove('sorted'));const th=$('th-'+k);if(th)th.classList.add('sorted');buildRows();}
function filterTbl(){const q=($('ag-srch').value||'').toLowerCase();filteredAgents=q?(DATA.agents||[]).filter(a=>a.name.toLowerCase().includes(q)||(a.tl||'').toLowerCase().includes(q)||a.category.toLowerCase().includes(q)):[...(DATA.agents||[])];buildRows();}

function renderTeamsTab(){
  const ags=DATA.agents||[];const tls=DATA.tlNames||[];
  const clrs=['#c9a227','#00d4a0','#3d7eff','#e8335a','#f5a623','#a855f7'];
  $('tp2').innerHTML=tls.length?tls.map((tl,i)=>{
    const my=ags.filter(a=>a.tl===tl);
    const leads=my.reduce((s,a)=>s+a.leads,0),dos=my.reduce((s,a)=>s+a.dosConv,0);
    const conv=leads>0?dos/leads:null;
    const onT=my.filter(a=>a.curWeekStatus==='ON TRACK').length;
    const wtch=my.filter(a=>a.curWeekStatus==='WATCH').length;
    const offT=my.filter(a=>a.curWeekStatus==='OFF TRACK').length;
    const agRows=my.slice().sort((a,b)=>(b.overallConv??-1)-(a.overallConv??-1)).map(a=>`<div class="agent-row"><div class="rank-av" style="background:${avBg(a.name)};width:24px;height:24px;border-radius:5px;font-size:8px;flex-shrink:0">${ini(a.name)}</div><div class="agent-row-name">${a.name}</div><span class="cat-badge ${a.category}" style="margin-right:4px">${a.category}</span><div class="agent-row-dos">${a.dosConv} DOs</div><span class="pill ${stCls(a.curWeekStatus)}" style="margin-left:6px"><span class="pill-dot"></span>${a.curWeekStatus||'—'}</span></div>`).join('');
    return`<div class="team-card a" style="animation-delay:${i*.07}s"><div class="team-hdr"><div class="team-av" style="background:${clrs[i%clrs.length]}">${tl.charAt(0).toUpperCase()}</div><div class="team-info"><h3>${tl}</h3><p>${my.length} agents</p></div></div><div class="team-kpis"><div class="tk"><div class="tk-val" style="color:var(--lapis)">${leads}</div><div class="tk-lbl">Leads</div></div><div class="tk"><div class="tk-val" style="color:var(--emerald)">${dos}</div><div class="tk-lbl">DOs</div></div><div class="tk"><div class="tk-val" style="color:${conv!=null&&conv>=.2?'var(--emerald)':'var(--crimson)'}">${pct(conv)}</div><div class="tk-lbl">Conv %</div></div></div><div class="team-pills"><span class="pill green"><span class="pill-dot"></span>${onT} On Track</span><span class="pill yellow"><span class="pill-dot"></span>${wtch} Watch</span><span class="pill red"><span class="pill-dot"></span>${offT} Off Track</span></div><div style="border-top:1px solid var(--border)">${agRows}</div></div>`;
  }).join(''):'<div class="empty">No teams configured</div>';
}

function renderWeeklyTab(){
  const ags=DATA.agents||[];const wkMap={};
  ags.forEach(a=>(a.weeks||[]).forEach(wk=>{if(!wkMap[wk.label])wkMap[wk.label]={label:wk.label,start:wk.start,end:wk.end,total:0,agents:[]};wkMap[wk.label].total+=wk.dos;if(wk.dos>0)wkMap[wk.label].agents.push({name:a.name,dos:wk.dos,cat:a.category,status:wk.status});}));
  const weeks=Object.values(wkMap);
  if(!weeks.length){$('tp3').innerHTML='<div class="empty">No weekly data yet</div>';return;}
  weeks.forEach(w=>w.agents.sort((a,b)=>b.dos-a.dos));
  $('tp3').innerHTML=`<div class="chart-card a"><h4>DOs per Week — All Agents</h4><div style="position:relative;height:210px"><canvas id="c-weekly"></canvas></div></div>${weeks.map((wk,i)=>`<div class="wk-week a" style="animation-delay:${i*.06}s"><div class="wk-top"><div><div class="wk-title">${wk.label}</div><div class="wk-date">${wk.start} → ${wk.end}</div></div><div class="wk-total">${wk.total}</div></div><div class="wk-agents">${wk.agents.slice(0,12).map(a=>`<div class="ag-chip"><span class="ag-chip-name">${a.name.split(' ')[0]}</span><span class="ag-chip-dos">${a.dos}</span><span class="pill ${stCls(a.status)}" style="font-size:7px;padding:2px 5px"><span class="pill-dot"></span></span></div>`).join('')}${wk.agents.length>12?`<div class="ag-chip"><span class="ag-chip-name">+${wk.agents.length-12}</span></div>`:''}</div></div>`).join('')}`;
  setTimeout(()=>{dc('weekly');new Chart($('c-weekly'),{type:'bar',data:{labels:weeks.map(w=>w.label),datasets:[{label:'DOs',data:weeks.map(w=>w.total),backgroundColor:weeks.map((_,i)=>`hsla(${40+i*32},70%,55%,.76)`),borderRadius:8,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'rgba(200,184,154,.45)'}},y:{grid:{color:'rgba(201,162,39,.05)'},ticks:{color:'rgba(200,184,154,.4)'},beginAtZero:true}}}});},90);
}

function renderMissingTab(){
  const ags=DATA.agents||[];
  const missing=ags.filter(a=>(a.missingQuota||0)>0).sort((a,b)=>(b.missingQuota||0)-(a.missingQuota||0));
  const totalMiss=missing.reduce((s,a)=>s+(a.missingQuota||0),0);
  const byTL={};ags.forEach(a=>{const t=a.tl||'SR — Independent';if(!byTL[t])byTL[t]={miss:0,agents:[]};byTL[t].miss+=(a.missingQuota||0);if((a.missingQuota||0)>0)byTL[t].agents.push(a);});
  $('tp4').innerHTML=`<div class="card card-gold-top a" style="margin-bottom:14px;display:flex;align-items:center;gap:16px;padding:18px 22px"><div><div style="font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--mono)">Agents behind</div><div style="font-size:30px;font-weight:700;color:var(--crimson);font-family:var(--serif)">${missing.length} / ${ags.length}</div></div><div style="width:1px;height:44px;background:var(--border);flex-shrink:0"></div><div><div style="font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--mono)">Total missing</div><div style="font-size:30px;font-weight:700;color:var(--crimson);font-family:var(--serif)">${totalMiss}</div></div><div style="flex:1;text-align:right"><div style="font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--mono)">On track</div><div style="font-size:30px;font-weight:700;color:var(--emerald);font-family:var(--serif)">${ags.length-missing.length}</div></div></div>
  ${Object.entries(byTL).map(([tl,dat])=>{if(!dat.agents.length)return'';return`<div class="card card-gold-top a" style="margin-bottom:12px;padding:0;overflow:hidden"><div style="padding:13px 18px;background:var(--card2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between"><div style="font-family:var(--serif);font-size:13px;font-weight:600;letter-spacing:.5px;color:var(--gold)">${tl}</div><div style="font-size:11px;font-weight:700;color:var(--crimson);font-family:var(--mono)">−${dat.miss} missing</div></div>${dat.agents.map(a=>`<div class="miss-row"><div class="rank-av" style="background:${avBg(a.name)};width:26px;height:26px;border-radius:6px;font-size:9px;flex-shrink:0;margin-right:8px">${ini(a.name)}</div><span class="miss-row-name">${a.name}</span><span class="cat-badge ${a.category}" style="margin-right:8px">${a.category}</span><span class="pill ${stCls(a.curWeekStatus)}" style="margin-right:8px"><span class="pill-dot"></span>${a.curWeekStatus||'—'}</span><span class="miss-row-val bad">−${a.missingQuota}</span></div>`).join('')}</div>`;}).join('')}
  ${!missing.length?'<div class="empty">All agents are on track!</div>':''}`;
}

function openMod(name){
  const ag=(DATA.agents||[]).find(a=>a.name===name);if(!ag)return;
  const ranked=[...(DATA.agents||[])].filter(a=>a.overallConv!=null).sort((a,b)=>b.overallConv-a.overallConv);
  const rank=ranked.findIndex(a=>a.name===name)+1;const sc=stCls(ag.curWeekStatus);
  const weeks=ag.weeks||[];
  const wkRows=weeks.map(wk=>{const s=stCls(wk.status);const g=wk.weekGap!=null?Math.round(wk.weekGap*10)/10:null;return`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:11px"><span style="flex:1;color:var(--text2)">${wk.label}</span><span style="font-family:var(--mono);font-weight:700">${wk.weekStarted?wk.dos:'—'}</span>${g!=null?`<span style="font-family:var(--mono);font-size:10px;color:${g>=0?'var(--emerald)':'var(--crimson)'}">${g>=0?'+':''}${g}</span>`:''}<span class="pill ${s}" style="font-size:7px;padding:2px 6px"><span class="pill-dot"></span>${wk.status}</span></div>`;}).join('');
  const srcRows=Object.entries(ag.sources||{}).map(([k,v])=>`<div class="src-row"><span class="src-name">${k}${k==='Partial DOC'?' ★':''}</span><span class="src-val">${v}</span></div>`).join('');
  $('mc').innerHTML=`<div style="display:flex;align-items:center;gap:14px;margin-bottom:22px"><div class="avatar" style="background:${avBg(ag.name)};width:50px;height:50px;border-radius:13px;font-size:17px">${ini(ag.name)}</div><div><div style="font-family:var(--serif);font-size:19px;font-weight:700;letter-spacing:.5px;color:var(--gold)">${ag.name}</div><div style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:3px;letter-spacing:1px">${ag.category}${ag.tl?' · '+ag.tl:''} · Rank #${rank}</div></div><div style="margin-left:auto"><span class="pill ${sc}"><span class="pill-dot"></span>${ag.curWeekStatus||'No data'}</span></div></div><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:18px"><div class="st"><div class="st-lbl">Leads</div><div class="st-val">${ag.leads}</div></div><div class="st"><div class="st-lbl">DOs Conv</div><div class="st-val" style="color:var(--emerald)">${ag.dosConv}</div></div><div class="st"><div class="st-lbl">Conv %</div><div class="st-val" style="color:${ag.overallConv!=null&&ag.overallConv>=ag.target?'var(--emerald)':'var(--crimson)'}">${pct(ag.overallConv)}</div></div><div class="st"><div class="st-lbl">Target</div><div class="st-val" style="color:var(--gold)">${pct(ag.target)}</div></div></div>${(ag.missingQuota||0)>0?`<div class="miss-banner" style="margin-bottom:16px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span class="miss-text">Missing from quota: <b>${ag.missingQuota}</b></span></div>`:''}${weeks.length?`<div style="margin-bottom:16px"><div style="font-size:9px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:2px;font-family:var(--serif);margin-bottom:10px">Weekly</div>${wkRows}</div>`:''}${srcRows?`<div><div style="font-size:9px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:2px;font-family:var(--serif);margin-bottom:10px">Sources</div>${srcRows}</div>`:''}`;
  $('mbg').classList.add('on');
}
function closeMod(e){if(e.target===$('mbg'))$('mbg').classList.remove('on');}

init();
</script>
</body>
</html>
