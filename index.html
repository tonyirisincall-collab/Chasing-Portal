<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chasing Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════
   RESET & TOKENS
══════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}

:root{
  /* ── palette ── */
  --bg:#06080f;
  --bg2:#0b0f1a;
  --bg3:#111827;
  --surface:rgba(255,255,255,0.03);
  --surface2:rgba(255,255,255,0.055);
  --surface3:rgba(255,255,255,0.09);

  /* ── teal-cyan accent ── */
  --teal:#00c9a7;
  --teal2:#00e5c3;
  --teal3:#4dffd9;
  --teal-glow:rgba(0,201,167,0.18);
  --teal-bd:rgba(0,201,167,0.25);
  --teal-lo:rgba(0,201,167,0.08);

  /* ── sky accent ── */
  --sky:#38bdf8;
  --sky-lo:rgba(56,189,248,0.08);
  --sky-bd:rgba(56,189,248,0.25);

  /* ── rose accent ── */
  --rose:#f43f5e;
  --rose-lo:rgba(244,63,94,0.08);
  --rose-bd:rgba(244,63,94,0.25);

  /* ── amber accent ── */
  --amber:#fbbf24;
  --amber-lo:rgba(251,191,36,0.08);
  --amber-bd:rgba(251,191,36,0.25);

  /* ── text ── */
  --text:#e8f0fe;
  --text2:#94a3b8;
  --muted:#475569;
  --dim:#1e293b;

  /* ── borders ── */
  --bd:rgba(255,255,255,0.06);
  --bd2:rgba(255,255,255,0.1);
  --bd3:rgba(255,255,255,0.16);

  /* ── radii & fonts ── */
  --r:8px;--r-sm:5px;--r-lg:14px;--r-xl:20px;--r-2xl:28px;
  --mono:'JetBrains Mono',monospace;
  --display:'Syne',sans-serif;
  --body:'DM Sans',system-ui,sans-serif;
}

/* LIGHT THEME */
[data-theme=light]{
  --bg:#f0f4f8;
  --bg2:#e8eef5;
  --bg3:#dde5f0;
  --surface:rgba(0,0,0,0.03);
  --surface2:rgba(0,0,0,0.055);
  --surface3:rgba(0,0,0,0.09);
  --teal:#007a65;
  --teal2:#009e82;
  --teal3:#00c9a7;
  --teal-glow:rgba(0,122,101,0.12);
  --teal-bd:rgba(0,122,101,0.28);
  --teal-lo:rgba(0,122,101,0.07);
  --sky:#0284c7;
  --sky-lo:rgba(2,132,199,0.08);
  --sky-bd:rgba(2,132,199,0.28);
  --rose:#e11d48;
  --rose-lo:rgba(225,29,72,0.08);
  --rose-bd:rgba(225,29,72,0.28);
  --amber:#d97706;
  --amber-lo:rgba(217,119,6,0.08);
  --amber-bd:rgba(217,119,6,0.28);
  --text:#0f172a;
  --text2:#334155;
  --muted:#64748b;
  --dim:#cbd5e1;
  --bd:rgba(0,0,0,0.07);
  --bd2:rgba(0,0,0,0.12);
  --bd3:rgba(0,0,0,0.18);
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--body);
  min-height:100vh;
  font-size:14px;
  line-height:1.6;
  overflow-x:hidden;
  transition:background .4s,color .4s;
}

/* ── grid pattern ── */
body::before{
  content:'';
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(0,201,167,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,201,167,0.03) 1px,transparent 1px);
  background-size:48px 48px;
  transition:opacity .4s;
}
[data-theme=light] body::before{
  background-image:
    linear-gradient(rgba(0,122,101,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,122,101,0.04) 1px,transparent 1px);
}

/* ══════════════════════════════════════════════════════════
   EYE OF HORUS SVG — INLINE
══════════════════════════════════════════════════════════ */
.horus-eye{display:inline-block}
.horus-svg{overflow:visible}

/* ══════════════════════════════════════════════════════════
   SCREENS
══════════════════════════════════════════════════════════ */
.scr{display:none;min-height:100vh;flex-direction:column;position:relative;z-index:1}
.scr.on{display:flex}

/* ══════════════════════════════════════════════════════════
   LOADING SCREEN
══════════════════════════════════════════════════════════ */
#sl{align-items:center;justify-content:center;gap:32px;background:var(--bg)}

.ld-wrap{display:flex;flex-direction:column;align-items:center;gap:24px}

/* Eye animation */
.ld-eye-wrap{position:relative;width:120px;height:80px}
.ld-eye-wrap::before{
  content:'';position:absolute;inset:-20px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,201,167,0.15) 0%,transparent 70%);
  animation:eyePulse 2.5s ease-in-out infinite;
}
@keyframes eyePulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.3);opacity:1}}

.ld-horus{animation:floatEye 3s ease-in-out infinite}
@keyframes floatEye{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

.ld-title{
  font-family:var(--display);font-size:32px;font-weight:800;
  letter-spacing:6px;text-transform:uppercase;
  background:linear-gradient(135deg,var(--teal),var(--sky),var(--teal));
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmerText 3s linear infinite;
}
@keyframes shimmerText{0%{background-position:0%}100%{background-position:200%}}

.ld-sub{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--muted);font-family:var(--mono)}

.ld-track{width:260px;height:2px;background:var(--dim);border-radius:2px;overflow:hidden;position:relative}
.ld-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--teal),var(--sky),var(--teal));
  background-size:200%;
  animation:ldFill 3s cubic-bezier(.4,0,.2,1) forwards, shimmerBar 1.5s linear infinite;
}
@keyframes ldFill{0%{width:0}60%{width:65%}85%{width:86%}100%{width:100%}}
@keyframes shimmerBar{0%{background-position:0%}100%{background-position:200%}}
.ld-msg{font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:3px;text-transform:uppercase}

/* ══════════════════════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════════════════════ */
#slog{
  align-items:center;justify-content:center;padding:24px;
  background:var(--bg);
}

/* Ambient orbs */
#slog::after{
  content:'';position:fixed;
  width:500px;height:500px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(0,201,167,0.06) 0%,transparent 70%);
  top:-100px;right:-100px;pointer-events:none;z-index:0;
}

.log-wrap{width:100%;max-width:420px;position:relative;z-index:1}

.log-brand{display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:44px}

.log-eye-container{
  position:relative;
  animation:floatEye 4s ease-in-out infinite;
}
.log-eye-container::before{
  content:'';position:absolute;inset:-16px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,201,167,0.2) 0%,transparent 70%);
  animation:eyePulse 3s ease-in-out infinite;
}

.log-title{
  font-family:var(--display);font-size:28px;font-weight:800;
  letter-spacing:6px;text-transform:uppercase;
  background:linear-gradient(135deg,var(--teal),var(--sky));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.log-divider{
  width:180px;height:1px;
  background:linear-gradient(90deg,transparent,var(--teal),transparent);
  opacity:.6;
}

.log-card{
  background:var(--surface);
  border:1px solid var(--bd2);
  border-radius:var(--r-2xl);
  padding:36px 32px;
  position:relative;overflow:hidden;
  animation:cardReveal .8s cubic-bezier(.4,0,.2,1) both .2s;
}
@keyframes cardReveal{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:none}}

.log-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--teal),var(--sky),var(--teal),transparent);
}
.log-card::after{
  content:'';position:absolute;top:-60px;right:-60px;
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(56,189,248,0.06) 0%,transparent 70%);
  pointer-events:none;
}

.log-h{
  font-family:var(--display);font-size:20px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--text);margin-bottom:4px;text-align:center;
}
.log-sub{
  color:var(--muted);font-size:10px;margin-bottom:28px;
  text-align:center;letter-spacing:2px;text-transform:uppercase;font-family:var(--mono);
}

.fld{margin-bottom:16px}
.fld-lbl{
  display:block;font-size:9px;font-weight:600;
  color:var(--teal2);text-transform:uppercase;
  letter-spacing:2.5px;margin-bottom:8px;font-family:var(--mono);
}
.fld-wrap{position:relative;display:flex;align-items:center}
.fld-icon{
  position:absolute;left:14px;color:var(--muted);
  pointer-events:none;transition:color .2s;
}
.fld-wrap input{
  width:100%;background:var(--surface2);border:1px solid var(--bd);
  border-radius:var(--r-lg);padding:13px 14px 13px 42px;
  color:var(--text);outline:none;transition:all .22s;
  font-family:var(--body);font-size:14px;
}
.fld-wrap:focus-within .fld-icon{color:var(--teal)}
.fld-wrap input:focus{
  border-color:var(--teal-bd);background:var(--teal-lo);
  box-shadow:0 0 0 3px rgba(0,201,167,0.1);
}
.fld-wrap input::placeholder{color:var(--muted)}
[data-theme=light] .fld-wrap input{background:rgba(255,255,255,0.7)}
[data-theme=light] .fld-wrap input:focus{background:rgba(255,255,255,0.9)}

.btn-login{
  width:100%;padding:15px;margin-top:12px;
  background:linear-gradient(135deg,var(--teal),var(--sky));
  border:none;border-radius:var(--r-lg);
  color:#fff;font-size:11px;font-weight:700;
  letter-spacing:4px;text-transform:uppercase;
  font-family:var(--display);cursor:pointer;
  transition:all .22s;position:relative;overflow:hidden;
  box-shadow:0 4px 24px rgba(0,201,167,0.25);
}
.btn-login::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
  transition:left .5s;
}
.btn-login:hover::before{left:100%}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(0,201,167,0.4)}
.btn-login:active{transform:scale(.99)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}

.log-err{
  background:var(--rose-lo);border:1px solid var(--rose-bd);
  border-radius:var(--r);padding:10px 14px;
  color:var(--rose);font-size:12px;margin-top:12px;
  display:none;animation:shake .3s ease;
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ══════════════════════════════════════════════════════════
   TOPBAR
══════════════════════════════════════════════════════════ */
.topbar{
  height:60px;
  background:rgba(6,8,15,0.88);
  border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 20px;gap:12px;
  flex-shrink:0;position:sticky;top:0;z-index:80;
  backdrop-filter:blur(24px);
  transition:background .4s,border-color .4s;
}
[data-theme=light] .topbar{background:rgba(240,244,248,0.9)}

.tb-logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.tb-eye-wrap{animation:floatEye 5s ease-in-out infinite}
.tb-name{
  font-family:var(--display);font-size:15px;font-weight:800;
  letter-spacing:4px;text-transform:uppercase;
  background:linear-gradient(135deg,var(--teal),var(--sky));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.tb-gap{flex:1}

.role-badge{
  font-size:8px;font-weight:700;padding:3px 10px;
  border-radius:20px;font-family:var(--mono);
  letter-spacing:1.5px;text-transform:uppercase;
}
.badge-agent{background:var(--teal-lo);color:var(--teal);border:1px solid var(--teal-bd)}
.badge-admin{background:var(--sky-lo);color:var(--sky);border:1px solid var(--sky-bd)}

.live-pill{
  display:flex;align-items:center;gap:5px;
  font-size:8px;font-weight:700;font-family:var(--mono);
  color:var(--teal);background:var(--teal-lo);
  border:1px solid var(--teal-bd);border-radius:20px;
  padding:3px 10px;letter-spacing:1px;
}
.live-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--teal);animation:blink 1.8s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.tb-chip{
  font-size:9px;color:var(--muted);font-family:var(--mono);
  max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.ts-display{
  font-size:8px;font-family:var(--mono);color:var(--muted);
  white-space:nowrap;display:flex;align-items:center;gap:4px;
}
.ts-dot{width:4px;height:4px;border-radius:50%;background:var(--teal);animation:blink 2s ease-in-out infinite}

.icon-btn{
  background:none;border:1px solid var(--bd);border-radius:var(--r-sm);
  padding:7px;color:var(--muted);display:flex;align-items:center;
  cursor:pointer;transition:all .15s;
}
.icon-btn:hover{border-color:var(--teal-bd);color:var(--teal);background:var(--teal-lo)}

/* Theme toggle */
.theme-toggle{
  width:48px;height:26px;border:1px solid var(--bd2);
  border-radius:20px;background:var(--surface2);
  position:relative;cursor:pointer;transition:all .2s;
  flex-shrink:0;
}
.theme-knob{
  width:18px;height:18px;border-radius:50%;
  background:linear-gradient(135deg,var(--teal),var(--sky));
  position:absolute;top:3px;left:4px;
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  font-size:9px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,201,167,0.4);
}
[data-theme=light] .theme-knob{transform:translateX(22px)}

/* Status dot */
.status-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--teal);flex-shrink:0;position:relative;
}
.status-dot::after{
  content:'';position:absolute;inset:-3px;border-radius:50%;
  background:var(--teal);opacity:.2;
  animation:ping 2.5s ease-in-out infinite;
}
@keyframes ping{0%{transform:scale(1);opacity:.25}100%{transform:scale(2.8);opacity:0}}
.status-dot.busy{background:var(--amber)}
.status-dot.busy::after{background:var(--amber)}

/* ══════════════════════════════════════════════════════════
   CONTENT WRAPPERS
══════════════════════════════════════════════════════════ */
.body-wrap{flex:1;padding:20px 16px;max-width:720px;margin:0 auto;width:100%}
.body-wrap-wide{flex:1;padding:20px 16px;max-width:1000px;margin:0 auto;width:100%}

/* ══════════════════════════════════════════════════════════
   CARDS
══════════════════════════════════════════════════════════ */
.card{
  background:var(--surface);border:1px solid var(--bd);
  border-radius:var(--r-lg);padding:20px;
  position:relative;overflow:hidden;transition:border-color .2s;
}
.card:hover{border-color:var(--bd2)}
.card-accent::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--teal),var(--sky),transparent);
}

/* ══════════════════════════════════════════════════════════
   HERO / PROFILE CARD
══════════════════════════════════════════════════════════ */
.hero-card{
  background:var(--surface);border:1px solid var(--bd2);
  border-radius:var(--r-2xl);padding:28px;margin-bottom:16px;
  position:relative;overflow:hidden;
  animation:slideUp .5s cubic-bezier(.4,0,.2,1) both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.hero-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--teal),var(--sky),var(--teal),transparent);
}
.hero-card::after{
  content:'';position:absolute;top:-40px;right:-40px;
  width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(56,189,248,0.05) 0%,transparent 70%);
  pointer-events:none;
}

/* Avatar */
.avatar{
  width:54px;height:54px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:18px;font-weight:800;
  color:#fff;flex-shrink:0;position:relative;
}
.avatar::before{
  content:'';position:absolute;inset:-2px;border-radius:16px;
  background:linear-gradient(135deg,var(--teal),var(--sky));z-index:-1;
  opacity:.8;
}

/* ══════════════════════════════════════════════════════════
   STATS GRID
══════════════════════════════════════════════════════════ */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.stats-grid.four{grid-template-columns:repeat(4,1fr)}
@media(max-width:500px){.stats-grid.four{grid-template-columns:repeat(2,1fr)}}

.stat-card{
  background:var(--surface);border:1px solid var(--bd);
  border-radius:var(--r-lg);padding:18px 16px;
  position:relative;overflow:hidden;transition:all .22s;
}
.stat-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:linear-gradient(180deg,var(--teal),var(--sky));
  transform:scaleY(0);transform-origin:bottom;
  transition:transform .35s cubic-bezier(.4,0,.2,1);
}
.stat-card:hover{border-color:var(--teal-bd);transform:translateY(-3px)}
.stat-card:hover::before{transform:scaleY(1)}
.stat-lbl{
  font-size:8px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:2px;
  margin-bottom:10px;font-family:var(--mono);
}
.stat-val{
  font-size:30px;font-weight:800;letter-spacing:-1px;
  line-height:1;font-family:var(--display);
}
.stat-sub{font-size:10px;color:var(--muted);margin-top:5px;font-family:var(--mono)}

/* ══════════════════════════════════════════════════════════
   PROGRESS BAR
══════════════════════════════════════════════════════════ */
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.prog-label{font-size:9px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--mono)}
.prog-val{font-size:12px;font-weight:700;color:var(--text);font-family:var(--mono)}
.prog-track{height:6px;background:var(--dim);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width 1.5s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.prog-fill::after{
  content:'';position:absolute;top:0;left:-100%;right:0;bottom:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
  animation:sweep 2.5s ease-in-out infinite;
}
@keyframes sweep{0%{left:-100%}100%{left:100%}}
.prog-fill.green{background:linear-gradient(90deg,var(--teal),var(--teal2))}
.prog-fill.yellow{background:linear-gradient(90deg,var(--amber),#fcd34d)}
.prog-fill.red{background:linear-gradient(90deg,var(--rose),#fb7185)}

/* ══════════════════════════════════════════════════════════
   PILLS / BADGES
══════════════════════════════════════════════════════════ */
.pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  font-size:8px;font-weight:700;font-family:var(--mono);
  letter-spacing:1.5px;white-space:nowrap;text-transform:uppercase;
}
.pill-dot{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0}
.pill.green{background:var(--teal-lo);color:var(--teal);border:1px solid var(--teal-bd)}
.pill.red{background:var(--rose-lo);color:var(--rose);border:1px solid var(--rose-bd)}
.pill.yellow{background:var(--amber-lo);color:var(--amber);border:1px solid var(--amber-bd)}
.pill.gray{background:var(--surface2);color:var(--muted);border:1px solid var(--bd)}
.pill.sky{background:var(--sky-lo);color:var(--sky);border:1px solid var(--sky-bd)}

.cat-badge{
  font-size:8px;font-weight:700;padding:3px 8px;border-radius:5px;
  text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);
}
.cat-SR{background:rgba(0,201,167,0.15);color:var(--teal)}
.cat-OG{background:rgba(56,189,248,0.15);color:var(--sky)}
.cat-JR{background:rgba(251,191,36,0.15);color:var(--amber)}

/* ══════════════════════════════════════════════════════════
   SECTION HEADER
══════════════════════════════════════════════════════════ */
.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.sec-head h3{
  font-size:8px;font-weight:700;color:var(--teal);
  text-transform:uppercase;letter-spacing:3px;white-space:nowrap;
  font-family:var(--display);
}
.sec-line{flex:1;height:1px;background:linear-gradient(90deg,var(--teal-bd),transparent)}

/* ══════════════════════════════════════════════════════════
   CYCLE BANNER
══════════════════════════════════════════════════════════ */
.cycle-banner{
  background:var(--surface);border:1px solid var(--teal-bd);
  border-radius:var(--r-xl);padding:18px 22px;margin-bottom:16px;
  display:flex;align-items:center;gap:16px;
  position:relative;overflow:hidden;
}
.cycle-banner::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--teal),var(--sky),transparent);
}
.cycle-bg{
  position:absolute;left:0;top:0;bottom:0;
  background:linear-gradient(90deg,rgba(0,201,167,0.07),rgba(56,189,248,0.04));
  transition:width 1.4s cubic-bezier(.4,0,.2,1);
}
.cycle-info{position:relative;z-index:1;flex:1}
.cycle-label{font-size:8px;font-weight:600;color:var(--teal);font-family:var(--mono);text-transform:uppercase;letter-spacing:2px}
.cycle-val{font-size:18px;font-weight:800;letter-spacing:-0.3px;margin-top:4px;font-family:var(--display)}
.cycle-pct{font-size:16px;font-weight:800;color:var(--teal);font-family:var(--mono);position:relative;z-index:1}

/* ══════════════════════════════════════════════════════════
   WARN BANNER (MISSING)
══════════════════════════════════════════════════════════ */
.warn-banner{
  background:var(--rose-lo);border:1px solid var(--rose-bd);
  border-radius:var(--r-lg);padding:13px 18px;margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
  animation:warnPulse 2.5s ease-in-out infinite;
}
@keyframes warnPulse{0%,100%{border-color:var(--rose-bd)}50%{border-color:var(--rose)}}
.warn-text{font-size:12px;color:var(--rose);font-weight:500}
.warn-num{font-size:22px;font-weight:800;color:var(--rose);font-family:var(--display);margin-left:auto}

/* ══════════════════════════════════════════════════════════
   WEEK ITEMS
══════════════════════════════════════════════════════════ */
.week-list{display:flex;flex-direction:column;gap:8px}
.week-item{
  background:var(--surface);border:1px solid var(--bd);
  border-radius:var(--r-lg);padding:14px 18px;
  display:flex;align-items:center;gap:12px;
  transition:all .22s;position:relative;overflow:hidden;
  cursor:default;
}
.week-item::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:0;
  background:linear-gradient(90deg,var(--teal-lo),transparent);
  transition:width .3s;border-radius:0;
}
.week-item:hover{border-color:var(--teal-bd);transform:translateX(5px)}
.week-item:hover::before{width:100%}
.week-badge{
  font-size:7px;font-weight:700;color:var(--muted);
  background:var(--surface2);border:1px solid var(--bd);
  border-radius:5px;padding:3px 8px;
  font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;flex-shrink:0;
}
.week-label{font-size:12px;font-weight:500}
.week-dates{font-size:8px;color:var(--muted);font-family:var(--mono);margin-top:2px;letter-spacing:.5px}
.week-dos{font-size:24px;font-weight:800;line-height:1;text-align:right;font-family:var(--display)}
.week-dos-lbl{font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono)}
.week-gap{
  font-size:9px;font-weight:700;font-family:var(--mono);
  padding:3px 8px;border-radius:5px;white-space:nowrap;
}
.week-gap.pos{background:var(--teal-lo);color:var(--teal)}
.week-gap.neg{background:var(--rose-lo);color:var(--rose)}

/* ══════════════════════════════════════════════════════════
   LEADERBOARD
══════════════════════════════════════════════════════════ */
.rank-card{
  background:var(--surface);border:1px solid var(--bd2);
  border-radius:var(--r-xl);overflow:hidden;margin-bottom:16px;
}
.rank-head{
  padding:16px 22px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface2);position:relative;
}
.rank-head::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--teal),transparent);
}
.rank-head h3{font-family:var(--display);font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--teal)}
.rank-my{font-size:10px;font-weight:700;color:var(--sky);font-family:var(--mono);letter-spacing:1px}

.rank-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 22px;transition:background .12s;cursor:default;
}
.rank-row:hover{background:var(--surface2)}
.rank-row.me{background:var(--teal-lo);border-left:2px solid var(--teal)}

.rank-n{font-size:12px;font-weight:800;color:var(--muted);min-width:24px;font-family:var(--display)}
.rank-n.g{color:#ffd700}.rank-n.s{color:#c0c0c0}.rank-n.b{color:#cd7f32}
.rank-av{
  width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:#fff;
  flex-shrink:0;font-family:var(--display);
}
.rank-name{font-size:12px;font-weight:400;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-val{font-size:13px;font-weight:700;font-family:var(--mono);min-width:48px;text-align:right}
.me-chip{
  font-size:7px;font-weight:700;padding:2px 6px;border-radius:4px;
  background:var(--teal-lo);color:var(--teal);margin-left:5px;
  font-family:var(--mono);border:1px solid var(--teal-bd);
}

/* ══════════════════════════════════════════════════════════
   SOURCE ROW
══════════════════════════════════════════════════════════ */
.src-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--bd);font-size:12px;
}
.src-row:last-child{border-bottom:none}
.src-name{color:var(--text2)}
.src-val{font-weight:700;font-family:var(--mono);min-width:36px;text-align:right;color:var(--teal)}

/* ══════════════════════════════════════════════════════════
   DO BREAKDOWN BOX
══════════════════════════════════════════════════════════ */
.do-breakdown{
  display:grid;grid-template-columns:repeat(3,1fr);
  border:1px solid var(--bd);border-radius:var(--r-lg);
  overflow:hidden;margin-bottom:16px;
}
.do-box{padding:18px;text-align:center}
.do-box:not(:last-child){border-right:1px solid var(--bd)}
.do-box-lbl{font-size:8px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;font-family:var(--mono)}
.do-box-val{font-size:26px;font-weight:800;line-height:1;font-family:var(--display)}

/* ══════════════════════════════════════════════════════════
   ADMIN TABS
══════════════════════════════════════════════════════════ */
.tabs{
  display:flex;gap:2px;background:var(--surface2);
  border:1px solid var(--bd);border-radius:var(--r-lg);
  padding:4px;margin-bottom:18px;overflow-x:auto;
}
.tab{
  flex:1;min-width:fit-content;padding:9px 16px;
  border:1px solid transparent;border-radius:var(--r);
  background:none;color:var(--muted);font-size:11px;font-weight:500;
  cursor:pointer;transition:all .2s;white-space:nowrap;
  display:flex;align-items:center;gap:6px;justify-content:center;
  font-family:var(--body);
}
.tab.on{
  background:var(--surface3);color:var(--teal);
  border-color:var(--teal-bd);font-weight:700;
}
.tab:hover:not(.on){color:var(--text2);border-color:var(--bd)}

.tab-panel{display:none}
.tab-panel.on{display:block;animation:panelIn .28s cubic-bezier(.4,0,.2,1)}
@keyframes panelIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ══════════════════════════════════════════════════════════
   KPI CARDS
══════════════════════════════════════════════════════════ */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media(min-width:500px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}

.kpi{
  background:var(--surface);border:1px solid var(--bd);
  border-radius:var(--r-xl);padding:20px 16px;text-align:center;
  transition:all .22s;position:relative;overflow:hidden;
}
.kpi::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--teal-bd),transparent);opacity:.5;
}
.kpi:hover{border-color:var(--teal-bd);transform:translateY(-3px)}
.kpi-val{
  font-size:30px;font-weight:800;letter-spacing:-.5px;
  margin-bottom:6px;font-family:var(--display);
  transition:transform .25s;
}
.kpi:hover .kpi-val{transform:scale(1.06)}
.kpi-lbl{font-size:8px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:2px;font-family:var(--mono)}

.kpi.highlight{
  border-color:var(--teal-bd);
  animation:kpiGlow 3s ease-in-out infinite;
}
@keyframes kpiGlow{0%,100%{box-shadow:0 0 0 rgba(0,201,167,0)}50%{box-shadow:0 0 28px rgba(0,201,167,0.15)}}
.kpi.highlight .kpi-val{color:var(--teal)}

/* ══════════════════════════════════════════════════════════
   STATUS BAR (on/watch/off)
══════════════════════════════════════════════════════════ */
.status-bar{
  display:flex;gap:0;border:1px solid var(--bd);
  border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px;
}
.status-box{
  flex:1;text-align:center;padding:18px 12px;
  border-right:1px solid var(--bd);
}
.status-box:last-child{border-right:none}
.status-box-val{font-size:28px;font-weight:800;line-height:1;font-family:var(--display)}
.status-box-lbl{font-size:8px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:6px;font-family:var(--mono)}

/* ══════════════════════════════════════════════════════════
   AGENTS TABLE
══════════════════════════════════════════════════════════ */
.search-wrap{position:relative;margin-bottom:12px}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.search-box{
  width:100%;background:var(--surface);border:1px solid var(--bd);
  border-radius:var(--r-lg);padding:11px 14px 11px 40px;
  color:var(--text);outline:none;transition:all .2s;font-family:var(--body);
}
.search-box:focus{border-color:var(--teal-bd);background:var(--teal-lo);box-shadow:0 0 0 3px rgba(0,201,167,0.08)}
.search-box::placeholder{color:var(--muted)}
[data-theme=light] .search-box{background:rgba(255,255,255,0.7)}

.tbl-wrap{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-xl);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:var(--surface2)}
th{
  padding:10px 13px;text-align:left;
  font-size:8px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:1.5px;
  border-bottom:1px solid var(--bd);white-space:nowrap;
  cursor:pointer;user-select:none;font-family:var(--mono);transition:color .15s;
}
th:hover{color:var(--teal)}
th.sorted{color:var(--teal)}
td{padding:10px 13px;border-bottom:1px solid var(--bd);white-space:nowrap}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .12s;cursor:pointer}
tbody tr:hover td{background:var(--teal-lo)}

/* ══════════════════════════════════════════════════════════
   TEAM CARDS
══════════════════════════════════════════════════════════ */
.team-card{
  background:var(--surface);border:1px solid var(--bd);
  border-radius:var(--r-2xl);overflow:hidden;margin-bottom:14px;
  transition:all .22s;position:relative;
}
.team-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--teal),var(--sky),transparent);
}
.team-card:hover{border-color:var(--teal-bd);transform:translateY(-2px)}

.team-hdr{
  padding:18px 22px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:14px;background:var(--surface2);
}
.team-av{
  width:42px;height:42px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:17px;font-weight:800;color:#fff;
}
.team-info h3{font-size:15px;font-weight:700;letter-spacing:.3px;font-family:var(--display)}
.team-info p{font-size:9px;color:var(--muted);font-family:var(--mono);margin-top:3px;letter-spacing:.5px}

.team-kpis{
  display:grid;grid-template-columns:repeat(3,1fr);
  padding:16px 22px;gap:6px;border-bottom:1px solid var(--bd);
}
.tk{text-align:center}
.tk-val{font-size:24px;font-weight:800;line-height:1;font-family:var(--display)}
.tk-lbl{font-size:7px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;font-family:var(--mono)}

.team-pills{display:flex;gap:6px;padding:13px 22px;flex-wrap:wrap;border-bottom:1px solid var(--bd)}

.agent-row{
  display:flex;align-items:center;gap:8px;
  padding:11px 22px;transition:background .12s;cursor:default;
}
.agent-row:hover{background:var(--teal-lo)}
.agent-row:not(:last-child){border-bottom:1px solid var(--bd)}
.agent-row-name{font-size:12px;font-weight:400;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.agent-row-dos{font-size:12px;font-weight:700;font-family:var(--mono);color:var(--teal)}

/* ══════════════════════════════════════════════════════════
   WEEKLY CARD
══════════════════════════════════════════════════════════ */
.wk-card{
  background:var(--surface);border:1px solid var(--bd);
  border-radius:var(--r-xl);padding:18px 20px;margin-bottom:10px;
  transition:all .2s;position:relative;overflow:hidden;
}
.wk-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:0;
  background:linear-gradient(90deg,var(--teal-lo),transparent);
  transition:width .3s;border-left:2px solid var(--teal);opacity:0;
}
.wk-card:hover{border-color:var(--teal-bd)}
.wk-card:hover::before{width:100%;opacity:1}
.wk-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.wk-title{font-size:13px;font-weight:700;letter-spacing:.3px;font-family:var(--display)}
.wk-date{font-size:8px;color:var(--muted);font-family:var(--mono);letter-spacing:.5px}
.wk-total{font-size:26px;font-weight:800;color:var(--teal);font-family:var(--display)}
.wk-chips{display:flex;flex-wrap:wrap;gap:6px}
.ag-chip{
  background:var(--surface2);border:1px solid var(--bd);
  border-radius:7px;padding:5px 11px;font-size:11px;
  display:flex;align-items:center;gap:5px;transition:all .15s;cursor:default;
}
.ag-chip:hover{border-color:var(--teal-bd);background:var(--teal-lo)}
.ag-chip-name{color:var(--muted)}
.ag-chip-dos{font-family:var(--mono);font-weight:700;color:var(--teal);font-size:11px}

/* ══════════════════════════════════════════════════════════
   MISSING TAB
══════════════════════════════════════════════════════════ */
.miss-row{
  display:flex;align-items:center;padding:10px 20px;
  border-bottom:1px solid var(--bd);font-size:12px;gap:8px;
  transition:background .12s;
}
.miss-row:last-child{border-bottom:none}
.miss-row:hover{background:var(--surface2)}
.miss-row-name{color:var(--text2);flex:1}
.miss-val{font-weight:700;font-family:var(--mono)}
.miss-val.bad{color:var(--rose)}
.miss-val.good{color:var(--teal)}

/* ══════════════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════════════ */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.8);
  backdrop-filter:blur(16px);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.modal-bg.on{opacity:1;pointer-events:all}
.modal{
  background:var(--bg2);border:1px solid var(--bd2);
  border-radius:28px 28px 0 0;padding:22px 22px 52px;
  width:100%;max-width:600px;max-height:84vh;
  overflow-y:auto;transform:translateY(50px);
  transition:transform .38s cubic-bezier(.4,0,.2,1);position:relative;
}
.modal::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,var(--teal),var(--sky),transparent);
}
.modal-bg.on .modal{transform:none}
.modal-handle{width:36px;height:3px;background:var(--dim);border-radius:2px;margin:0 auto 22px}

/* ══════════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════════ */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r-lg);
  padding:12px 22px;font-size:13px;font-weight:500;z-index:200;
  white-space:nowrap;transition:transform .35s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
.toast::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--teal),transparent);
}
.toast.on{transform:translateX(-50%) translateY(0)}

/* ══════════════════════════════════════════════════════════
   DAILY PERFORMANCE SECTION
══════════════════════════════════════════════════════════ */
.daily-agent-card{
  background:var(--surface);border:1px solid var(--bd);
  border-radius:var(--r-xl);overflow:hidden;margin-bottom:10px;
  transition:all .2s;
}
.daily-agent-card:hover{border-color:var(--teal-bd)}
.daily-agent-hdr{
  padding:13px 18px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--bd);background:var(--surface2);cursor:pointer;
}
.daily-agent-body{padding:14px 18px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.daily-stat{text-align:center}
.daily-stat-val{font-size:20px;font-weight:800;font-family:var(--display);line-height:1}
.daily-stat-lbl{font-size:8px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px;font-family:var(--mono)}

/* Daily team header */
.daily-team-hdr{
  padding:13px 18px;border-radius:var(--r-lg);margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface2);border:1px solid var(--bd);
  font-family:var(--display);font-size:14px;font-weight:700;
  color:var(--text);letter-spacing:.5px;
}
.daily-team-stats{display:flex;gap:12px;align-items:center}
.daily-team-stat{font-size:11px;color:var(--muted);font-family:var(--mono)}
.daily-team-stat span{color:var(--teal);font-weight:700}

/* Grand total bar */
.grand-total-bar{
  background:linear-gradient(135deg,rgba(0,201,167,0.1),rgba(56,189,248,0.08));
  border:1px solid var(--teal-bd);border-radius:var(--r-xl);
  padding:18px 22px;margin-bottom:16px;
  display:flex;gap:0;flex-wrap:wrap;
}
.gt-item{flex:1;min-width:80px;text-align:center;padding:0 12px}
.gt-item:not(:last-child){border-right:1px solid var(--bd)}
.gt-val{font-size:28px;font-weight:800;line-height:1;font-family:var(--display)}
.gt-lbl{font-size:8px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:5px;font-family:var(--mono)}

/* ══════════════════════════════════════════════════════════
   STAGGER ANIMATIONS
══════════════════════════════════════════════════════════ */
@keyframes appear{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.a{animation:appear .4s ease both}
.a1{animation-delay:.07s}.a2{animation-delay:.13s}.a3{animation-delay:.19s}
.a4{animation-delay:.25s}.a5{animation-delay:.31s}.a6{animation-delay:.37s}

.empty{
  text-align:center;padding:56px 20px;color:var(--muted);
  font-family:var(--display);letter-spacing:1px;font-size:13px;
}

/* ══════════════════════════════════════════════════════════
   EYE OF HORUS — SVG COMPONENT STYLES

.overflow-hidden{overflow:hidden}
</style>

<script>
/* ══════════════════════════════════════════════════════════
   CONFIG & STATE
══════════════════════════════════════════════════════════ */
const GAS = 'https://script.google.com/macros/s/AKfycbzmAQgjj6qxPELs9BP0mzFRG_ogjRnMaKgi49haPOYb92iV2iAYIvqBLPUKQh7ePBqSkg/exec';
const SYNC_MS = 60000;

let DATA = null, VIEW = null;
let SORT_KEY = 'overallConv', SORT_DIR = -1;
let syncTmr = null, syncing = false, curTab = 0;
let filteredAgents = [];
let lastSyncTime = null;

// Avatar color palette — muted & cohesive
const AV_COLORS = ['#0e7c6b','#1a6fa0','#7c3aed','#db6d28','#1a7c4a','#9b2d6b','#1e6fa0','#6d5c28'];
const avBg = n => AV_COLORS[(n || '').charCodeAt(0) % AV_COLORS.length];
const ini = n => (n || '').split(' ').slice(0, 2).map(w => w[0] || '').join('').toUpperCase() || '?';

/* ─── helpers ─── */
const $ = id => document.getElementById(id);
const scr = id => { document.querySelectorAll('.scr').forEach(s => s.classList.remove('on')); $(id).classList.add('on'); };
const pct = (v, d = 1) => v != null ? (v * 100).toFixed(d) + '%' : '—';
const stCls = s => s === 'ON TRACK' ? 'green' : s === 'WATCH' ? 'yellow' : s === 'OFF TRACK' ? 'red' : 'gray';
const sleep = ms => new Promise(r => setTimeout(r, ms));

function fmtTime(d) {
  if (!d) return '—';
  const h = d.getHours().toString().padStart(2,'0');
  const m = d.getMinutes().toString().padStart(2,'0');
  const s = d.getSeconds().toString().padStart(2,'0');
  return h + ':' + m + ':' + s;
}

function updateTimestamps() {
  const txt = lastSyncTime ? ('Synced ' + fmtTime(lastSyncTime)) : 'Connecting...';
  [$('ts-text'), $('ts-text-adm')].forEach(el => { if (el) el.textContent = txt; });
}
setInterval(updateTimestamps, 1000);

function showToast(m, d = 2800) {
  const t = $('toast');
  t.textContent = m;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), d);
}

function toggleTheme() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
  document.querySelectorAll('.theme-knob').forEach(k => k.textContent = isLight ? '☽' : '☀');
}

function setSyncing(v) {
  syncing = v;
  ['ag-dot', 'adm-dot'].forEach(id => {
    const d = $(id);
    if (d) d.classList.toggle('busy', v);
  });
}

function logout() {
  stopSync(); VIEW = null; scr('slog'); showToast('Signed out');
}

/* ── GAS fetch ── */
async function gasFetch(p = {}) {
  const u = new URL(GAS);
  u.searchParams.set('t', Date.now());
  Object.entries(p).forEach(([k, v]) => u.searchParams.set(k, v));
  const r = await fetch(u.toString(), { method: 'GET', redirect: 'follow', cache: 'no-store' });
  const txt = await r.text();
  const cl = txt.trim().replace(/^[^{[]*/,'').replace(/[^}\]]*$/,'');
  return JSON.parse(cl || txt);
}

async function syncData() {
  if (syncing) return;
  setSyncing(true);
  try {
    const d = await gasFetch();
    if (!d.error) {
      const changed = JSON.stringify(d) !== JSON.stringify(DATA);
      DATA = d;
      lastSyncTime = new Date();
      if (changed) {
        if (VIEW === 'admin') patchAdmin();
        else if (VIEW && VIEW.type === 'agent') renderAgent(VIEW.name, VIEW.email, true);
      }
    }
  } catch(e) {}
  setSyncing(false);
}

const startSync = () => { stopSync(); syncTmr = setInterval(syncData, SYNC_MS); };
const stopSync = () => { if (syncTmr) { clearInterval(syncTmr); syncTmr = null; } };
function patchAdmin() { if (curTab === 0) renderOverview(); else if (curTab === 4) renderDailyTab(); else if (curTab === 5) renderMissingTab(); }

/* ── init ── */
async function init() {
  const msg = $('ld-msg');
  const go = async () => {
    try {
      msg.textContent = 'LOADING DATA';
      const d = await gasFetch();
      if (d.error) throw new Error(d.error);
      DATA = d;
      lastSyncTime = new Date();
      msg.textContent = 'READY';
      await sleep(400);
      scr('slog');
    } catch(e) {
      msg.textContent = 'RETRYING...';
      await sleep(2400);
      return go();
    }
  };
  await go();
}

/* ── login ── */
async function doLogin() {
  const em = $('ie').value.trim(), ps = $('ip').value.trim();
  const btn = $('btn-l'), err = $('log-err');
  err.style.display = 'none';
  if (!em || !ps) { err.textContent = 'Enter email and password.'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Authenticating…';
  try {
    const j = await gasFetch({ action: 'login', email: em, pass: ps });
    btn.disabled = false; btn.textContent = 'Enter the Portal';
    if (j.valid) {
      if (j.type === 'admin') {
        VIEW = 'admin'; scr('sad'); renderAdmin(); startSync();
      } else {
        const nm = j.name || em;
        $('ag-chip').textContent = em;
        VIEW = { type: 'agent', name: nm, email: em };
        scr('sag'); renderAgent(nm, em); startSync();
      }
    } else {
      err.textContent = 'Invalid email or password.'; err.style.display = 'block';
    }
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Enter the Portal';
    err.textContent = 'Connection error. Try again.'; err.style.display = 'block';
  }
}
$('ie').addEventListener('keydown', e => { if (e.key === 'Enter') $('ip').focus(); });
$('ip').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

/* ══════════════════════════════════════════════════════════
   AGENT VIEW
══════════════════════════════════════════════════════════ */
function renderAgent(name, email, patch = false) {
  const ags = DATA.agents || [];
  let ag = ags.find(a => a.name.toLowerCase() === name.toLowerCase());
  if (!ag) {
    const lc = email.split('@')[0].toLowerCase().replace(/[._-]/g, ' ');
    ag = ags.find(a => {
      const n = a.name.toLowerCase();
      return n.includes(lc.split(' ')[0]) || lc.includes(n.split(' ')[0]);
    });
  }
  const body = $('ag-body');
  if (!ag) { body.innerHTML = '<div class="empty">Agent not found for ' + email + '</div>'; return; }

  $('ag-cat-tag').textContent = ag.category;

  const conv = ag.overallConv, tgt = ag.target;
  const gap = conv != null ? (conv - tgt) : null;
  const gapStr = gap != null ? ((gap >= 0 ? '+' : '') + pct(gap)) : '—';
  const gapClr = gap == null ? 'var(--muted)' : gap >= 0 ? 'var(--teal)' : 'var(--rose)';
  const convW = conv != null ? Math.min(100, (conv / tgt) * 100) : 0;
  const stc = stCls(ag.curWeekStatus);

  const ranked = [...ags].filter(a => a.overallConv != null).sort((a, b) => b.overallConv - a.overallConv);
  const myRank = ranked.findIndex(a => a.name === ag.name) + 1;

  const cd = DATA.cycleDay || 1, ct = DATA.cycleDayTotal || 22;
  const cpct = Math.round(cd / ct * 100);
  const missing = ag.missingQuota || 0;
  const weeks = ag.weeks || [];

  const wksHTML = weeks.map((wk, i) => {
    const sc = stCls(wk.status);
    const g2 = wk.weekGap != null ? wk.weekGap : null;
    const gC = g2 == null ? '' : g2 >= 0 ? 'pos' : 'neg';
    const gT = g2 != null ? (g2 >= 0 ? '+' : '') + Math.round(g2 * 10) / 10 : '';
    return `<div class="week-item a" style="animation-delay:${.07 + i * .05}s">
      <div class="week-badge">${wk.label}</div>
      <div style="flex:1;min-width:0">
        <div class="week-label">${wk.label}</div>
        <div class="week-dates">${wk.start} → ${wk.end}</div>
      </div>
      <div style="text-align:right">
        <div class="week-dos" style="color:${wk.weekStarted && wk.dos > 0 ? 'var(--teal)' : 'var(--muted)'}">${wk.weekStarted ? wk.dos : '—'}</div>
        <div class="week-dos-lbl">DOs</div>
      </div>
      ${gT ? `<span class="week-gap ${gC}">${gT}</span>` : ''}
      <span class="pill ${sc}"><span class="pill-dot"></span>${wk.status}</span>
    </div>`;
  }).join('');

  const top10 = ranked.slice(0, 10);
  const rankHTML = top10.map((a, i) => {
    const isMe = a.name === ag.name;
    const pos = i + 1;
    const pc = pos === 1 ? 'g' : pos === 2 ? 's' : pos === 3 ? 'b' : '';
    return `<div class="rank-row${isMe ? ' me' : ''}">
      <div class="rank-n ${pc}">${pos}</div>
      <div class="rank-av" style="background:${avBg(a.name)}">${ini(a.name)}</div>
      <div class="rank-name">${a.name}${isMe ? '<span class="me-chip">YOU</span>' : ''}</div>
      <div class="rank-val" style="color:${a.overallConv >= a.target ? 'var(--teal)' : 'var(--rose)'}">${pct(a.overallConv)}</div>
    </div>`;
  }).join('');

  const convFill = convW >= 100 ? 'green' : convW >= 80 ? 'yellow' : 'red';
  const srcHTML = Object.entries(ag.sources || {})
    .filter(([k]) => k !== 'Partial DOC')
    .map(([k, v]) => `<div class="src-row"><span class="src-name">${k}</span><span class="src-val">${v}</span></div>`).join('');

  const partialDO = ag.dosPartial || 0;
  const rechase = ag.dosRechase || 0;

  body.innerHTML = `
  <div class="cycle-banner a">
    <div class="cycle-bg" style="width:${cpct}%"></div>
    <div class="cycle-info">
      <div class="cycle-label">Cycle Progress · ${DATA.cycleLabel || 'Cycle'}</div>
      <div class="cycle-val">Day ${cd} of ${ct}</div>
    </div>
    <div class="cycle-pct">${cpct}%</div>
  </div>

  ${missing > 0 ? `
  <div class="warn-banner a">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span class="warn-text">Missing from quota</span>
    <span class="warn-num">${missing}</span>
  </div>` : ''}

  <div class="hero-card a">
    <div style="display:flex;align-items:center;gap:18px;margin-bottom:22px">

function _buildSourceSummary(ags) {
  const map = {};
  ags.forEach(a => Object.entries(a.sources || {}).forEach(([k, v]) => { map[k] = (map[k] || 0) + v; }));
  const sorted = Object.entries(map).sort((a, b) => b[1] - a[1]);

  return sorted.map(([k, v]) => `<div class="src-row"><span class="src-name">${k}</span><span class="src-val">${v}</span></div>`).join('');
}

  filteredAgents = [...(DATA.agents || [])];

    <input class="search-box" id="ag-srch" placeholder="Search name, team, category…" oninput="filterTbl()">
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th onclick="sortTbl('rank')" id="th-rank">#</th>
        <th onclick="sortTbl('name')" id="th-name">Agent</th>
        <th onclick="sortTbl('category')" id="th-category">Cat</th>
        <th onclick="sortTbl('tl')" id="th-tl">Team</th>
        <th onclick="sortTbl('leads')" id="th-leads">Leads</th>
        <th onclick="sortTbl('dosConv')" id="th-dosConv">DOs</th>
        <th onclick="sortTbl('overallConv')" id="th-overallConv" class="sorted">Conv %</th>
        <th onclick="sortTbl('missingQuota')" id="th-missingQuota">Missing</th>
        <th>Status</th>
      </tr></thead>
      <tbody id="ag-tbody"></tbody>
    </table>
  </div>`;
  buildRows(rm);
}

function buildRows(rm) {
  if (!rm) {
    const r = [...(DATA.agents || [])].filter(a => a.overallConv != null).sort((a, b) => b.overallConv - a.overallConv);
    rm = {};
    r.forEach((a, i) => rm[a.name] = i + 1);
  }
  const sorted = [...filteredAgents].sort((a, b) => {
    let va = a[SORT_KEY], vb = b[SORT_KEY];
    if (SORT_KEY === 'rank') { va = rm[a.name] || 999; vb = rm[b.name] || 999; }
    if (SORT_KEY === 'overallConv') { va = a.overallConv ?? -1; vb = b.overallConv ?? -1; }
    if (va == null) return 1; if (vb == null) return -1;
    return SORT_DIR * (va > vb ? 1 : -1);
  });
  const tb = $('ag-tbody');
  if (!tb) return;
  tb.innerHTML = sorted.map(a => {
    const sc = stCls(a.curWeekStatus);
    const rk = rm[a.name] || '—';
    const miss = a.missingQuota || 0;
    return `<tr onclick="openMod('${a.name.replace(/'/g, "\\'")}')">
      <td style="font-family:var(--mono);font-weight:700;color:var(--muted)">${rk}</td>
      <td style="font-weight:600">${a.name}</td>
      <td><span class="cat-badge cat-${a.category}">${a.category}</span></td>
      <td style="color:var(--muted)">${a.tl || '—'}</td>
      <td style="font-family:var(--mono);font-weight:600">${a.leads}</td>
      <td style="font-family:var(--mono);font-weight:700;color:var(--teal)">${a.dosConv}</td>
      <td style="font-family:var(--mono);font-weight:700;color:${a.overallConv != null && a.overallConv >= a.target ? 'var(--teal)' : 'var(--rose)'}">${pct(a.overallConv)}</td>
      <td style="font-family:var(--mono);font-weight:700;color:${miss > 0 ? 'var(--rose)' : 'var(--teal)'}">${miss > 0 ? '−' + miss : '✓'}</td>
      <td><span class="pill ${sc}"><span class="pill-dot"></span>${a.curWeekStatus || '—'}</span></td>
    </tr>`;
  }).join('');
}

function sortTbl(k) {
  if (SORT_KEY === k) SORT_DIR *= -1; else { SORT_KEY = k; SORT_DIR = -1; }
  document.querySelectorAll('th[id^="th-"]').forEach(t => t.classList.remove('sorted'));
  const th = $('th-' + k);
  if (th) th.classList.add('sorted');
  buildRows();
}

function filterTbl() {
  const q = ($('ag-srch').value || '').toLowerCase();
  filteredAgents = q ? (DATA.agents || []).filter(a =>
    a.name.toLowerCase().includes(q) || (a.tl || '').toLowerCase().includes(q) || a.category.toLowerCase().includes(q)
  ) : [...(DATA.agents || [])];
  buildRows();
}

/* ── WEEKLY TAB ── */
function renderWeeklyTab() {
  const ags = DATA.agents || [];
  const wkMap = {};
  ags.forEach(a => (a.weeks || []).forEach(wk => {
    if (!wkMap[wk.label]) wkMap[wk.label] = { label: wk.label, start: wk.start, end: wk.end, total: 0, agents: [] };
    wkMap[wk.label].total += wk.dos;
    if (wk.dos > 0) wkMap[wk.label].agents.push({ name: a.name, dos: wk.dos, cat: a.category, status: wk.status });
  }));
  const weeks = Object.values(wkMap);
  if (!weeks.length) { $('tp3').innerHTML = '<div class="empty">No weekly data yet</div>'; return; }
  weeks.forEach(w => w.agents.sort((a, b) => b.dos - a.dos));

  $('tp3').innerHTML = weeks.map((wk, i) => `
  <div class="wk-card a" style="animation-delay:${i * .06}s">

/* ── DAILY TAB (from DAILY_PERFORMANCE data via agents) ── */
function renderDailyTab() {
  const ags = DATA.agents || [];
  const tls = DATA.tlNames || [];
  const teamColors = ['#0e7c6b','#1a6fa0','#7c3aed','#db6d28','#1a7c4a','#9b2d6b'];

  // Today's DOs — from agent data: entries with today's date
  const today = new Date(); today.setHours(0,0,0,0);

  // We use the data available: curWeekDos, dosConv, etc.
  // Daily we aggregate from what the API provides
  let grandToday = 0, grandOnT = 0, grandWatch = 0, grandOffT = 0;
  let grandMissing = 0;

  const teamSections = tls.map((tl, ti) => {
    const myAgs = ags.filter(a => a.tl === tl);
    if (!myAgs.length) return '';

    let teamToday = 0, teamOnT = 0, teamWatch = 0, teamOffT = 0;

    const agCards = myAgs.map(ag => {
      const sc = stCls(ag.curWeekStatus);
      const miss = ag.missingQuota || 0;
      // curWeekDos is the DOs achieved so far this current week
      const weekDOs = ag.curWeekDos || 0;
      teamToday += weekDOs;
      if (ag.curWeekStatus === 'ON TRACK') teamOnT++;
      else if (ag.curWeekStatus === 'WATCH') teamWatch++;
      else if (ag.curWeekStatus === 'OFF TRACK') teamOffT++;
      grandToday += weekDOs;
      if (miss > 0) grandMissing += miss;
      if (ag.curWeekStatus === 'ON TRACK') grandOnT++;
      else if (ag.curWeekStatus === 'WATCH') grandWatch++;
      else if (ag.curWeekStatus === 'OFF TRACK') grandOffT++;

      return `<div class="daily-agent-card">
        <div class="daily-agent-hdr">
          <div class="rank-av" style="background:${avBg(ag.name)};width:30px;height:30px;border-radius:8px;font-size:10px;flex-shrink:0">${ini(ag.name)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:13px">${ag.name}</div>
            <div style="font-size:8px;color:var(--muted);font-family:var(--mono)">${ag.category} · ${ag.leads} leads</div>
          </div>
          <span class="pill ${sc}"><span class="pill-dot"></span>${ag.curWeekStatus || '—'}</span>
        </div>
        <div class="daily-agent-body">
          <div class="daily-stat">
            <div class="daily-stat-val" style="color:var(--teal)">${ag.dosConv}</div>
            <div class="daily-stat-lbl">Cycle DOs</div>
          </div>
          <div class="daily-stat">
            <div class="daily-stat-val" style="color:var(--sky)">${weekDOs}</div>
            <div class="daily-stat-lbl">This Week</div>
          </div>
          <div class="daily-stat">
            <div class="daily-stat-val" style="color:${miss > 0 ? 'var(--rose)' : 'var(--teal)'}">${miss > 0 ? '−' + miss : '✓'}</div>
            <div class="daily-stat-lbl">Missing</div>
          </div>
        </div>
      </div>`;
    }).join('');

    return `<div class="daily-team-hdr" style="border-left:3px solid ${teamColors[ti % teamColors.length]}">
      <div>
        <span style="font-size:15px;font-weight:800;color:var(--text)">${tl}</span>
        <span style="font-size:9px;color:var(--muted);font-family:var(--mono);margin-left:8px">${myAgs.length} agents</span>
      </div>
      <div class="daily-team-stats">
        <div class="daily-team-stat">Week DOs: <span>${teamToday}</span></div>
        <div class="daily-team-stat">ON: <span style="color:var(--teal)">${teamOnT}</span></div>
        <div class="daily-team-stat">WATCH: <span style="color:var(--amber)">${teamWatch}</span></div>
        <div class="daily-team-stat">OFF: <span style="color:var(--rose)">${teamOffT}</span></div>
      </div>
    </div>
    ${agCards}
    <div style="height:12px"></div>`;
  }).join('');

  // SR agents (no TL)
  const srAgs = ags.filter(a => !a.tl || a.tl === '');
  let srSection = '';
  if (srAgs.length) {
    const srCards = srAgs.map(ag => {
      const sc = stCls(ag.curWeekStatus);
      const miss = ag.missingQuota || 0;
      const weekDOs = ag.curWeekDos || 0;
      grandToday += weekDOs;
      if (miss > 0) grandMissing += miss;
      if (ag.curWeekStatus === 'ON TRACK') grandOnT++;
      else if (ag.curWeekStatus === 'WATCH') grandWatch++;
      else if (ag.curWeekStatus === 'OFF TRACK') grandOffT++;

      return `<div class="daily-agent-card">
        <div class="daily-agent-hdr">
          <div class="rank-av" style="background:${avBg(ag.name)};width:30px;height:30px;border-radius:8px;font-size:10px;flex-shrink:0">${ini(ag.name)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:13px">${ag.name}</div>
            <div style="font-size:8px;color:var(--muted);font-family:var(--mono)">SR Independent · ${ag.leads} leads</div>
          </div>
          <span class="pill ${sc}"><span class="pill-dot"></span>${ag.curWeekStatus || '—'}</span>
        </div>
        <div class="daily-agent-body">
          <div class="daily-stat">
            <div class="daily-stat-val" style="color:var(--teal)">${ag.dosConv}</div>
            <div class="daily-stat-lbl">Cycle DOs</div>
          </div>
          <div class="daily-stat">
            <div class="daily-stat-val" style="color:var(--sky)">${weekDOs}</div>
            <div class="daily-stat-lbl">This Week</div>
          </div>
          <div class="daily-stat">
            <div class="daily-stat-val" style="color:${miss > 0 ? 'var(--rose)' : 'var(--teal)'}">${miss > 0 ? '−' + miss : '✓'}</div>
            <div class="daily-stat-lbl">Missing</div>
          </div>
        </div>
      </div>`;
    }).join('');

    srSection = `<div class="daily-team-hdr" style="border-left:3px solid #6a1b9a">
      <div>
        <span style="font-size:15px;font-weight:800;color:var(--text)">SR — Independent</span>
        <span style="font-size:9px;color:var(--muted);font-family:var(--mono);margin-left:8px">${srAgs.length} agents</span>
      </div>
    </div>${srCards}`;
  }

  $('tp4').innerHTML = `
  <div class="grand-total-bar a">
    <div class="gt-item">
      <div class="gt-val" style="color:var(--sky)">${ags.length}</div>
      <div class="gt-lbl">Total Agents</div>
    </div>
    <div class="gt-item">
      <div class="gt-val" style="color:var(--teal)">${grandToday}</div>
      <div class="gt-lbl">This Week DOs</div>
    </div>
    <div class="gt-item">
      <div class="gt-val" style="color:var(--teal)">${grandOnT}</div>
      <div class="gt-lbl">On Track</div>
    </div>
    <div class="gt-item">
      <div class="gt-val" style="color:var(--amber)">${grandWatch}</div>
      <div class="gt-lbl">Watch</div>
    </div>
    <div class="gt-item">
      <div class="gt-val" style="color:var(--rose)">${grandOffT}</div>
      <div class="gt-lbl">Off Track</div>
    </div>
    <div class="gt-item">
      <div class="gt-val" style="color:${grandMissing > 0 ? 'var(--rose)' : 'var(--teal)'}">${grandMissing}</div>
      <div class="gt-lbl">Total Missing</div>
    </div>
  </div>
  <div class="sec-head a"><h3>By Team</h3><div class="sec-line"></div></div>
  ${teamSections}
  ${srSection}`;
}

/* ── MISSING TAB ── */
function renderMissingTab() {
  const ags = DATA.agents || [];
  const missing = ags.filter(a => (a.missingQuota || 0) > 0).sort((a, b) => (b.missingQuota || 0) - (a.missingQuota || 0));
  const totalMiss = missing.reduce((s, a) => s + (a.missingQuota || 0), 0);
  const byTL = {};
  ags.forEach(a => {
    const t = a.tl || 'SR — Independent';
    if (!byTL[t]) byTL[t] = { miss: 0, agents: [] };
    byTL[t].miss += (a.missingQuota || 0);
    if ((a.missingQuota || 0) > 0) byTL[t].agents.push(a);
  });

  $('tp5').innerHTML = `
  <div class="grand-total-bar a">
    <div class="gt-item">
      <div class="gt-val" style="color:var(--rose)">${missing.length}</div>
      <div class="gt-lbl">Agents Behind</div>
    </div>
    <div class="gt-item" style="border-right:1px solid var(--bd)">
      <div class="gt-val" style="color:var(--rose)">${totalMiss}</div>
      <div class="gt-lbl">Total Missing</div>
    </div>
    <div class="gt-item">
      <div class="gt-val" style="color:var(--teal)">${ags.length - missing.length}</div>
      <div class="gt-lbl">On Track</div>
    </div>
    <div class="gt-item">
      <div class="gt-val" style="color:var(--sky)">${ags.length}</div>
      <div class="gt-lbl">Total Agents</div>
    </div>
  </div>

  ${!missing.length ? '<div class="empty">🎉 All agents are on track!</div>' : ''}

  ${Object.entries(byTL).map(([tl, dat]) => {
    if (!dat.agents.length) return '';
    return `<div class="card card-accent a" style="margin-bottom:12px;padding:0;overflow:hidden">
      <div style="padding:14px 20px;background:var(--surface2);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between">
        <div style="font-family:var(--display);font-size:14px;font-weight:700;color:var(--text)">${tl}</div>
        <div style="font-size:12px;font-weight:700;color:var(--rose);font-family:var(--mono)">−${dat.miss} missing</div>
      </div>
      ${dat.agents.map(a =>
        `<div class="miss-row">
          <div class="rank-av" style="background:${avBg(a.name)};width:28px;height:28px;border-radius:7px;font-size:9px;flex-shrink:0">${ini(a.name)}</div>
          <span class="miss-row-name">${a.name}</span>
          <span class="cat-badge cat-${a.category}" style="margin-right:8px">${a.category}</span>
          <span class="pill ${stCls(a.curWeekStatus)}" style="margin-right:8px"><span class="pill-dot"></span>${a.curWeekStatus || '—'}</span>
          <span class="miss-val bad">−${a.missingQuota}</span>
        </div>`
      ).join('')}
    </div>`;
  }).join('')}`;
}

/* ── AGENT MODAL ── */
function openMod(name) {
  const ag = (DATA.agents || []).find(a => a.name === name);
  if (!ag) return;
  const ranked = [...(DATA.agents || [])].filter(a => a.overallConv != null).sort((a, b) => b.overallConv - a.overallConv);
  const rank = ranked.findIndex(a => a.name === name) + 1;
  const sc = stCls(ag.curWeekStatus);
  const weeks = ag.weeks || [];

  const wkRows = weeks.map(wk => {
    const s = stCls(wk.status);
    const g = wk.weekGap != null ? Math.round(wk.weekGap * 10) / 10 : null;
    return `<div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--bd);font-size:11px">
      <span style="flex:1;color:var(--text2)">${wk.label}</span>
      <span style="font-family:var(--mono);font-weight:700">${wk.weekStarted ? wk.dos : '—'}</span>
      ${g != null ? `<span style="font-family:var(--mono);font-size:10px;color:${g >= 0 ? 'var(--teal)' : 'var(--rose)'}">${g >= 0 ? '+' : ''}${g}</span>` : ''}
      <span class="pill ${s}" style="font-size:7px;padding:2px 6px"><span class="pill-dot"></span>${wk.status}</span>
    </div>`;
  }).join('');

  const srcRows = Object.entries(ag.sources || {}).map(([k, v]) =>
    `<div class="src-row"><span class="src-name">${k}</span><span class="src-val">${v}</span></div>`
  ).join('');

  $('mc').innerHTML = `
  <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
    <div class="avatar" style="background:${avBg(ag.name)};width:52px;height:52px;border-radius:14px;font-size:18px">${ini(ag.name)}</div>
    <div>
      <div style="font-family:var(--display);font-size:20px;font-weight:800;color:var(--text)">${ag.name}</div>
      <div style="font-size:9px;color:var(--muted);font-family:var(--mono);margin-top:4px;letter-spacing:1.5px;text-transform:uppercase">${ag.category}${ag.tl ? ' · ' + ag.tl : ''} · Rank #${rank}</div>
    </div>
    <div style="margin-left:auto"><span class="pill ${sc}"><span class="pill-dot"></span>${ag.curWeekStatus || 'No data'}</span></div>
  </div>

  <div class="stats-grid" style="margin-bottom:20px">
    <div class="stat-card"><div class="stat-lbl">Leads</div><div class="stat-val">${ag.leads}</div></div>
    <div class="stat-card"><div class="stat-lbl">DOs Conv</div><div class="stat-val" style="color:var(--teal)">${ag.dosConv}</div></div>
    <div class="stat-card"><div class="stat-lbl">Conv %</div><div class="stat-val" style="color:${ag.overallConv != null && ag.overallConv >= ag.target ? 'var(--teal)' : 'var(--rose)'}">${pct(ag.overallConv)}</div></div>
    <div class="stat-card"><div class="stat-lbl">Target</div><div class="stat-val" style="color:var(--amber)">${pct(ag.target)}</div></div>
  </div>

  ${(ag.missingQuota || 0) > 0 ? `
  <div class="warn-banner" style="margin-bottom:18px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span class="warn-text">Missing from quota: <strong>${ag.missingQuota}</strong></span>
  </div>` : ''}

  ${weeks.length ? `
  <div style="margin-bottom:18px">
    <div class="sec-head"><h3>Weekly</h3><div class="sec-line"></div></div>
    ${wkRows}
  </div>` : ''}

  ${srcRows ? `
  <div>
    <div class="sec-head"><h3>Sources</h3><div class="sec-line"></div></div>
    ${srcRows}
  </div>` : ''}`;

  $('mbg').classList.add('on');
}

function closeMod(e) { if (e.target === $('mbg')) $('mbg').classList.remove('on'); }

/* ── BOOT ── */
init();
</script>
</body>
</html>
