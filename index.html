<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ICO Chasing Portal</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CradialGradient id='g' cx='50%25' cy='40%25' r='60%25'%3E%3Cstop offset='0%25' stop-color='%23f5d078'/%3E%3Cstop offset='100%25' stop-color='%23c9952a'/%3E%3C/radialGradient%3E%3C/defs%3E%3Cellipse cx='50' cy='52' rx='38' ry='26' fill='%23c9952a' opacity='0.18'/%3E%3Cellipse cx='50' cy='52' rx='30' ry='20' fill='none' stroke='%23c9952a' stroke-width='1.5'/%3E%3Cellipse cx='50' cy='52' rx='12' ry='12' fill='url(%23g)'/%3E%3Ccircle cx='50' cy='52' r='5' fill='%230a0700'/%3E%3Ccircle cx='50' cy='52' r='2.5' fill='%23f5d078'/%3E%3Cpath d='M18 52 Q34 36 50 52 Q66 68 82 52' fill='none' stroke='%23c9952a' stroke-width='2'/%3E%3Cpath d='M18 52 Q34 68 50 52 Q66 36 82 52' fill='none' stroke='%23c9952a' stroke-width='2'/%3E%3Cline x1='50' y1='8' x2='50' y2='24' stroke='%23c9952a' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='50' y1='78' x2='50' y2='92' stroke='%23c9952a' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='8' y1='52' x2='20' y2='52' stroke='%23c9952a' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='80' y1='52' x2='92' y2='52' stroke='%23c9952a' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05040a;
  --surface: #0c0b14;
  --card: #12101c;
  --card2: #1a1727;
  --border: #2a2540;
  --gold: #c9952a;
  --gold2: #e8b84b;
  --gold3: #f5d078;
  --copper: #a85e1e;
  --text: #f0ead8;
  --muted: #7a7090;
  --faint: #32293d;
  --red: #e03a3a;
  --green: #34c57a;
  --yellow: #f0b429;
  --ease: cubic-bezier(.4,0,.2,1);
  --radius: 14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Raleway',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* NOISE TEXTURE */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* AMBIENT GLOW */
body::after{content:'';position:fixed;top:-30%;left:50%;z-index:0;pointer-events:none;width:1000px;height:600px;background:radial-gradient(ellipse,rgba(201,149,42,.06) 0%,transparent 65%);transform:translateX(-50%)}

.z1{position:relative;z-index:1}

/* ─── SCREENS ─── */
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* ═══════════════════════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════════════════════ */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;position:relative}
#loginScreen.active{display:flex}

/* Eye SVG animation */
.login-eye-wrap{display:flex;justify-content:center;margin-bottom:28px}
.login-eye-svg{width:90px;height:90px;filter:drop-shadow(0 0 24px rgba(201,149,42,.4));animation:eyePulse 3s ease-in-out infinite}
@keyframes eyePulse{0%,100%{filter:drop-shadow(0 0 16px rgba(201,149,42,.3))}50%{filter:drop-shadow(0 0 32px rgba(201,149,42,.6))}}

.pupil-anim{animation:pupilBreath 3s ease-in-out infinite}
@keyframes pupilBreath{0%,100%{r:5.5}50%{r:7}}

.login-box{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:48px 44px;width:100%;max-width:440px;position:relative;overflow:hidden}
.login-box::before{content:'';position:absolute;top:0;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:99px}
.login-box::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(201,149,42,.3),transparent)}

.login-brand{text-align:center;margin-bottom:36px}
.login-logo{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:900;letter-spacing:.15em;background:linear-gradient(135deg,var(--gold),var(--gold3),var(--gold));background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite}
@keyframes shimmer{to{background-position:200% center}}
.login-tagline{font-size:.7rem;letter-spacing:.4em;color:var(--muted);text-transform:uppercase;margin-top:6px;font-family:'Cinzel',serif}
.login-hiero{font-size:.9rem;color:var(--faint);letter-spacing:4px;margin-top:8px}

.form-group{margin-bottom:18px}
.form-label{display:block;font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.form-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;color:var(--text);font-family:'Raleway',sans-serif;font-size:.95rem;outline:none;transition:border-color .25s,box-shadow .25s}
.form-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,149,42,.12)}
.form-input::placeholder{color:var(--faint)}

.role-tabs{display:flex;gap:8px;margin-bottom:24px;background:var(--card);border-radius:12px;padding:5px}
.role-tab{flex:1;padding:10px;text-align:center;border-radius:8px;cursor:pointer;font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;letter-spacing:.1em;color:var(--muted);transition:all .25s;border:none;background:none}
.role-tab.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0800}

.login-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0800;font-family:'Cinzel',serif;font-size:.88rem;font-weight:700;letter-spacing:.12em;border:none;border-radius:12px;cursor:pointer;transition:opacity .2s,transform .2s,box-shadow .2s;margin-top:8px}
.login-btn:hover{opacity:.9;transform:translateY(-2px);box-shadow:0 10px 32px rgba(201,149,42,.35)}
.login-error{color:var(--red);font-size:.8rem;text-align:center;margin-top:12px;min-height:20px;font-family:'Cinzel',serif;letter-spacing:.05em}

/* ═══════════════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════════════ */
.portal-header{position:sticky;top:0;z-index:50;background:rgba(5,4,10,.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 40px}
.header-brand{display:flex;align-items:center;gap:14px}
.header-eye{width:36px;height:36px;flex-shrink:0}
.header-title{font-family:'Cinzel',serif;font-weight:900;font-size:1rem;letter-spacing:.15em;background:linear-gradient(135deg,var(--gold),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{font-size:.6rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;font-family:'Cinzel',serif}
.header-divider{width:1px;height:28px;background:var(--border);margin:0 6px}
.header-right{display:flex;align-items:center;gap:16px}
.header-hiero{color:var(--faint);font-size:.85rem;letter-spacing:3px}
.header-user{font-family:'Cinzel',serif;font-size:.75rem;color:var(--gold2);letter-spacing:.08em;font-weight:700}
.header-role-badge{font-family:'Cinzel',serif;font-size:.6rem;font-weight:700;letter-spacing:.1em;padding:4px 12px;border-radius:99px;text-transform:uppercase}
.header-role-badge.admin{background:rgba(201,149,42,.15);border:1px solid rgba(201,149,42,.4);color:var(--gold)}
.header-role-badge.agent{background:rgba(52,197,122,.12);border:1px solid rgba(52,197,122,.35);color:var(--green)}
.logout-btn{font-family:'Cinzel',serif;font-size:.68rem;font-weight:700;letter-spacing:.08em;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:7px 14px;cursor:pointer;transition:border-color .2s,color .2s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

@media(max-width:640px){.portal-header{padding:0 16px}.header-hiero,.header-sub{display:none}}

/* ═══════════════════════════════════════════════════════════
   PORTAL LAYOUT
═══════════════════════════════════════════════════════════ */
#portalScreen{display:none}
#portalScreen.active{display:block}
.portal-body{max-width:1440px;margin:0 auto;padding:40px 40px 80px}

/* ═══════════════════════════════════════════════════════════
   SECTION HEADERS
═══════════════════════════════════════════════════════════ */
.sec-eyebrow{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:12px}
.sec-eyebrow::before{content:'';flex:none;width:24px;height:1px;background:var(--gold);opacity:.5}
.sec-title{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:700;color:var(--text);margin-bottom:4px}
.sec-subtitle{font-size:.82rem;color:var(--muted);line-height:1.6}

/* ═══════════════════════════════════════════════════════════
   LOADING STATE
═══════════════════════════════════════════════════════════ */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 40px;gap:20px}
.loading-eye{font-size:2.5rem;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.9)}50%{opacity:1;transform:scale(1)}}
.loading-bar{width:220px;height:2px;background:var(--faint);border-radius:99px;overflow:hidden}
.loading-bar::after{content:'';display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold3));animation:loadbar 1.6s var(--ease) infinite;transform-origin:left}
@keyframes loadbar{0%{transform:scaleX(0) translateX(0)}50%{transform:scaleX(1) translateX(0)}100%{transform:scaleX(0) translateX(220px)}}
.loading-text{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.3em;color:var(--muted);text-transform:uppercase}

/* ═══════════════════════════════════════════════════════════
   KPI CARDS
═══════════════════════════════════════════════════════════ */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:36px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px 22px 18px;position:relative;overflow:hidden;transition:border-color .3s,transform .3s;animation:fadeUp .5s var(--ease) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.kpi-card:hover{border-color:rgba(201,149,42,.3);transform:translateY(-3px)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold3));opacity:0;transition:opacity .3s}
.kpi-card:hover::before{opacity:1}
.kpi-label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.kpi-value{font-family:'Cinzel',serif;font-size:2rem;font-weight:900;line-height:1;margin-bottom:6px}
.kpi-value.gold{background:linear-gradient(135deg,var(--gold),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.kpi-value.green{color:var(--green)}
.kpi-value.red{color:var(--red)}
.kpi-value.yellow{color:var(--yellow)}
.kpi-meta{font-size:.75rem;color:var(--muted)}
.kpi-glyph{position:absolute;bottom:12px;right:16px;font-size:1.4rem;opacity:.12}

/* ═══════════════════════════════════════════════════════════
   TABLE
═══════════════════════════════════════════════════════════ */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:32px}
.table-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.table-title{font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;color:var(--text);letter-spacing:.08em}
.table-tag{font-family:'Cinzel',serif;font-size:.6rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:4px 12px;border-radius:99px;background:rgba(201,149,42,.1);border:1px solid rgba(201,149,42,.3);color:var(--gold)}
.tbl{width:100%;border-collapse:collapse;font-size:.82rem}
.tbl th{background:#0a0812;color:var(--muted);font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:12px 16px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;font-weight:700}
.tbl td{padding:12px 16px;border-bottom:1px solid rgba(42,37,64,.5);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:background .2s}
.tbl tbody tr:hover{background:rgba(201,149,42,.04)}
.tbl tbody tr:nth-child(even){background:rgba(26,23,39,.5)}
.tbl tbody tr:nth-child(even):hover{background:rgba(201,149,42,.05)}

.agent-name{font-weight:700;color:var(--text);font-family:'Cinzel',serif;font-size:.78rem}
.tl-name{color:var(--muted);font-size:.75rem}

.cat-badge{display:inline-block;font-family:'Cinzel',serif;font-size:.6rem;font-weight:700;letter-spacing:.1em;padding:3px 10px;border-radius:6px;text-transform:uppercase}
.cat-SR{background:#4a148c;color:#fff}
.cat-OG{background:#1565c0;color:#fff}
.cat-JR{background:#2e7d32;color:#fff}

/* STATUS PILLS */
.pill{display:inline-flex;align-items:center;gap:5px;font-family:'Cinzel',serif;font-size:.62rem;font-weight:700;letter-spacing:.1em;padding:4px 12px;border-radius:99px;white-space:nowrap}
.pill-green{background:rgba(52,197,122,.15);border:1px solid rgba(52,197,122,.4);color:var(--green)}
.pill-yellow{background:rgba(240,180,41,.15);border:1px solid rgba(240,180,41,.4);color:var(--yellow)}
.pill-red{background:rgba(224,58,58,.15);border:1px solid rgba(224,58,58,.4);color:var(--red)}
.pill-gray{background:rgba(122,112,144,.1);border:1px solid rgba(122,112,144,.25);color:var(--muted)}
.pill::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pill-green::before{background:var(--green);box-shadow:0 0 6px var(--green)}
.pill-yellow::before{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
.pill-red::before{background:var(--red);box-shadow:0 0 6px var(--red)}
.pill-gray::before{background:var(--muted)}

/* CONV VALUES */
.conv-val{font-family:'Cinzel',serif;font-weight:700;font-size:.85rem}
.conv-gold{background:linear-gradient(135deg,var(--gold),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.conv-purple{color:#c084fc}
.conv-muted{color:var(--muted)}

/* PROGRESS BAR */
.prog-bar{background:var(--card2);border-radius:99px;height:6px;overflow:hidden;width:100%;min-width:80px}
.prog-fill{height:100%;border-radius:99px;transition:width .4s var(--ease)}
.prog-green{background:linear-gradient(90deg,#34c57a,#6bdfaa)}
.prog-yellow{background:linear-gradient(90deg,#f0b429,#f5d078)}
.prog-red{background:linear-gradient(90deg,#e03a3a,#f87171)}

/* ═══════════════════════════════════════════════════════════
   AGENT DASHBOARD
═══════════════════════════════════════════════════════════ */
.agent-hero{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 36px;margin-bottom:32px;position:relative;overflow:hidden;animation:fadeUp .5s var(--ease)}
.agent-hero::before{content:'𓂀';position:absolute;right:32px;top:50%;transform:translateY(-50%);font-size:5rem;opacity:.04;pointer-events:none}
.agent-hero::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold3),var(--gold),transparent)}
.agent-welcome{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.agent-name-big{font-family:'Cinzel',serif;font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--text),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;margin-bottom:8px}
.agent-meta-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.agent-meta-item{font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:6px}
.agent-meta-item strong{color:var(--text);font-weight:600}

/* CONV DUAL PANEL */
.conv-panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px}
@media(max-width:768px){.conv-panel-grid{grid-template-columns:1fr}}
.conv-panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;position:relative;overflow:hidden;animation:fadeUp .5s var(--ease) both}
.conv-panel.dos-panel{border-color:rgba(201,149,42,.25)}
.conv-panel.dos-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold3))}
.conv-panel.cycle-panel{border-color:rgba(192,132,252,.2)}
.conv-panel.cycle-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#a855f7,#c084fc)}
.conv-panel-label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.35em;text-transform:uppercase;margin-bottom:16px}
.conv-panel.dos-panel .conv-panel-label{color:var(--gold)}
.conv-panel.cycle-panel .conv-panel-label{color:#c084fc}
.conv-panel-value{font-family:'Cinzel',serif;font-size:2.8rem;font-weight:900;line-height:1;margin-bottom:8px}
.conv-panel.dos-panel .conv-panel-value{background:linear-gradient(135deg,var(--gold),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.conv-panel.cycle-panel .conv-panel-value{color:#c084fc}
.conv-panel-desc{font-size:.78rem;color:var(--muted);line-height:1.6;margin-bottom:16px}
.conv-panel-status{display:flex;align-items:center;justify-content:space-between;padding-top:16px;border-top:1px solid var(--border)}
.conv-panel-glyph{position:absolute;bottom:14px;right:18px;font-size:1.8rem;opacity:.07}

/* WEEKLY TRACK */
.week-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:32px}
.week-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;animation:fadeUp .5s var(--ease) both;transition:border-color .3s}
.week-card.active-week{border-color:rgba(201,149,42,.5);background:rgba(201,149,42,.04)}
.week-card.not-yet{opacity:.5}
.week-label{font-family:'Cinzel',serif;font-size:.68rem;font-weight:700;letter-spacing:.1em;color:var(--muted);margin-bottom:4px}
.week-dates{font-size:.68rem;color:var(--faint);margin-bottom:12px}
.week-dos{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:900;line-height:1;margin-bottom:4px}
.week-dos.good{color:var(--green)}
.week-dos.warn{color:var(--yellow)}
.week-dos.bad{color:var(--red)}
.week-dos.pending{color:var(--muted)}
.week-target-txt{font-size:.72rem;color:var(--muted);margin-bottom:10px}
.week-status-indicator{margin-top:8px}

/* ═══════════════════════════════════════════════════════════
   SEARCH + FILTER BAR
═══════════════════════════════════════════════════════════ */
.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.search-input{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 16px;color:var(--text);font-family:'Raleway',sans-serif;font-size:.85rem;outline:none;transition:border-color .2s;min-width:220px}
.search-input:focus{border-color:var(--gold)}
.search-input::placeholder{color:var(--faint)}
.filter-btn{font-family:'Cinzel',serif;font-size:.68rem;font-weight:700;letter-spacing:.08em;padding:9px 16px;border-radius:10px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .2s}
.filter-btn.active{background:rgba(201,149,42,.1);border-color:rgba(201,149,42,.4);color:var(--gold)}

/* ═══════════════════════════════════════════════════════════
   TABS
═══════════════════════════════════════════════════════════ */
.tab-bar{display:flex;gap:4px;background:var(--card);border-radius:14px;padding:5px;margin-bottom:32px;border:1px solid var(--border)}
.tab-btn{flex:none;padding:10px 20px;border-radius:10px;cursor:pointer;font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;letter-spacing:.1em;color:var(--muted);transition:all .25s;border:none;background:none;white-space:nowrap}
.tab-btn.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0800}

/* ═══════════════════════════════════════════════════════════
   CYCLE BANNER
═══════════════════════════════════════════════════════════ */
.cycle-banner{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px 28px;margin-bottom:32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;animation:fadeUp .5s var(--ease)}
.cycle-banner::before{content:'';position:absolute;inset:0;pointer-events:none}
.cycle-info{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.cycle-day{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.cycle-progress-text{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;color:var(--text)}
.cycle-bar-wrap{flex:1;min-width:200px;max-width:400px}
.cycle-bar{background:var(--card2);border-radius:99px;height:8px;overflow:hidden}
.cycle-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gold3));transition:width .8s var(--ease)}
.cycle-pct{font-family:'Cinzel',serif;font-size:.75rem;font-weight:700;color:var(--gold);margin-top:6px;letter-spacing:.08em}
.cycle-label-badge{font-family:'Cinzel',serif;font-size:.7rem;font-weight:700;letter-spacing:.12em;padding:6px 16px;border-radius:99px;background:rgba(201,149,42,.1);border:1px solid rgba(201,149,42,.3);color:var(--gold)}

/* ═══════════════════════════════════════════════════════════
   DIVIDER
═══════════════════════════════════════════════════════════ */
.divider{display:flex;align-items:center;gap:16px;margin:36px 0 28px;color:var(--faint);font-size:.9rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border))}
.divider::after{background:linear-gradient(90deg,var(--border),transparent)}

/* ═══════════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════════ */
.toast{position:fixed;bottom:32px;left:50%;z-index:999;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 24px;font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:10px;transition:transform .4s var(--ease);white-space:nowrap;pointer-events:none;font-family:'Cinzel',serif;letter-spacing:.05em}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(52,197,122,.5);color:var(--green)}
.toast.error{border-color:rgba(224,58,58,.5);color:var(--red)}

/* ═══════════════════════════════════════════════════════════
   REFRESH BTN
═══════════════════════════════════════════════════════════ */
.refresh-btn{font-family:'Cinzel',serif;font-size:.68rem;font-weight:700;letter-spacing:.08em;padding:9px 18px;border-radius:10px;cursor:pointer;border:1px solid rgba(201,149,42,.3);background:rgba(201,149,42,.06);color:var(--gold);transition:all .2s}
.refresh-btn:hover{background:rgba(201,149,42,.12);border-color:var(--gold)}
.refresh-btn:disabled{opacity:.5;cursor:not-allowed}
.spinning{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══════════════════════════════════════════════════════════
   EMPTY / ERROR
═══════════════════════════════════════════════════════════ */
.empty-state{text-align:center;padding:60px 40px;color:var(--muted)}
.empty-glyph{font-size:2.5rem;opacity:.3;margin-bottom:12px}
.empty-text{font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:.1em}

/* ═══════════════════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════════════════ */
@media(max-width:768px){
  .portal-body{padding:24px 16px 60px}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .tbl th,.tbl td{padding:10px 12px;font-size:.78rem}
}
@media(max-width:480px){
  .kpi-grid{grid-template-columns:1fr}
  .login-box{padding:32px 24px}
}

/* number animation */
.count-up{display:inline-block}

/* section gap */
.section-gap{margin-bottom:48px}

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════════
const API_URL = "https://script.google.com/macros/s/AKfycbwq420JmAjvFm6GsBpoqfpT4xcYR5v5vOrhuMmH_J-ia-YQpupbAxBgqUVf0gRIKH7deg/exec";

let currentRole = 'admin';
let currentUser = '';
let apiData = null;
let activeAdminTab = 'overview';
let agentFilterCat = 'ALL';
let agentSearch = '';

// ════════════════════════════════════════════════════════════
// LOGIN
// ════════════════════════════════════════════════════════════
function setRole(role) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0&&role==='admin')||(i===1&&role==='agent'));
  });
}

async function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if (!user || !pass) { errEl.textContent = '𓂀 All fields are required'; return; }

  currentUser = user;

  // Show portal
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('portalScreen').classList.add('active');
  document.getElementById('headerUserName').textContent = user;
  const badge = document.getElementById('headerRoleBadge');
  badge.textContent = currentRole === 'admin' ? 'Admin' : 'Agent';
  badge.className = 'header-role-badge ' + currentRole;

  await loadPortal();
}

function doLogout() {
  apiData = null;
  currentRole = 'admin';
  currentUser = '';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').textContent = '';
  document.getElementById('portalScreen').classList.remove('active');
  document.getElementById('loginScreen').classList.add('active');
  document.getElementById('portalContent').style.display = 'none';
  document.getElementById('loadingState').style.display = 'flex';
}

// ════════════════════════════════════════════════════════════
// DATA FETCH
// ════════════════════════════════════════════════════════════
async function loadPortal() {
  document.getElementById('loadingState').style.display = 'flex';
  document.getElementById('portalContent').style.display = 'none';
  try {
    const res = await fetch(API_URL + '?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    apiData = await res.json();
    renderPortal();
  } catch(err) {
    document.getElementById('loadingState').innerHTML = `<div class="empty-state"><div class="empty-glyph">𓂀</div><div class="empty-text">Connection failed — ${err.message}</div><div style="margin-top:16px;color:var(--muted);font-size:.8rem">Check API URL or network</div></div>`;
  }
}

async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinning">↻</span> Refreshing…';
  await loadPortal();
  btn.disabled = false;
  btn.textContent = '↻ Refresh';
  showToast('𓂀 Data refreshed', 'success');
}

// ════════════════════════════════════════════════════════════
// RENDER ROUTER
// ════════════════════════════════════════════════════════════
function renderPortal() {
  document.getElementById('loadingState').style.display = 'none';
  const content = document.getElementById('portalContent');
  content.style.display = 'block';

  if (currentRole === 'admin') {
    renderAdmin(content);
  } else {
    renderAgent(content);
  }
}

// ════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════
function pct(v) {
  if (v === null || v === undefined || v === '—' || isNaN(parseFloat(v))) return '—';
  return (parseFloat(v) * 100).toFixed(1) + '%';
}

function statusPill(status) {
  const s = String(status || '').toUpperCase();
  if (s === 'ON TRACK') return `<span class="pill pill-green">ON TRACK</span>`;
  if (s === 'WATCH') return `<span class="pill pill-yellow">WATCH</span>`;
  if (s === 'OFF TRACK') return `<span class="pill pill-red">OFF TRACK</span>`;
  if (s === 'NOT YET') return `<span class="pill pill-gray">NOT YET</span>`;
  if (s === 'IN PROGRESS') return `<span class="pill pill-yellow">IN PROGRESS</span>`;
  return `<span class="pill pill-gray">${status || '—'}</span>`;
}

function convColor(v, tgt) {
  if (v === null || v === '—') return 'conv-muted';
  const val = parseFloat(v), t = parseFloat(tgt);
  if (isNaN(val)) return 'conv-muted';
  if (isNaN(t)) return 'conv-gold';
  if (val >= t) return 'conv-gold';
  if (val >= t * 0.8) return 'conv-muted'; // yellow could be set
  return 'conv-muted';
}

function progBar(val, target) {
  if (!val || !target || target <= 0) return '';
  const pctNum = Math.min(100, Math.round((val / target) * 100));
  const cls = pctNum >= 100 ? 'prog-green' : pctNum >= 80 ? 'prog-yellow' : 'prog-red';
  return `<div class="prog-bar"><div class="prog-fill ${cls}" style="width:${pctNum}%"></div></div>`;
}

function cycleConvDisplay(ag) {
  // Try to get cycle conv from agent data
  // V22: pureConv = DOs conv%, overallConv = overall
  // cycleConv is not directly in doGet response as a field but overallConv uses countable/inSheet
  // We'll show both convs
  const dosConv = ag.overallConv !== undefined && ag.overallConv !== null ? ag.overallConv : null;
  const pureConv = ag.pureConv !== undefined && ag.pureConv !== null ? ag.pureConv : null;
  return { dosConv, pureConv };
}

function getCatBg(cat) {
  if (cat === 'SR') return '#4a148c';
  if (cat === 'OG') return '#1565c0';
  return '#2e7d32';
}

function weekStatusClass(s) {
  const u = String(s).toUpperCase();
  if (u === 'ON TRACK') return 'good';
  if (u === 'WATCH') return 'warn';
  if (u === 'OFF TRACK') return 'bad';
  return 'pending';
}

// Grand totals from agents array
function computeGrandTotals(agents) {
  const totals = { agents: agents.length, leads: 0, dosConv: 0, dosExternal: 0, dosPartial: 0, dosRechase: 0, dosPure: 0, onTrack: 0, watch: 0, offTrack: 0, noData: 0 };
  agents.forEach(a => {
    totals.leads += (a.leads || 0);
    totals.dosConv += (a.dosConv || 0);
    totals.dosExternal += (a.dosExternal || 0);
    totals.dosPartial += (a.dosPartial || 0);
    totals.dosRechase += (a.dosRechase || 0);
    totals.dosPure += (a.dosPure || 0);
    const s = String(a.curWeekStatus || '').toUpperCase();
    if (s === 'ON TRACK') totals.onTrack++;
    else if (s === 'WATCH') totals.watch++;
    else if (s === 'OFF TRACK') totals.offTrack++;
    else totals.noData++;
  });
  return totals;
}

// ════════════════════════════════════════════════════════════
// ADMIN RENDER
// ════════════════════════════════════════════════════════════
function renderAdmin(content) {
  const data = apiData || {};
  const agents = data.agents || [];
  const cycleDay = data.cycleDay || '—';
  const cycleDayTotal = data.cycleDayTotal || '—';
  const totals = computeGrandTotals(agents);
  const cyclePct = cycleDayTotal > 0 ? Math.round((cycleDay / cycleDayTotal) * 100) : 0;

  content.innerHTML = `
    <!-- CYCLE BANNER -->
    <div class="cycle-banner" style="position:relative;margin-bottom:32px">
      <div class="cycle-info">
        <div>
          <div class="cycle-day">Cycle Progress</div>
          <div class="cycle-progress-text">Day ${cycleDay} of ${cycleDayTotal}</div>
        </div>
        <div class="cycle-bar-wrap">
          <div class="cycle-bar"><div class="cycle-bar-fill" style="width:${cyclePct}%"></div></div>
          <div class="cycle-pct">${cyclePct}% Complete</div>
        </div>
      </div>
      <div class="cycle-label-badge">𓇋 Active Cycle</div>
    </div>

    <!-- KPI ROW -->
    <div class="kpi-grid" id="adminKpiGrid">
      ${kpiCard('Total Agents', totals.agents, 'gold', '𓀀', '')}
      ${kpiCard('Active Leads', totals.leads.toLocaleString(), 'gold', '𓃭', '')}
      ${kpiCard('DOs This Cycle', totals.dosConv, 'green', '𓏏', `Pure: ${totals.dosPure}`)}
      ${kpiCard('On Track', totals.onTrack, 'green', '𓆙', `Watch: ${totals.watch} | Off: ${totals.offTrack}`)}
      ${kpiCard('Partial ★', totals.dosPartial, 'yellow', '𓅓', 'Bonus Only')}
      ${kpiCard('Rechase ★', totals.dosRechase, 'yellow', '𓄿', 'Bonus Only')}
    </div>

    <!-- TABS -->
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchAdminTab('overview',this)">𓂀 Overview</button>
      <button class="tab-btn" onclick="switchAdminTab('agents',this)">𓀀 All Agents</button>
      <button class="tab-btn" onclick="switchAdminTab('weekly',this)">𓇋 Weekly Breakdown</button>
      <button class="tab-btn" onclick="switchAdminTab('sources',this)">𓆣 Source Breakdown</button>
    </div>

    <div id="adminTabContent"></div>
  `;

  renderAdminTab('overview');
}

function kpiCard(label, value, colorClass, glyph, meta, delay = 0) {
  return `<div class="kpi-card" style="animation-delay:${delay}s">
    <div class="kpi-label">${label}</div>
    <div class="kpi-value ${colorClass}">${value}</div>
    ${meta ? `<div class="kpi-meta">${meta}</div>` : ''}
    <div class="kpi-glyph">${glyph}</div>
  </div>`;
}

function switchAdminTab(tab, btn) {
  activeAdminTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderAdminTab(tab);
}

function renderAdminTab(tab) {
  const content = document.getElementById('adminTabContent');
  const agents = (apiData || {}).agents || [];

  if (tab === 'overview') {
    content.innerHTML = renderAdminOverview(agents);
  } else if (tab === 'agents') {
    content.innerHTML = renderAdminAgents(agents);
  } else if (tab === 'weekly') {
    content.innerHTML = renderAdminWeekly(agents);
  } else if (tab === 'sources') {
    content.innerHTML = renderAdminSources(agents);
  }
}

// ─── OVERVIEW TAB ───
function renderAdminOverview(agents) {
  const byCat = { SR: [], OG: [], JR: [] };
  agents.forEach(a => { if (byCat[a.category]) byCat[a.category].push(a); });

  let html = `<div class="section-gap">
    <div class="sec-eyebrow">Category Breakdown</div>
    <div class="sec-title">Performance by Tier</div>
  </div>`;

  ['SR', 'OG', 'JR'].forEach(cat => {
    const list = byCat[cat];
    if (!list.length) return;
    const totL = list.reduce((s,a)=>s+(a.leads||0),0);
    const totD = list.reduce((s,a)=>s+(a.dosConv||0),0);
    const totP = list.reduce((s,a)=>s+(a.dosPure||0),0);
    const totPart = list.reduce((s,a)=>s+(a.dosPartial||0),0);
    const totRech = list.reduce((s,a)=>s+(a.dosRechase||0),0);
    const onT = list.filter(a=>String(a.curWeekStatus||'').toUpperCase()==='ON TRACK').length;
    const offT = list.filter(a=>String(a.curWeekStatus||'').toUpperCase()==='OFF TRACK').length;
    const ovConv = totL > 0 ? totP / totL : null;

    html += `<div class="table-wrap section-gap">
      <div class="table-header">
        <div class="table-title" style="color:${cat==='SR'?'#c084fc':cat==='OG'?'#60a5fa':'#4ade80'}">${cat} TIER — ${list.length} Agents</div>
        <div style="display:flex;gap:12px;align-items:center">
          <span style="font-size:.75rem;color:var(--muted)">On Track: <strong style="color:var(--green)">${onT}</strong> | Off Track: <strong style="color:var(--red)">${offT}</strong></span>
          <span class="table-tag">Overall Conv%: ${ovConv !== null ? pct(ovConv) : '—'}</span>
        </div>
      </div>
      <table class="tbl">
        <thead>
          <tr>
            <th>Agent</th>
            <th>Leads</th>
            <th>DOs Conv</th>
            <th>DOs Conv%</th>
            <th>Cycle Conv%</th>
            <th>Pure DOs</th>
            <th>Partial ★</th>
            <th>Rechase ★</th>
            <th>Cur Week</th>
            <th>Week Status</th>
            <th>Missing</th>
          </tr>
        </thead>
        <tbody>
          ${list.map(a => {
            const convDOs = a.overallConv !== null && a.overallConv !== undefined ? a.overallConv : null;
            // Cycle conv from pureConv field (pure DOs / leads)
            const cycleConv = a.pureConv !== null && a.pureConv !== undefined ? a.pureConv : null;
            const missing = a.missingQuota || 0;
            return `<tr>
              <td>
                <div class="agent-name">${a.name}</div>
                <div style="font-size:.68rem;color:var(--muted)">${a.tl || 'SR Independent'}</div>
              </td>
              <td style="font-weight:700;color:var(--text)">${a.leads || 0}</td>
              <td style="font-weight:700;color:var(--green)">${a.dosConv || 0}</td>
              <td><span class="conv-val conv-gold">${pct(convDOs)}</span></td>
              <td><span class="conv-val conv-purple">${pct(cycleConv)}</span></td>
              <td>${a.dosPure || 0}</td>
              <td style="color:#f0b429">${a.dosPartial || 0} ★</td>
              <td style="color:#c084fc">${a.dosRechase || 0} ★</td>
              <td style="font-weight:700">${a.curWeekDos !== undefined ? a.curWeekDos : '—'}</td>
              <td>${statusPill(a.curWeekStatus)}</td>
              <td style="color:${missing > 0 ? 'var(--red)' : 'var(--green)'}; font-weight:700">${missing > 0 ? missing + ' left' : '✅ MET'}</td>
            </tr>`;
          }).join('')}
          <tr style="background:rgba(201,149,42,.06);font-weight:700">
            <td style="font-family:'Cinzel',serif;color:var(--gold)">TOTAL ${cat}</td>
            <td>${totL}</td>
            <td style="color:var(--green)">${totD}</td>
            <td><span class="conv-val conv-gold">${ovConv !== null ? pct(ovConv) : '—'}</span></td>
            <td>—</td>
            <td>${totP}</td>
            <td style="color:#f0b429">${totPart} ★</td>
            <td style="color:#c084fc">${totRech} ★</td>
            <td>—</td>
            <td>—</td>
            <td>—</td>
          </tr>
        </tbody>
      </table>
    </div>`;
  });

  return html;
}

// ─── ALL AGENTS TAB ───
function renderAdminAgents(agents) {
  const sorted = [...agents].sort((a,b) => (b.overallConv||0) - (a.overallConv||0));

  return `<div class="filter-bar">
    <input type="text" class="search-input" placeholder="🔍 Search agent or TL…" oninput="filterAgentTable(this.value)" id="agentSearchInput"/>
    ${['ALL','SR','OG','JR'].map(c=>`<button class="filter-btn ${c==='ALL'?'active':''}" onclick="filterAgentCat('${c}',this)">${c}</button>`).join('')}
  </div>
  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title">𓀀 All Agents — Ranked by DOs Conv%</div>
      <span class="table-tag">${agents.length} Agents</span>
    </div>
    <table class="tbl" id="allAgentsTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Agent</th>
          <th>TL</th>
          <th>Cat</th>
          <th>Leads</th>
          <th>DOs Conv</th>
          <th>DOs Conv% <span style="font-size:.55rem;color:var(--muted)">(Pure/Leads)</span></th>
          <th>Cycle Conv% <span style="font-size:.55rem;color:#c084fc">(Pure/Leads col B)</span></th>
          <th>Ext DOs</th>
          <th>Partial ★</th>
          <th>Rechase ★</th>
          <th>Cur Wk DOs</th>
          <th>Cur Wk Status</th>
          <th>Missing</th>
          <th>Progress</th>
        </tr>
      </thead>
      <tbody id="allAgentsTbody">
        ${sorted.map((a,i) => agentRow(a, i+1)).join('')}
      </tbody>
    </table>
  </div>`;
}

function agentRow(a, rank) {
  const convDOs = a.overallConv !== null && a.overallConv !== undefined ? a.overallConv : null;
  const cycleConv = a.pureConv !== null && a.pureConv !== undefined ? a.pureConv : null;
  const missing = a.missingQuota || 0;
  const prog = progBar(a.dosConv, a.leads ? a.leads * (a.target || 0) : 0);
  return `<tr data-name="${a.name.toLowerCase()}" data-tl="${(a.tl||'').toLowerCase()}" data-cat="${a.category}">
    <td style="color:var(--muted);font-family:'Cinzel',serif;font-weight:700">#${rank}</td>
    <td><div class="agent-name">${a.name}</div></td>
    <td class="tl-name">${a.tl || '—'}</td>
    <td><span class="cat-badge cat-${a.category}">${a.category}</span></td>
    <td style="font-weight:700">${a.leads || 0}</td>
    <td style="font-weight:700;color:var(--green)">${a.dosConv || 0}</td>
    <td><span class="conv-val conv-gold">${pct(convDOs)}</span></td>
    <td><span class="conv-val conv-purple">${pct(cycleConv)}</span></td>
    <td style="color:var(--muted)">${a.dosExternal || 0}</td>
    <td style="color:#f0b429">${a.dosPartial || 0} ★</td>
    <td style="color:#c084fc">${a.dosRechase || 0} ★</td>
    <td style="font-weight:700">${a.curWeekDos !== undefined ? a.curWeekDos : '—'}</td>
    <td>${statusPill(a.curWeekStatus)}</td>
    <td style="color:${missing>0?'var(--red)':'var(--green)'};font-weight:700">${missing>0?missing+' left':'✅'}</td>
    <td style="min-width:80px">${prog}</td>
  </tr>`;
}

function filterAgentTable(q) {
  agentSearch = q.toLowerCase();
  applyAgentFilter();
}
function filterAgentCat(cat, btn) {
  agentFilterCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  applyAgentFilter();
}
function applyAgentFilter() {
  const rows = document.querySelectorAll('#allAgentsTbody tr');
  rows.forEach(row => {
    const name = row.dataset.name || '';
    const tl = row.dataset.tl || '';
    const cat = row.dataset.cat || '';
    const matchSearch = !agentSearch || name.includes(agentSearch) || tl.includes(agentSearch);
    const matchCat = agentFilterCat === 'ALL' || cat === agentFilterCat;
    row.style.display = matchSearch && matchCat ? '' : 'none';
  });
}

// ─── WEEKLY TAB ───
function renderAdminWeekly(agents) {
  // Get weeks from first agent that has them
  const ag0 = agents.find(a => a.weeks && a.weeks.length);
  if (!ag0) return `<div class="empty-state"><div class="empty-glyph">𓆙</div><div class="empty-text">No weekly data available</div></div>`;
  const weeks = ag0.weeks;

  let html = `<div class="table-wrap">
    <div class="table-header">
      <div class="table-title">𓇋 Weekly Breakdown — All Agents (Cumulative)</div>
      <span class="table-tag">${weeks.length} Weeks</span>
    </div>
    <div style="overflow-x:auto">
    <table class="tbl">
      <thead>
        <tr>
          <th>Agent</th>
          <th>Cat</th>
          <th>TL</th>
          ${weeks.map(w=>`<th style="min-width:130px"><div>${w.label}</div><div style="font-size:.6rem;color:var(--muted);font-weight:400">${w.start}→${w.end}</div></th>`).join('')}
          <th>Overall</th>
        </tr>
      </thead>
      <tbody>
        ${agents.map(a => {
          const wks = a.weeks || [];
          return `<tr>
            <td><div class="agent-name">${a.name}</div></td>
            <td><span class="cat-badge cat-${a.category}">${a.category}</span></td>
            <td class="tl-name">${a.tl || '—'}</td>
            ${wks.map(w => `<td>
              <div style="font-weight:700;color:${w.status==='ON TRACK'?'var(--green)':w.status==='OFF TRACK'?'var(--red)':w.status==='WATCH'?'var(--yellow)':'var(--muted)'};font-family:'Cinzel',serif;font-size:.9rem">${w.dos}</div>
              <div style="font-size:.65rem;color:var(--muted)">Tgt: ${typeof w.weeklyDOTarget === 'number' ? w.weeklyDOTarget.toFixed(1) : '—'}</div>
              <div style="margin-top:4px">${statusPill(w.status)}</div>
            </td>`).join('')}
            <td>${statusPill(a.curWeekStatus)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>
  </div>`;
  return html;
}

// ─── SOURCE BREAKDOWN TAB ───
function renderAdminSources(agents) {
  // Collect all sources
  const srcTotals = {};
  agents.forEach(a => {
    const srcs = a.sources || {};
    Object.keys(srcs).forEach(s => { srcTotals[s] = (srcTotals[s] || 0) + srcs[s]; });
  });
  const sources = Object.keys(srcTotals).sort((a,b) => srcTotals[b] - srcTotals[a]);
  const grandTotal = Object.values(srcTotals).reduce((s,v)=>s+v,0);

  if (!sources.length) return `<div class="empty-state"><div class="empty-glyph">𓆙</div><div class="empty-text">No source data found</div></div>`;

  return `<div class="table-wrap">
    <div class="table-header">
      <div class="table-title">𓆣 DO Source Breakdown</div>
      <span class="table-tag">Total DOs: ${grandTotal}</span>
    </div>
    <table class="tbl">
      <thead>
        <tr><th>Source</th><th>DOs</th><th>Share</th><th>Note</th><th>Distribution</th></tr>
      </thead>
      <tbody>
        ${sources.map(src => {
          const v = srcTotals[src];
          const share = grandTotal > 0 ? (v/grandTotal*100).toFixed(1) : 0;
          const isBonus = src.includes('Partial') || src.includes('Rechase') || src.includes('★');
          const isExt = src === 'External';
          return `<tr>
            <td style="font-family:'Cinzel',serif;font-weight:700;color:${isBonus?'#f0b429':isExt?'#60a5fa':'var(--text)'}">${src}</td>
            <td style="font-weight:700;font-size:1rem">${v}</td>
            <td style="color:var(--muted)">${share}%</td>
            <td style="font-size:.72rem;color:var(--muted)">${isBonus?'★ Bonus Only — excluded from targets':isExt?'External — mode dependent':''}</td>
            <td style="min-width:120px">${progBar(v, grandTotal)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

// ════════════════════════════════════════════════════════════
// AGENT RENDER
// ════════════════════════════════════════════════════════════
function renderAgent(content) {
  const agents = (apiData || {}).agents || [];
  // Find agent by name match (case insensitive)
  const me = agents.find(a => a.name.toLowerCase() === currentUser.toLowerCase())
          || agents.find(a => a.name.toLowerCase().includes(currentUser.toLowerCase()))
          || null;

  if (!me) {
    content.innerHTML = `
      <div class="agent-hero">
        <div class="agent-welcome">Welcome to the Portal</div>
        <div class="agent-name-big">${currentUser}</div>
        <div class="agent-meta-row">
          <div class="agent-meta-item">𓂀 <strong>Agent not found in system</strong></div>
          <div class="agent-meta-item">Contact your TL to verify your name matches the system.</div>
        </div>
      </div>
      ${renderAgentFallback(agents)}
    `;
    return;
  }

  const convDOs = me.overallConv !== null && me.overallConv !== undefined ? me.overallConv : null;
  const cycleConv = me.pureConv !== null && me.pureConv !== undefined ? me.pureConv : null;
  const target = me.target || 0;
  const missing = me.missingQuota || 0;
  const weeks = me.weeks || [];
  const cycleDay = (apiData || {}).cycleDay || '—';
  const cycleDayTotal = (apiData || {}).cycleDayTotal || '—';
  const cyclePct = cycleDayTotal > 0 ? Math.round((cycleDay / cycleDayTotal) * 100) : 0;

  content.innerHTML = `
    <!-- CYCLE BANNER -->
    <div class="cycle-banner">
      <div class="cycle-info">
        <div>
          <div class="cycle-day">Cycle Progress</div>
          <div class="cycle-progress-text">Day ${cycleDay} of ${cycleDayTotal}</div>
        </div>
        <div class="cycle-bar-wrap">
          <div class="cycle-bar"><div class="cycle-bar-fill" style="width:${cyclePct}%"></div></div>
          <div class="cycle-pct">${cyclePct}% Complete</div>
        </div>
      </div>
      <div class="cycle-label-badge">𓇋 Active Cycle</div>
    </div>

    <!-- AGENT HERO -->
    <div class="agent-hero">
      <div class="agent-welcome">𓂀 Welcome Back, Chaser</div>
      <div class="agent-name-big">${me.name}</div>
      <div class="agent-meta-row">
        <div class="agent-meta-item">Category: <strong>${me.category}</strong></div>
        ${me.tl ? `<div class="agent-meta-item">Team Leader: <strong>${me.tl}</strong></div>` : ''}
        <div class="agent-meta-item">Active Leads: <strong>${me.leads || 0}</strong></div>
        <div class="agent-meta-item">Target: <strong>${pct(target)}</strong></div>
        <div class="agent-meta-item" style="color:${missing>0?'var(--red)':'var(--green)'}">
          <strong>${missing > 0 ? missing + ' DOs missing' : '✅ Target Met'}</strong>
        </div>
      </div>
    </div>

    <!-- DUAL CONV PANELS -->
    <div class="conv-panel-grid">
      <div class="conv-panel dos-panel">
        <div class="conv-panel-label">DOs Conversion Rate</div>
        <div class="conv-panel-value">${pct(convDOs)}</div>
        <div class="conv-panel-desc">
          Based on <strong style="color:var(--text)">${me.dosPure || 0} Pure DOs</strong> out of 
          <strong style="color:var(--text)">${me.leads || 0} active leads</strong>.<br>
          External, Partial ★ & Rechase ★ are excluded.
        </div>
        <div class="conv-panel-status">
          ${statusPill(convDOs !== null && target > 0 ? (convDOs >= target ? 'ON TRACK' : convDOs >= target * 0.8 ? 'WATCH' : 'OFF TRACK') : 'NO DATA')}
          <div style="font-size:.72rem;color:var(--muted)">Target: ${pct(target)}</div>
        </div>
        <div class="conv-panel-glyph">𓏏</div>
      </div>
      <div class="conv-panel cycle-panel">
        <div class="conv-panel-label" style="color:#c084fc">Cycle Conversion %</div>
        <div class="conv-panel-value" style="color:#c084fc">${pct(cycleConv)}</div>
        <div class="conv-panel-desc">
          Pure DOs returned within the <strong style="color:var(--text)">Conv% date window</strong> 
          and assigned within the <strong style="color:var(--text)">cycle date range</strong>.<br>
          The gold standard metric.
        </div>
        <div class="conv-panel-status">
          ${statusPill(cycleConv !== null && target > 0 ? (cycleConv >= target ? 'ON TRACK' : cycleConv >= target * 0.8 ? 'WATCH' : 'OFF TRACK') : 'NO DATA')}
          <div style="font-size:.72rem;color:#c084fc">Excl. Ext · Partial ★ · Rechase ★</div>
        </div>
        <div class="conv-panel-glyph">𓇋</div>
      </div>
    </div>

    <!-- KPI ROW -->
    <div class="kpi-grid" style="margin-bottom:32px">
      ${kpiCard('DOs This Cycle', me.dosConv || 0, 'green', '𓏏', `Pure: ${me.dosPure || 0} | Other: ${me.dosOther || 0}`)}
      ${kpiCard('External DOs', me.dosExternal || 0, 'gold', '𓃭', 'Excluded from Conv%')}
      ${kpiCard('Partial DOC ★', me.dosPartial || 0, 'yellow', '𓅓', 'Bonus Only')}
      ${kpiCard('Rechase ★', me.dosRechase || 0, 'yellow', '𓄿', 'Bonus Only')}
      ${kpiCard('Current Week', me.curWeekDos !== undefined ? me.curWeekDos : '—', me.curWeekStatus === 'ON TRACK' ? 'green' : me.curWeekStatus === 'OFF TRACK' ? 'red' : 'yellow', '𓆙', me.curWeekStatus || '—')}
      ${kpiCard('Missing DOs', missing > 0 ? missing : '✅ MET', missing > 0 ? 'red' : 'green', '𓀀', missing > 0 ? 'To meet cycle target' : 'Cycle target achieved')}
    </div>

    <!-- WEEKLY STATUS -->
    <div class="sec-eyebrow">This Cycle</div>
    <div class="sec-title" style="margin-bottom:24px">Weekly Progress</div>
    <div class="week-grid">
      ${weeks.map((w, i) => {
        const isActive = w.weekStarted && !w.weekEnded;
        const isPast = w.weekEnded;
        const cls = weekStatusClass(w.status);
        const dosColor = w.status === 'ON TRACK' ? 'good' : w.status === 'OFF TRACK' ? 'bad' : w.status === 'WATCH' ? 'warn' : 'pending';
        return `<div class="week-card ${isActive ? 'active-week' : ''} ${!w.weekStarted ? 'not-yet' : ''}" style="animation-delay:${i*.05}s">
          <div class="week-label">${w.label} ${isActive ? '← NOW' : ''}</div>
          <div class="week-dates">${w.start} → ${w.end}</div>
          <div class="week-dos ${dosColor}">${w.weekStarted ? w.dos : '—'}</div>
          <div class="week-target-txt">Target: ${typeof w.weeklyDOTarget === 'number' ? w.weeklyDOTarget.toFixed(1) : '—'} DOs</div>
          ${w.cumulativeGap !== null && w.weekStarted ? `<div style="font-size:.7rem;color:${w.cumulativeGap>=0?'var(--green)':'var(--red)'}; font-weight:700; margin-bottom:6px">Cumul Gap: ${w.cumulativeGap >= 0 ? '+' : ''}${typeof w.cumulativeGap === 'number' ? w.cumulativeGap.toFixed(1) : w.cumulativeGap}</div>` : ''}
          <div class="week-status-indicator">${statusPill(w.status)}</div>
        </div>`;
      }).join('')}
    </div>

    <!-- SOURCE BREAKDOWN -->
    ${renderAgentSources(me)}
  `;
}

function renderAgentSources(me) {
  const srcs = me.sources || {};
  const keys = Object.keys(srcs).sort((a,b) => srcs[b] - srcs[a]);
  if (!keys.length) return '';
  const total = Object.values(srcs).reduce((s,v)=>s+v,0);
  return `<div class="table-wrap">
    <div class="table-header">
      <div class="table-title">𓆣 Your DO Sources</div>
      <span class="table-tag">Total: ${total} DOs</span>
    </div>
    <table class="tbl">
      <thead><tr><th>Source</th><th>DOs</th><th>Share</th><th>Note</th></tr></thead>
      <tbody>
        ${keys.map(src => {
          const v = srcs[src];
          const isBonus = src.includes('Partial') || src.includes('Rechase') || src.includes('★');
          const isExt = src === 'External';
          return `<tr>
            <td style="font-family:'Cinzel',serif;font-weight:700;color:${isBonus?'#f0b429':isExt?'#60a5fa':'var(--text)'}">${src}</td>
            <td style="font-weight:700">${v}</td>
            <td>${total > 0 ? (v/total*100).toFixed(1) + '%' : '—'}</td>
            <td style="font-size:.72rem;color:var(--muted)">${isBonus ? '★ Bonus — not in target' : isExt ? 'Excluded from Conv%' : ''}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderAgentFallback(agents) {
  // Show a read-only summary if agent not found
  return `<div class="table-wrap">
    <div class="table-header"><div class="table-title">𓀀 All Agents (Read-Only)</div></div>
    <table class="tbl">
      <thead><tr><th>Agent</th><th>Cat</th><th>DOs Conv%</th><th>Cycle Conv%</th><th>Week Status</th></tr></thead>
      <tbody>
        ${agents.map(a => `<tr>
          <td class="agent-name">${a.name}</td>
          <td><span class="cat-badge cat-${a.category}">${a.category}</span></td>
          <td><span class="conv-val conv-gold">${pct(a.overallConv)}</span></td>
          <td><span class="conv-val conv-purple">${pct(a.pureConv)}</span></td>
          <td>${statusPill(a.curWeekStatus)}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

// ════════════════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════════════════
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 4000);
}
